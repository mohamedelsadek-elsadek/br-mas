const SHEETS=[
{
  step:1, kicker:'المرحلة الأولى — قبل الإدخال', title:'النظافة والتطهير الشامل للعنبر',
  sub:'يجب إتمام التنظيف والتطهير والتأكد من فعاليته قبل 24 ساعة على الأقل من وصول الكتاكيت، بنظام «الكل داخل / الكل خارج».',
  html:` <div class="row r3"> <div class="stat b"><div class="v">24h</div><div class="l">إتمام التطهير قبل الوصول كحد أدنى</div></div> <div class="stat g"><div class="v">سن واحد</div><div class="l">كل الموقع لعمر واحد (All-in/All-out)</div></div> <div class="stat o"><div class="v">TVC + سالمونيلا</div><div class="l">فحص فعالية التطهير لكل دورة</div></div> </div> <div class="box"><div class="bh"><span class="ic">🧼</span>خطوات التنظيف بالترتيب</div> <div class="steps"> <div class="step-item"><div class="n"></div><div class="tx"><b>الإزالة الجافة:</b> إخراج الفرشة القديمة والمخلفات وكل المعدات المتحركة.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>الغسيل بالضغط:</b> غسل الأسطح والأرضيات (الأكثر فعالية بالماء الساخن) لإزالة الأوساخ العضوية.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>التطهير:</b> استخدام مطهّر معتمد على كل الأسطح الداخلية والمعدات.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>التبخير النهائي (Fumigation):</b> للمناطق الداخلية والمعدات بعد جفافها.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>التحقق:</b> فحص بصري للمناطق المنسية + استلام نتائج فحص النظافة (TVC/Salmonella).</div></div> </div> </div> <div class="row r2"> <div class="box tone"><div class="bh"><span class="ic">🚜</span>المحيط الخارجي</div> <ul class="chk"> <li>غسل الممرات الخرسانية بالماء الساخن تحت الضغط.</li> <li>قص الحشائش حول العنبر لمنع تعشيش القوارض.</li> <li>تطهير الأسطح الخارجية (الجير حول المبنى).</li> </ul> </div> <div class="box tone"><div class="bh"><span class="ic">🐀</span>مكافحة القوارض والمعدات</div> <ul class="chk"> <li>فحص نشاط القوارض وإعادة وضع الطُعم في المحطات.</li> <li>تنظيف وتطهير منظومتي العلف والمياه.</li> <li>غسل وتطهير مغاطس الأحذية والملابس الواقية.</li> </ul> </div> </div> <div class="note"><div class="ic">⚠️</div><div class="tx"><b>قاعدة ذهبية:</b> الأرضيات الخرسانية ضرورية للغسيل والتطهير الفعّال. لا تُدخل الفرشة الجديدة أو الكتاكيت قبل تأكيد نتائج فحص النظافة.</div></div> `
},
{

  sub:'تسخين العنبر مسبقاً وتثبيت الحرارة والرطوبة 24 ساعة قبل الوصول، مع جاهزية كاملة لمنظومات المياه والعلف والتهوية.',
  html:` <div class="row r4"> <div class="stat a"><div class="v">30°م</div><div class="l">حرارة الهواء (تحضين كلي)</div></div> <div class="stat o"><div class="v">28-30°م</div><div class="l">حرارة الأرضية</div></div> <div class="stat t"><div class="v">28-32°م</div><div class="l">حرارة الفرشة</div></div> <div class="stat g"><div class="v">60-70%</div><div class="l">الرطوبة النسبية</div></div> </div> <div class="row r2"> <div class="box"><div class="bh"><span class="ic">🔥</span>التدفئة والفرشة</div> <ul class="chk"> <li>تشغيل التدفئة قبل <b>24-48 ساعة</b> لتشبع الجدران والأرضيات بالحرارة.</li> <li>فرد الفرشة بعمق <b>2-4 سم</b> وتوزيعها بالتساوي.</li> <li>في التحضين الموضعي: <b>32°م</b> عند حافة الحضّانة.</li> <li>قد تحتاج تسخين أطول من 24 ساعة في الشتاء أو العنابر الجديدة.</li> </ul> </div> <div class="box"><div class="bh"><span class="ic">💧</span>المياه والعلف</div> <ul class="chk"> <li>غسل وتطهير خطوط المياه ثم شطفها قبل الوصول.</li> <li>حرارة الماء المقدّم <b>18-21°م</b>.</li> <li>تغطية <b>70%</b> من مساحة التحضين بالورق وتوزيع العلف عليه.</li> <li><b>40 جم</b> علف عالي الجودة لكل طائر في الأطباق والورق.</li> </ul> </div> </div> <div class="box tone"><div class="bh"><span class="ic">🌬️</span>التهوية والإضاءة عند التجهيز</div> <div class="row r3" style="margin:0"> <div><p><b>التهوية الدنيا:</b> ضبطها قبل الإدخال لطرد الغازات وتوفير هواء نقي. سرعة الهواء عند الأرضية أقل من 0.15 م/ث.</p></div> <div><p><b>الإضاءة:</b> 30-40 لوكس (تحضين كلي) أو 80-100 لوكس (موضعي) لتحفيز الأكل والشرب.</p></div> <div><p><b>اختبار الدخان:</b> للتأكد من اتجاه الهواء نحو السقف ومنع التيارات الباردة على الكتاكيت.</p></div> </div> </div> <div class="note ok"><div class="ic">✅</div><div class="tx"><b>هدف الجاهزية:</b> أن تكون الحرارة والرطوبة ثابتة عند القيم الموصى بها لمدة 24 ساعة كاملة قبل وصول الكتاكيت — تُقاس عند مستوى الكتكوت في منطقة العلف والماء.</div></div> `
},

  sub:'إنزال الكتاكيت بسرعة ولطف وتوزيعها بالتساوي على الورق، ثم تركها تستقر 1-2 ساعة قبل أول فحص للبيئة وامتلاء الحوصلة.',
  html:` <div class="box"><div class="bh"><span class="ic">🐣</span>تسلسل التسكين</div> <div class="steps"> <div class="step-item"><div class="n"></div><div class="tx"><b>قبل النزول:</b> فحص أخير لتوفّر وتوزيع العلف والماء في منطقة التحضين.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>التسكين:</b> إنزال الكتاكيت بسرعة ولطف وتوزيعها بالتساوي على الورق مباشرةً ليجدوا العلف فوراً.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>إزالة الصناديق:</b> إخراج صناديق الكتاكيت الفارغة من العنبر فوراً لتجنّب مشاكل الأمان الحيوي.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>الاستقرار:</b> ترك الكتاكيت 1-2 ساعة لتعتاد على البيئة الجديدة مع توفّر العلف والماء.</div></div> <div class="step-item"><div class="n"></div><div class="tx"><b>الفحص الأول:</b> بعد 1-2 ساعة، التأكد أن جميع الكتاكيت وجدت العلف والماء وضبط البيئة حسب السلوك.</div></div> </div> </div> <div class="row r3"> <div class="stat b"><div class="v">≤ 2م</div><div class="l">أقصى مسافة للوصول للعلف والماء</div></div> <div class="stat o"><div class="v">8 / 1000</div><div class="l">حلمات شرب (نبل) لكل ألف كتكوت</div></div> <div class="stat g"><div class="v">1-2 ساعة</div><div class="l">فترة الاستقرار قبل الفحص</div></div> </div> <div class="note"><div class="ic">⏱️</div><div class="tx"><b>تنبيه:</b> كلما طالت مدة بقاء الكتاكيت في الصناديق بعد الوصول، زاد خطر ارتفاع الحرارة والجفاف — مما يضعف البداية والتجانس والنمو.</div></div> `
},

  html:` <div class="box tone"><div class="bh"><span class="ic">🖐️</span>طريقة الفحص</div> <p>اجمع عيّنة <b>30-40 كتكوت</b> من <b>3-4 أماكن</b> مختلفة في العنبر، وجُسّ الحوصلة بلطف لكل منها:</p> </div> <div class="row r3"> <div class="box" style="border-color:#bfe0cd"><div class="bh" style="color:var(--green)"><span class="ic">🟢</span>ممتلئة وطرية ومستديرة</div> <p>ممتاز — الكتكوت وجد العلف والماء بنجاح.</p></div> <div class="box" style="border-color:#f0dca8"><div class="bh" style="color:var(--amber)"><span class="ic">🟡</span>ممتلئة لكن صلبة</div> <p>تحذير — استهلك العلف دون كمية كافية من الماء.</p></div> <div class="box" style="border-color:#eec4ba"><div class="bh" style="color:var(--red)"><span class="ic">🔴</span>فارغة</div> <p>خطر — الكتكوت لم يبدأ الأكل أو الشرب إطلاقاً.</p></div> </div> <div class="box"><div class="bh"><span class="ic">🎯</span>الأهداف الزمنية للحد الأدنى لنسبة الامتلاء</div> <table><thead><tr><th>الوقت بعد التسكين</th><th>الحد الأدنى لنسبة امتلاء الحوصلة</th></tr></thead> <tbody> <tr><td><b>ساعتان</b></td><td>75%</td></tr> <tr><td><b>4 ساعات</b></td><td>80%</td></tr> <tr><td><b>8 ساعات</b></td><td>أكثر من 80%</td></tr> <tr><td><b>12 ساعة</b></td><td>أكثر من 85%</td></tr> <tr><td><b>24 ساعة</b></td><td class="t-ok">أكثر من 95% ✓</td></tr> </tbody></table> </div> <div class="note ok"><div class="ic">🎯</div><div class="tx"><b>الهدف الأهم:</b> الوصول إلى أكثر من <b>95%</b> امتلاء بعد 24 ساعة. الامتلاء المبكر في أول 2-4 ساعات حاسم — كلما أسرع الكتكوت في الوصول لـ100%، كانت البداية أفضل. عند عدم تحقّق النسب راجع الحرارة وتوفّر الماء وشدة الإضاءة فوراً.</div></div> `
},

  sub:'الماء النظيف بالكمية والحرارة المناسبة هو أهم عنصر غذائي. معايير الجودة والتعقيم ومعدلات التدفق حسب العمر.',
  html:` <div class="row r4"> <div class="stat b"><div class="v">&lt; 1000</div><div class="l">إجمالي الأملاح الذائبة TDS (جزء/مليون)</div></div> <div class="stat t"><div class="v">6.5-8.5</div><div class="l">الرقم الهيدروجيني pH المثالي</div></div> <div class="stat g"><div class="v">3-5</div><div class="l">الكلور الحر عند النبل (جزء/مليون)</div></div> <div class="stat o"><div class="v">650-800</div><div class="l">جهد الأكسدة ORP (ملي فولت)</div></div> </div> <div class="row r2"> <div class="box"><div class="bh"><span class="ic">🔬</span>معايير الجودة</div> <ul class="chk"> <li>بكتيريا القولون: <b>صفر</b> وحدة تشكيل مستعمرة/مل.</li> <li>عسر الماء أقل من <b>100</b> جزء/مليون (الماء اليسير أفضل).</li> <li>الحديد أعلى من 3 ملجم/لتر أو وجود رواسب: استخدم فلتر <b>40-50 ميكرون</b>.</li> <li>تحليل شامل للمياه <b>سنوياً</b> كحد أدنى.</li> </ul> </div> <div class="box"><div class="bh"><span class="ic">🛡️</span>التعقيم والمتابعة</div> <ul class="chk"> <li>الكلور فعّال فقط مع pH بين 6.5-8.5.</li> <li>تنظيف وتعقيم الخطوط بين الدورات وإزالة البيوفيلم.</li> <li>فحص المياه عند المصدر والخزان ونقاط الشرب قبل الإدخال.</li> <li>الكشف بإجراء جريان الماء من نهاية كل خط لرؤية الرواسب.</li> </ul> </div> </div> <div class="box tone"><div class="bh"><span class="ic">📊</span>معدلات تدفق المياه الموصى بها (النبل)</div> <table><thead><tr><th>عمر الطائر (يوم)</th><th>معدل التدفق (مل/دقيقة)</th></tr></thead> <tbody> <tr><td>0 - 7</td><td>20 - 29</td></tr> <tr><td>8 - 14</td><td>30 - 39</td></tr> <tr><td>15 - 21</td><td>40 - 49</td></tr> <tr><td>22 - 28</td><td>50 - 69</td></tr> <tr><td>أكثر من 28</td><td>70 - 100</td></tr> </tbody></table> </div> <div class="note bad"><div class="ic">🌡️</div><div class="tx"><b>حرارة الماء:</b> المثالي 18-21°م. أقل من 5°م أو أعلى من 30°م يقلّل الاستهلاك، وفوق 44°م ترفض الطيور الشرب تماماً. زاوية النبل عند الشرب: 35-45° للكتكوت، 75-85° للطائر الأكبر.</div></div> `

{

function renderSheets(){
  const sel=document.getElementById('jump');
  const wrap=document.getElementById('sheets');
  SHEETS.forEach(s=>{
    const opt=document.createElement('option');
    opt.value='sheet-'+s.step; opt.textContent=s.step+'. '+s.title; sel.appendChild(opt);
    const div=document.createElement('div');
    div.className='sheet'; div.id='sheet-'+s.step;
    div.innerHTML=`<div class="kicker">${s.kicker}</div><h2>${s.title}</h2>
      <div class="sub-desc">${s.sub||''}</div>
      <div class="guide-sheet">${s.html||''}</div>`;
    wrap.appendChild(div);
  });
}
function jumpTo(id){if(id)document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});}
renderSheets();
