<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة مزارع الدواجن - الشركة المصرية</title>
<style>
/* ============================================================
   نظام تصميم Enterprise — Poultry ERP
   Light theme · RTL · design tokens · production-grade
   ============================================================ */
:root{
  /* ---- Palette (light, premium) ---- */
  --bg:#f6f7fb;
  --bg2:#eef0f7;
  --surface:#ffffff;
  --card:#ffffff;
  --card2:#f8f9fd;
  --border:#e7e9f2;
  --border2:#d8dbe9;
  --ring:rgba(99,91,255,.35);

  --primary:#635bff;        /* Stripe-like indigo */
  --primary-d:#5147e6;
  --primary-l:#8b85ff;
  --primary-soft:#eef0ff;

  --txt:#1a1c2e;
  --txt2:#5b607a;
  --txt3:#9095af;
  --txt-on:#ffffff;

  --green:#0f9d58; --green-l:#16c172;
  --red:#e23048;   --red-l:#fb5a6f;
  --amber:#d68310; --amber-l:#f5a623;
  --cyan:#0e9bbd;  --cyan-l:#22d3ee;
  --purple:#8b3ff0;--purple-l:#a855f7;
  --blue:#2f6bff;  --blue-l:#5b8def;
  --orange:#e8590c;--orange-l:#fb923c;
  --pink:#d6457f;  --pink-l:#ec4899;
  --teal:#0d9488;  --teal-l:#2dd4bf;
  --slate:#566073; --slate-l:#7c889e;
  --indigo:#4f46e5;--indigo-l:#818cf8;

  --ok-bg:rgba(15,157,88,.12);
  --warn-bg:rgba(214,131,16,.14);
  --bad-bg:rgba(226,48,72,.12);
  --info-bg:rgba(99,91,255,.12);

  /* ---- Gradients ---- */
  --grad:linear-gradient(135deg,#635bff,#8b85ff 55%,#a855f7);
  --grad2:linear-gradient(135deg,#5147e6,#7c5cff);
  --grad-green:linear-gradient(135deg,#0f9d58,#16c172);
  --grad-red:linear-gradient(135deg,#e23048,#fb5a6f);
  --grad-blue:linear-gradient(135deg,#2f6bff,#5b8def);
  --grad-surface:linear-gradient(180deg,#ffffff,#fbfbfe);

  /* ---- Radius ---- */
  --r-xs:8px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:24px; --r-pill:999px;

  /* ---- Spacing scale ---- */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:32px;

  /* ---- Shadows (soft, layered) ---- */
  --sh-xs:0 1px 2px rgba(26,28,46,.06);
  --sh-sm:0 2px 6px rgba(26,28,46,.07),0 1px 2px rgba(26,28,46,.05);
  --sh-md:0 8px 24px rgba(26,28,46,.09),0 2px 6px rgba(26,28,46,.05);
  --sh-lg:0 18px 48px rgba(26,28,46,.14),0 6px 16px rgba(26,28,46,.08);
  --sh-primary:0 8px 24px rgba(99,91,255,.32);
  --sh-focus:0 0 0 4px var(--ring);

  /* ---- Type scale ---- */
  --fs-xs:11.5px; --fs-sm:12.5px; --fs-base:14px; --fs-md:15px;
  --fs-lg:18px; --fs-xl:22px; --fs-2xl:28px; --fs-3xl:34px;

  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter','Segoe UI','Helvetica Neue',Tahoma,Arial,sans-serif;
  background:
    radial-gradient(900px 500px at 88% -8%,#eceaff,transparent 60%),
    radial-gradient(700px 500px at -5% 0%,#e7f6ff,transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--txt);
  font-size:var(--fs-base);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:var(--r-pill);border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--primary-l)}
::selection{background:var(--primary-soft);color:var(--primary-d)}

/* ===================== Login ===================== */
#login{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    radial-gradient(800px 500px at 75% -10%,#e4e1ff,transparent 60%),
    radial-gradient(700px 500px at 10% 110%,#dff3ff,transparent 55%),
    var(--bg);
}
.login-card{
  background:var(--grad-surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:44px 38px;width:100%;max-width:430px;box-shadow:var(--sh-lg);position:relative;overflow:hidden;
  animation:popIn .5s var(--ease-out) both;
}
.login-card::before{content:'';position:absolute;inset:0 0 auto 0;height:5px;background:var(--grad)}
.login-card .logo{font-size:54px;text-align:center;margin-bottom:10px;filter:drop-shadow(0 6px 14px rgba(99,91,255,.3))}
.login-card h1{font-size:var(--fs-xl);text-align:center;margin-bottom:6px;font-weight:800;letter-spacing:-.5px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-card .sub{text-align:center;color:var(--txt2);font-size:var(--fs-sm);margin-bottom:30px}
.login-card label{display:block;font-size:var(--fs-sm);color:var(--txt2);margin:16px 0 7px;font-weight:600}
.login-card select,.login-card input{width:100%}
.login-err{color:var(--red);font-size:var(--fs-sm);text-align:center;margin-top:14px;min-height:16px;font-weight:600}

/* ===================== Inputs ===================== */
input,select,textarea{
  background:var(--surface);border:1.5px solid var(--border);color:var(--txt);
  padding:11px 13px;border-radius:var(--r-sm);font-family:inherit;font-size:var(--fs-base);
  outline:none;transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s;
}
input:hover,select:hover,textarea:hover{border-color:var(--border2)}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:var(--sh-focus)}
input::placeholder{color:var(--txt3)}
select{cursor:pointer}

/* ===================== Buttons ===================== */
button{font-family:inherit;cursor:pointer;border:none;transition:transform .15s var(--ease),box-shadow .2s var(--ease),filter .2s,background .2s}
.btn{
  background:var(--grad);color:var(--txt-on);padding:11px 20px;border-radius:var(--r-sm);
  font-size:var(--fs-base);font-weight:600;box-shadow:var(--sh-primary);letter-spacing:.1px;
  display:inline-flex;align-items:center;gap:7px;
}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 12px 28px rgba(99,91,255,.42)}
.btn:active{transform:translateY(0);filter:brightness(.98)}
.btn-lg{width:100%;padding:14px;font-size:var(--fs-md);margin-top:24px;justify-content:center}
.btn-sec{background:var(--surface);color:var(--txt);border:1.5px solid var(--border2);box-shadow:var(--sh-xs)}
.btn-sec:hover{background:var(--card2);border-color:var(--primary-l);color:var(--primary-d);filter:none}
.btn-green{background:var(--grad-green);box-shadow:0 8px 24px rgba(15,157,88,.3)}
.btn-red{background:var(--grad-red);box-shadow:0 8px 24px rgba(226,48,72,.3)}
.btn-amber{background:linear-gradient(135deg,#d68310,#f5a623);box-shadow:0 8px 24px rgba(214,131,16,.3)}
.btn-green:hover,.btn-red:hover,.btn-amber:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn-sm{padding:7px 13px;font-size:var(--fs-sm);border-radius:var(--r-xs)}
.btn-xs{padding:5px 10px;font-size:var(--fs-xs);border-radius:var(--r-xs);box-shadow:none}

/* ===================== Layout ===================== */
#app{display:none;min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:12px 22px;
  background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--border);box-shadow:var(--sh-xs);
}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:var(--fs-md);white-space:nowrap;letter-spacing:-.3px}
.topbar .brand .ic{font-size:24px;filter:drop-shadow(0 3px 8px rgba(99,91,255,.35))}
.topbar .brand span:last-child{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.topbar .spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--border);
  padding:6px 13px;border-radius:var(--r-pill);font-size:var(--fs-sm);box-shadow:var(--sh-xs)}
.user-chip .role{color:var(--primary-d);font-weight:700}
.menu-btn{display:none;background:var(--card2);border:1px solid var(--border);color:var(--txt);
  width:40px;height:40px;border-radius:var(--r-sm);font-size:18px}

.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:248px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);
  border-left:1px solid var(--border);padding:18px 12px;flex-shrink:0;overflow-y:auto}
.nav-group{font-size:var(--fs-xs);color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;
  margin:20px 12px 8px;font-weight:800}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm);
  color:var(--txt2);cursor:pointer;font-size:13.5px;margin-bottom:3px;font-weight:600;position:relative;
  transition:background .18s var(--ease),color .18s,transform .12s}
.nav-item .ic{font-size:18px;width:24px;text-align:center}
.nav-item:hover{background:var(--primary-soft);color:var(--primary-d)}
.nav-item.active{background:var(--grad);color:var(--txt-on);box-shadow:var(--sh-primary)}
.nav-item.active::before{content:'';position:absolute;right:-12px;top:50%;transform:translateY(-50%);
  width:4px;height:60%;background:var(--primary);border-radius:var(--r-pill)}
.main{flex:1;padding:26px;overflow-x:auto;min-width:0}
.page{display:none;animation:fade .3s var(--ease-out)}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.page-head{display:flex;align-items:center;gap:13px;margin-bottom:24px;flex-wrap:wrap}
.page-head h2{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-.7px}
.page-head .desc{color:var(--txt2);font-size:var(--fs-sm)}
.page-head .spacer{flex:1}

/* ===================== Cards ===================== */
.card{background:var(--grad-surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:22px;box-shadow:var(--sh-sm);transition:box-shadow .25s var(--ease),transform .25s var(--ease)}
.card:hover{box-shadow:var(--sh-md)}
.card+.card{margin-top:18px}
.card-title{font-size:var(--fs-md);font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:9px;letter-spacing:-.3px}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}

/* ---- KPI ---- */
.kpi{background:var(--grad2);border:none;border-radius:var(--r-lg);padding:20px;position:relative;overflow:hidden;
  box-shadow:var(--sh-md);color:var(--txt-on);transition:transform .25s var(--ease-out),box-shadow .25s}
.kpi::before{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(255,255,255,.22),transparent 70%);border-radius:50%}
.kpi.g{background:var(--grad-green)}
.kpi.r{background:var(--grad-red)}
.kpi.a{background:linear-gradient(135deg,#d68310,#f5a623)}
.kpi.c{background:linear-gradient(135deg,#0e9bbd,#22d3ee)}
.kpi.p{background:linear-gradient(135deg,#8b3ff0,#a855f7)}
.kpi .lbl{font-size:var(--fs-sm);color:rgba(255,255,255,.9);margin-bottom:9px;display:flex;align-items:center;gap:7px;font-weight:600}
.kpi .val{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-1px;color:#fff;font-variant-numeric:tabular-nums;line-height:1.15}
.kpi .sub{font-size:var(--fs-xs);color:rgba(255,255,255,.78);margin-top:6px;font-weight:500}
.kpi.lift:hover{transform:translateY(-5px);box-shadow:var(--sh-lg)}

/* ===================== Tables ===================== */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--sh-xs);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
thead th{
  background:var(--grad2);color:var(--txt-on);font-weight:700;padding:13px 15px;text-align:right;
  position:sticky;top:0;font-size:var(--fs-sm);letter-spacing:.2px;
}
thead th:first-child{border-top-right-radius:var(--r-md)}
thead th:last-child{border-top-left-radius:var(--r-md)}
tbody td{padding:12px 15px;border-bottom:1px solid var(--border);color:var(--txt)}
tbody tr:nth-child(even){background:var(--card2)}
tbody tr:hover{background:var(--primary-soft);transition:background .15s}
tbody tr:last-child td{border-bottom:none}
tbody td:first-child{color:var(--primary-d);font-weight:700;border-right:3px solid transparent}
tbody tr:hover td:first-child{border-right-color:var(--primary)}
.tbl-total td{background:var(--grad);color:var(--txt-on)!important;font-weight:800;border-top:2px solid var(--primary-l)}
.tbl-total td:first-child{color:var(--txt-on)!important}
td.editable{cursor:pointer;border-radius:var(--r-xs);transition:.15s}
td.editable:hover{background:var(--primary-soft);box-shadow:inset 0 0 0 1.5px var(--primary)}
td.num,th.num{text-align:center;font-variant-numeric:tabular-nums}

/* ===================== Badges ===================== */
.badge{display:inline-block;padding:4px 11px;border-radius:var(--r-pill);font-size:var(--fs-xs);font-weight:700;letter-spacing:.2px}
.b-ok{background:var(--ok-bg);color:var(--green)}
.b-warn{background:var(--warn-bg);color:var(--amber)}
.b-bad{background:var(--bad-bg);color:var(--red)}
.b-info{background:var(--info-bg);color:var(--primary-d)}
.b-mut{background:var(--bg2);color:var(--txt2)}

/* ===================== Toolbar / search / fields ===================== */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar input,.toolbar select{padding:9px 12px;font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:var(--fs-sm);color:var(--txt2);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{width:100%}
.row-fields{display:grid;gap:14px}
.hint{font-size:var(--fs-xs);color:var(--txt3);margin-top:5px;line-height:1.5}
.divider{height:1px;background:var(--border);margin:18px 0}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty .ic{font-size:50px;margin-bottom:14px;opacity:.55;display:block}
.access-deny{text-align:center;padding:64px 20px;color:var(--txt2)}
.access-deny .ic{font-size:58px;margin-bottom:16px;display:block}

/* ===================== Modal ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(26,28,46,.42);backdrop-filter:blur(5px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:18px;animation:fade .2s}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);
  animation:popIn .32s var(--ease-out)}
.modal-h{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1}
.modal-h h3{font-size:var(--fs-lg);flex:1;font-weight:800;letter-spacing:-.3px}
.modal-h .x{background:var(--card2);border:1px solid var(--border);color:var(--txt2);
  width:32px;height:32px;border-radius:var(--r-xs);font-size:16px;transition:.15s}
.modal-h .x:hover{background:var(--bad-bg);color:var(--red);border-color:var(--red)}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-start;
  position:sticky;bottom:0;background:var(--surface)}

/* ===================== Toast ===================== */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px);
  background:var(--grad-green);color:#fff;padding:13px 24px;border-radius:var(--r-pill);font-weight:700;
  z-index:500;opacity:0;transition:.35s var(--ease-out);box-shadow:var(--sh-lg)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--grad-red)}

/* ===================== Shift tabs / segmented ===================== */
.shift-tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.shift-tab{flex:1;min-width:120px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r-md);padding:13px;text-align:center;cursor:pointer;transition:.18s var(--ease);box-shadow:var(--sh-xs)}
.shift-tab:hover{border-color:var(--primary-l);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.shift-tab .t{font-size:var(--fs-base);font-weight:700;margin-bottom:3px}
.shift-tab .h{font-size:var(--fs-xs);color:var(--txt3)}
.shift-tab.active{border-color:transparent;background:var(--grad);color:var(--txt-on);box-shadow:var(--sh-primary)}
.shift-tab.active .h{color:rgba(255,255,255,.8)}
.shift-tab.done{border-color:var(--green)}
.shift-tab.done .t::after{content:' ✓';color:var(--green)}
.shift-tab.active.done .t::after{color:#fff}

.seg{display:inline-flex;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-xs)}
.seg button{background:transparent;color:var(--txt2);padding:8px 15px;font-size:var(--fs-sm);font-weight:700;transition:.15s}
.seg button:hover{background:var(--primary-soft);color:var(--primary-d)}
.seg button.on{background:var(--grad);color:var(--txt-on)}

/* ===================== House block (daily) ===================== */
.house-block{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-md);padding:15px;margin-bottom:13px}
.house-block h4{font-size:13.5px;margin-bottom:11px;color:var(--primary-d)}

/* ===================== Charts / legend ===================== */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;box-shadow:var(--sh-xs)}
.chart-wrap canvas{width:100%;height:auto;display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:var(--fs-sm);color:var(--txt2);margin-top:10px}
.legend .it{display:flex;align-items:center;gap:7px;font-weight:600}
.legend .sw{width:16px;height:4px;border-radius:var(--r-pill)}

/* ===================== Bars ===================== */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .nm{width:150px;font-size:var(--fs-sm);color:var(--txt2);flex-shrink:0;font-weight:600}
.bar-track{flex:1;background:var(--bg2);border-radius:var(--r-pill);height:24px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:var(--r-pill);display:flex;align-items:center;justify-content:flex-end;
  padding:0 10px;font-size:var(--fs-xs);font-weight:800;color:#fff;min-width:30px;box-shadow:var(--sh-xs)}
.bar-row .vl{width:128px;text-align:left;font-size:var(--fs-sm);font-variant-numeric:tabular-nums;font-weight:600}

/* ===================== Stat rows (colored key/value) ===================== */
.statrow{display:flex;align-items:center;justify-content:space-between;border-radius:var(--r-md);
  padding:13px 17px;margin-bottom:10px;color:#fff;box-shadow:var(--sh-sm);transition:transform .18s var(--ease),box-shadow .18s}
.statrow:hover{transform:translateX(-3px);box-shadow:var(--sh-md)}
.statrow .lab{font-size:var(--fs-sm);font-weight:700;opacity:.96}
.statrow .num{font-size:var(--fs-lg);font-weight:800;font-variant-numeric:tabular-nums}
.st-blue{background:linear-gradient(120deg,#3551d6,#5b8def)}
.st-green{background:linear-gradient(120deg,#0f9d58,#16c172)}
.st-amber{background:linear-gradient(120deg,#c06f0a,#f5a623)}
.st-cyan{background:linear-gradient(120deg,#0a7f9c,#22d3ee)}
.st-purple{background:linear-gradient(120deg,#7a2fd6,#a855f7)}
.st-rose{background:linear-gradient(120deg,#c81e3f,#fb5a6f)}
.st-teal{background:linear-gradient(120deg,#0c7a70,#2dd4bf)}
.st-slate{background:linear-gradient(120deg,#475063,#7c889e)}
.st-indigo{background:linear-gradient(120deg,#3d34c9,#818cf8)}
.st-orange{background:linear-gradient(120deg,#cc4a08,#fb923c)}
.st-trader{background:linear-gradient(120deg,#9333ea,#c084fc)}

/* ===================== Owner hero ===================== */
.owner-hero{background:var(--grad);border-radius:var(--r-xl);padding:26px 28px;margin-bottom:20px;
  box-shadow:var(--sh-lg);position:relative;overflow:hidden;animation:popIn .5s var(--ease-out) both;color:#fff}
.owner-hero::after{content:'';position:absolute;left:-50px;top:-50px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%);border-radius:50%}
.owner-hero h2{font-size:var(--fs-2xl);color:#fff;margin-bottom:5px;font-weight:800;letter-spacing:-.6px}
.owner-hero .d{color:rgba(255,255,255,.9);font-size:var(--fs-sm)}
.owner-hero .date{position:absolute;left:26px;top:26px;background:rgba(255,255,255,.2);
  padding:7px 15px;border-radius:var(--r-pill);font-size:var(--fs-sm);color:#fff;font-weight:700;backdrop-filter:blur(4px)}

/* ===================== Override (super admin) ===================== */
.ov-val{position:relative;background:var(--warn-bg)!important;border-radius:var(--r-xs);padding:2px 8px;
  box-shadow:inset 0 0 0 1.5px var(--amber);font-weight:800;color:var(--amber)}
.ov-val::after{content:'✏';font-size:9px;margin-right:4px;opacity:.85}
.ov-edit{cursor:pointer}
.ov-edit:hover{outline:1.5px dashed var(--amber);outline-offset:2px;border-radius:var(--r-xs)}

/* ===================== Misc helpers ===================== */
.ref-good{color:var(--green);font-weight:700}
.ref-bad{color:var(--amber);font-weight:700}
.spacer{flex:1}

/* ===================== Animations ===================== */
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
@keyframes growBar{from{width:0!important}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,91,255,.45)}50%{box-shadow:0 0 0 9px rgba(99,91,255,0)}}
.anim-kpi{animation:popIn .5s var(--ease-out) both}
.anim-kpi:nth-child(1){animation-delay:.04s}.anim-kpi:nth-child(2){animation-delay:.1s}
.anim-kpi:nth-child(3){animation-delay:.16s}.anim-kpi:nth-child(4){animation-delay:.22s}
.grow{animation:growBar 1s var(--ease-out) both}
.pulse{animation:pulse 2s infinite}

/* ===================== Responsive ===================== */
@media(max-width:1024px){
  .g4,.g5{grid-template-columns:repeat(2,1fr)}
  .main{padding:20px}
}
@media(max-width:880px){
  .sidebar{position:fixed;right:0;top:58px;bottom:0;z-index:60;transform:translateX(100%);
    transition:transform .28s var(--ease-out);box-shadow:var(--sh-lg);width:260px}
  .sidebar.open{transform:none}
  .menu-btn{display:block}
  .g2,.g3,.g4,.g5{grid-template-columns:1fr}
  .main{padding:16px}
  .uname{display:none}
  .page-head h2{font-size:var(--fs-xl)}
  .bar-row .nm{width:110px}
  .bar-row .vl{width:92px}
}
@media(max-width:520px){
  .topbar{padding:10px 14px}
  .card{padding:16px}
  .statrow .num{font-size:var(--fs-md)}
}

  const v=localStorage.getItem('fb_'+k); if(v)FIREBASE_CONFIG[k]=v;
});
function fbReady(){return FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.apiKey;}
function fbInit(){
  if(!fbReady()){console.log('Firebase غير مُهيّأ — يعمل أوف لاين');return false;}
  try{
    if(!FB){FB=firebase.initializeApp(FIREBASE_CONFIG);FB_DB=firebase.database();}
    FB_ON=true;
    // اشترك في التحديثات اللحظية
    FB_DB.ref('erp').on('value',snap=>{
      const data=snap.val();
      if(!data)return;
      if(FB_SYNCING)return;        // تجاهل الصدى من كتابتنا
      const incoming=JSON.stringify(data);
      if(incoming===JSON.stringify(DB)){updateSyncBadge('متزامن ✓');return;} // لا تغيير فعلي — لا تعيد الرسم
      FB_REMOTE=true;
      DB=normalizeDB(data);
      invalidateCache();
      localStorage.setItem(DBKEY,incoming);
      FB_REMOTE=false;
      if(ME&&document.getElementById('app').style.display!=='none'){go(CUR);}
      updateSyncBadge('متزامن ✓');
    },err=>{console.warn('FB read error',err);updateSyncBadge('خطأ اتصال',true);});
    updateSyncBadge('متصل ☁️');
    startCloudBackupTimer();
    return true;
  }catch(e){console.error('FB init',e);return false;}
}
/* ادفع كامل قاعدة البيانات للسحابة (مع debounce لتقليل الكتابات) */
let _fbPushT=null;
function fbPush(){
  if(!FB_ON||FB_REMOTE)return;
  clearTimeout(_fbPushT);
  updateSyncBadge('جارٍ الحفظ…');
  _fbPushT=setTimeout(()=>{
    FB_SYNCING=true;
    FB_DB.ref('erp').set(DB)
      .then(()=>{updateSyncBadge('متزامن ✓');})
      .catch(e=>{console.warn('FB write',e);updateSyncBadge('فشل الحفظ السحابي',true);})
      .finally(()=>{setTimeout(()=>FB_SYNCING=false,400);});
  },700); // اجمع التعديلات المتتابعة في كتابة واحدة
}

/* ---- تحميل / حفظ ---- */
let DB=load();
function load(){try{const r=localStorage.getItem(DBKEY);const d=r?JSON.parse(r):defaultDB();return normalizeDB(d);}catch(e){return defaultDB();}}
/* يضمن وجود كل الحقول الأساسية مهما كانت البيانات قديمة أو ناقصة */
function normalizeDB(d){
  if(!d||typeof d!=='object')return defaultDB();
  const def=defaultDB();
  // الحقول التي يجب أن تكون مصفوفات
  ['users','farms','cycles','daily','feedMoves','medMoves','birdMoves','sales','yearlyRef'].forEach(k=>{
    if(!Array.isArray(d[k]))d[k]=[];
  });
  // الكائنات
  if(!d.labels||typeof d.labels!=='object')d.labels=def.labels;
  if(!d.settings||typeof d.settings!=='object')d.settings=def.settings;
  if(!Array.isArray(d.settings.medTypes)||!d.settings.medTypes.length)d.settings.medTypes=def.settings.medTypes;
  if(!Array.isArray(d.settings.medUnits)||!d.settings.medUnits.length)d.settings.medUnits=def.settings.medUnits;
  if(!Array.isArray(d.settings.diseases)||!d.settings.diseases.length)d.settings.diseases=def.settings.diseases;
  if(!Array.isArray(d.settings.customRoles))d.settings.customRoles=[];
  // لو مفيش مستخدمين خالص، ارجّع المستخدمين الافتراضيين
  if(!d.users.length)d.users=def.users;
  return d;
}
function save(){invalidateCache();localStorage.setItem(DBKEY,JSON.stringify(DB));autoBackup();if(FB_ON)fbPush();}

/* ---- النسخ الاحتياطي التلقائي اليومي (جوه المتصفح، آخر 30 يوم) ---- */
function loadBackups(){try{return JSON.parse(localStorage.getItem(BAKKEY))||{};}catch(e){return {};}}
function autoBackup(){
  // نسخة واحدة لكل يوم (تتحدّث خلال نفس اليوم) — نحتفظ بآخر 30 يوم
  const baks=loadBackups();
  const day=todayISO();
  baks[day]={ts:Date.now(),data:DB};
  // احتفظ بآخر 30 يوم فقط
  const days=Object.keys(baks).sort();
  while(days.length>30){const d=days.shift();delete baks[d];}
  try{localStorage.setItem(BAKKEY,JSON.stringify(baks));}
  catch(e){ // لو امتلأت المساحة، احذف الأقدم وأعد المحاولة
    const dd=Object.keys(baks).sort();if(dd.length){delete baks[dd[0]];localStorage.setItem(BAKKEY,JSON.stringify(baks));}
  }
}
function restoreBackup(day){
  const baks=loadBackups();if(!baks[day])return;
  if(!confirm('استرجاع نسخة يوم '+day+'؟ سيتم استبدال البيانات الحالية.\n(سيتم حفظ نسخة طوارئ قبل الاسترجاع.)'))return;
  // نسخة ما قبل الاسترجاع
  const baks2=loadBackups();baks2['_pre_restore']={ts:Date.now(),data:DB};
  try{localStorage.setItem(BAKKEY,JSON.stringify(baks2));}catch(e){}
  DB=JSON.parse(JSON.stringify(baks[day].data));
  localStorage.setItem(DBKEY,JSON.stringify(DB));
  toast('تم استرجاع نسخة '+day+' ✓');renderApp();
}
function deleteBackup(day){
  const baks=loadBackups();delete baks[day];localStorage.setItem(BAKKEY,JSON.stringify(baks));
  toast('تم حذف النسخة');renderSettings();
}
/* ===== النسخ الاحتياطية اليومية في Firebase (الساعة 3 صباحاً) ===== */
// تُكتب نسخة ليوم معيّن مرة واحدة، أول ما يفتح أي جهاز النظام بعد 3ص ولا توجد نسخة لليوم.
function cloudBackupKey(){ return todayISO(); }
function maybeCloudBackup(){
  if(!FB_ON||!FB_DB)return;
  const now=new Date();
  if(now.getHours()<3)return;            // قبل الساعة 3 صباحاً لا نأخذ نسخة اليوم
  const day=cloudBackupKey();
  FB_DB.ref('backups/'+day).once('value').then(snap=>{
    if(snap.exists())return;             // نسخة اليوم موجودة بالفعل
    const payload={ts:Date.now(),by:(ME&&ME.name)||'auto',data:DB};
    FB_DB.ref('backups/'+day).set(payload).then(()=>{
      // احتفظ بآخر 30 نسخة فقط
      FB_DB.ref('backups').once('value').then(s=>{
        const all=s.val()||{};const days=Object.keys(all).sort();
        while(days.length>30){const d=days.shift();FB_DB.ref('backups/'+d).remove();}
      });
    }).catch(()=>{});
  }).catch(()=>{});
}
let _cloudBakTimer=null;
function startCloudBackupTimer(){
  if(_cloudBakTimer)return;
  maybeCloudBackup();                       // فحص فوري عند الفتح
  _cloudBakTimer=setInterval(maybeCloudBackup, 30*60*1000); // كل 30 دقيقة
}
function listCloudBackups(cb){
  if(!FB_ON||!FB_DB){cb({});return;}
  FB_DB.ref('backups').once('value').then(s=>cb(s.val()||{})).catch(()=>cb({}));
}
function restoreCloudBackup(day){
  if(!FB_ON||!FB_DB)return;
  if(!confirm('استرجاع نسخة سحابية ليوم '+day+'؟ سيتم استبدال البيانات الحالية على كل الأجهزة.'))return;
  FB_DB.ref('backups/'+day).once('value').then(snap=>{
    const b=snap.val();if(!b||!b.data){toast('النسخة غير موجودة',1);return;}
    DB=normalizeDB(b.data);invalidateCache();localStorage.setItem(DBKEY,JSON.stringify(DB));
    if(FB_ON)fbPush();
    toast('تم استرجاع نسخة '+day+' ✓');renderApp();
  });
}

function fmt(n,d=0){if(n==null||isNaN(n))return '0';return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function todayISO(){return new Date().toISOString().slice(0,10);}

/* ---- حساب يوم العمر للدورة في تاريخ معين ---- */
function ageOnDate(cycle,dateISO){
  if(!cycle||!cycle.startDate)return 0;
  const a=new Date(cycle.startDate), b=new Date(dateISO);
  return Math.floor((b-a)/86400000)+1;
}

/* ---- تجميع بيانات يوم واحد لعنبر (كل الفترات) ---- */
function dayAggregate(cycleId,houseId,dateISO){
  const recs=DB.daily.filter(d=>d.cycleId===cycleId&&d.houseId===houseId&&d.date===dateISO);
  const sum=(k)=>recs.reduce((s,r)=>s+(Number(r[k])||0),0);
  const closing=recs.find(r=>r.closed)||{};
  return {
    dead:sum('dead'), feed:sum('feed'), water:sum('water'),
    shifts:recs.length, closed:recs.some(r=>r.closed),
    temp:closing.temp||0,tempHi:closing.tempHi||0,tempLo:closing.tempLo||0,
    humidity:closing.humidity||0,culls:closing.culls||0,weight:closing.weight||0,
    notes:closing.notes||'', recs
  };
}

/* ---- مخزون العلف الحالي لدورة ---- */
function feedStock(cycleId){
  const cyc=cycleById(cycleId); if(!cyc)return 0;
  let stock=0;
  DB.feedMoves.filter(m=>m.cycleId===cycleId).forEach(m=>{
    if(m.type==='in'||m.type==='transfer_in')stock+=Number(m.qty)||0;
    else if(m.type==='transfer_out'||m.type==='return')stock-=Number(m.qty)||0;
  });
  // يخصم المستهلك اليومي
  const used=DB.daily.filter(d=>d.cycleId===cycleId).reduce((s,d)=>s+(Number(d.feed)||0),0);
  return stock-used;
}

/* ---- إجمالي تسكين الدورة (مجموع العنابر) ---- */
function cyclePlaced(cyc){
  if(!cyc)return 0;
  if(cyc.placedByHouse){return Object.values(cyc.placedByHouse).reduce((s,v)=>s+(Number(v)||0),0);}
  return Number(cyc.placed)||0; // توافق مع الدورات القديمة
}

/* ---- العدد المتبقي من الطيور (إجمالي الدورة) ---- */
function birdsRemaining(cycleId){
  const cyc=cycleById(cycleId); if(!cyc)return 0;
  let n=cyclePlaced(cyc);
  n-=DB.daily.filter(d=>d.cycleId===cycleId).reduce((s,d)=>s+(Number(d.dead)||0)+(Number(d.culls)||0),0);
  n-=DB.sales.filter(s=>s.cycleId===cycleId).reduce((s,x)=>s+(Number(x.count)||0),0);
  DB.birdMoves.filter(m=>m.cycleId===cycleId).forEach(m=>{
    if(m.type==='transfer_in')n+=Number(m.qty)||0;
    else if(m.type==='transfer_out')n-=Number(m.qty)||0;
  });
  return n;
}

/* ---- المتبقي لعنبر واحد ---- */
function birdsRemainingHouse(cycleId,houseId){
  const cyc=cycleById(cycleId); if(!cyc)return 0;
  let n=Number((cyc.placedByHouse||{})[houseId])||0;
  // النافق لكل عنبر (السقاوات تُسجَّل على مستوى المزرعة)
  n-=DB.daily.filter(d=>d.cycleId===cycleId&&d.houseId===houseId).reduce((s,d)=>s+(Number(d.dead)||0),0);
  return n;
}
/* ---- نافق/علف تراكمي لعنبر ---- */
function houseDeadCum(cycleId,houseId){return DB.daily.filter(d=>d.cycleId===cycleId&&d.houseId===houseId).reduce((s,d)=>s+(Number(d.dead)||0),0);}
function houseFeedCum(cycleId,houseId){return DB.daily.filter(d=>d.cycleId===cycleId&&d.houseId===houseId).reduce((s,d)=>s+(Number(d.feed)||0),0);}

/* ============================================================
   محرك حسابات التقارير
   ============================================================ */
/* مبيعات دورة (عدد/وزن/مبلغ) */
function cycleSales(cycleId){
  const s=DB.sales.filter(x=>x.cycleId===cycleId);
  return {count:s.reduce((a,x)=>a+(Number(x.count)||0),0),
          weight:s.reduce((a,x)=>a+(Number(x.weight)||0),0),
          amount:s.reduce((a,x)=>a+(Number(x.amount)||0),0)};
}
/* مبيعات عنبر */
function houseSales(cycleId,houseId){
  const s=DB.sales.filter(x=>x.cycleId===cycleId&&x.houseId===houseId);
  return {count:s.reduce((a,x)=>a+(Number(x.count)||0),0),
          weight:s.reduce((a,x)=>a+(Number(x.weight)||0),0),
          amount:s.reduce((a,x)=>a+(Number(x.amount)||0),0)};
}
/* علف الدورة الكلي المستهلك */
function cycleFeedUsed(cycleId){return DB.daily.filter(d=>d.cycleId===cycleId).reduce((s,d)=>s+(Number(d.feed)||0),0);}
/* السقاوات (المستبعد) للدورة */
function cycleCulls(cycleId){return DB.daily.filter(d=>d.cycleId===cycleId).reduce((s,d)=>s+(Number(d.culls)||0),0);}
/* آخر وزن مُدخل للدورة */
function lastWeight(cycleId){
  const recs=DB.daily.filter(d=>d.cycleId===cycleId&&Number(d.weight)>0).sort((a,b)=>a.date<b.date?1:-1);
  return recs.length?Number(recs[0].weight):0;
}
/* عمر بداية/نهاية البيع */
function saleAges(cyc){
  const s=DB.sales.filter(x=>x.cycleId===cyc.id).map(x=>ageOnDate(cyc,x.date)).filter(a=>a>0);
  if(!s.length)return {start:0,end:0,avg:0};
  return {start:Math.min(...s),end:Math.max(...s),avg:Math.round(s.reduce((a,b)=>a+b,0)/s.length)};
}
/* الملخص النهائي الكامل لدورة (زي صورة تقرير ما بعد البيع) */
let _cfCache={}, _cfVer=0;
function invalidateCache(){_cfCache={};_cfVer++;}
function cycleFinal(cyc){
  // كاش: نتيجة محسوبة تُعاد ما لم تتغيّر البيانات (save يستدعي invalidateCache)
  const ck=cyc.id;
  if(_cfCache[ck])return _cfCache[ck];
  const _r=_cycleFinalCompute(cyc);
  _cfCache[ck]=_r;
  return _r;
}
function _cycleFinalCompute(cyc){
  const placed=cyclePlaced(cyc);
  const dead=deadCumulative(cyc.id);
  const culls=cycleCulls(cyc.id);
  const sales=cycleSales(cyc.id);
  const feed=cycleFeedUsed(cyc.id);
  const remain=birdsRemaining(cyc.id);
  const lw=lastWeight(cyc.id); // جم
  const deadPct=placed?(dead/placed*100):0;
  const livability=100-deadPct;
  const avgFeedBird=sales.count?(feed/sales.count):0; // كجم/طائر مباع
  // إجمالي اللحم = وزن المباع + (المتبقي الحي × آخر وزن)
  const liveMeat=remain*(lw/1000);
  const totalMeat=sales.weight+liveMeat;
  const avgWeightBird=sales.count?(sales.weight/sales.count):(lw/1000);
  const fcr=totalMeat>0?(feed/totalMeat):0;
  const ages=saleAges(cyc);
  // التكاليف والربحية
  const costs=cyc.costs||{chick:0,feedKg:0,other:0};
  const chickCost=placed*(costs.chick||0);
  const feedCost=feed*(costs.feedKg||0);
  // بنود التكلفة اليدوية + الأدوية التلقائية
  const expenses=cycleExpenses(cyc); // {items:[{label,amount}], total}
  const totalCost=chickCost+feedCost+expenses.total;
  const revenue=sales.amount;
  const traderDiscount=Number(cyc.traderDiscount)||0;
  const profit=revenue-totalCost-traderDiscount;
  const avgPrice=sales.weight?(sales.amount/sales.weight):0;
  const costPerKg=totalMeat>0?(totalCost/totalMeat):0;
  const profitPerKg=totalMeat>0?(profit/totalMeat):0;   // RO on kg = الربح لكل كيلو لحم
  const rofFeed=feed>0?(profit/feed):0;                  // ROF on kg feed = الربح لكل كيلو علف
  const cfcr=fcr>0?(fcr+((2-avgWeightBird)/4)):0;        // cfcr = FCR + (2 − متوسط الوزن) ÷ 4
  // عامل الكفاءة الأوروبي EPEF = (الحياتية% × متوسط الوزن كجم) ÷ (العمر × FCR) × 100
  const epefAge=ages.avg||ageOnDate(cyc,todayISO());
  const epef=(epefAge>0&&fcr>0)?((livability*avgWeightBird)/(epefAge*fcr)*100):0;
  const R={placed,dead,culls,sales,feed,remain,lw,deadPct,livability,avgFeedBird,
    liveMeat,totalMeat,avgWeightBird,fcr,ages,chickCost,feedCost,expenses,totalCost,
    revenue,traderDiscount,profit,avgPrice,costPerKg,profitPerKg,rofFeed,cfcr,epef,costs};
  // طبقة التجاوز اليدوي (Super Admin): أي قيمة محفوظة في cyc.overrides تتقفّل
  const ov=cyc.overrides||{};
  R._ov={}; // أي حقول متجاوَزة (لتلوينها)
  Object.keys(ov).forEach(k=>{ if(ov[k]!==''&&ov[k]!=null){ R[k]=Number(ov[k]); R._ov[k]=true; } });
  return R;
}
/* قراءة قيمة حقل من التقرير مع علامة إن كانت متجاوَزة يدوياً */
function isOverridden(cyc,key){return cyc.overrides&&cyc.overrides[key]!=null&&cyc.overrides[key]!=='';}

  ['epef','EPEF'],['revenue','الإيراد'],['totalCost','إجمالي التكلفة'],
  ['profit','صافي الربح'],['costPerKg','تكلفة الكيلو'],['profitPerKg','الربح للكيلو'],
  ['rofFeed','ROF/kg علف'],['traderDiscount','خصم التجار'],['remain','العدد المتبقي'],
];
function overrideModal(cycleId){
  if(ME.role!=='super'){toast('متاح لـ Super Admin فقط',1);return;}
  const cyc=cycleById(cycleId);if(!cyc)return;
  if(!cyc.overrides)cyc.overrides={};
  const F=cycleFinal(cyc);
  const rows=OV_FIELDS.map(([k,lbl])=>{
    const auto=F[k];const ov=cyc.overrides[k];
    return `<div class="pill-row" style="margin-bottom:7px;align-items:center">
      <span style="flex:1;font-size:12.5px">${lbl}</span>
      <span style="width:90px;text-align:left;font-size:11.5px;color:var(--txt3)">تلقائي: ${fmt(auto,2)}</span>
      <input type="number" step="0.001" data-k="${k}" value="${ov!=null?ov:''}" placeholder="يدوي" style="width:110px"
        ${ov!=null&&ov!==''?'class="ov-val"':''}></div>`;
  }).join('');
  openModal('🎛️ تعديل يدوي — '+esc(cyc.code),
    `<div class="hint" style="margin-bottom:10px;color:var(--amber)">⚠️ القيمة اليدوية تتقفّل وتتجاوز الحساب التلقائي وتظهر ملوّنة. اتركها فارغة للرجوع للتلقائي.</div>
     <div id="ovList">${rows}</div>`,
    `<button class="btn btn-green" onclick="saveOverrides('${cycleId}')">حفظ</button>
     <button class="btn-amber" onclick="clearOverrides('${cycleId}')">مسح الكل (رجوع تلقائي)</button>
     <button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
}
function saveOverrides(cycleId){
  const cyc=cycleById(cycleId);cyc.overrides={};
  $$('#ovList input[data-k]').forEach(inp=>{if(inp.value!=='')cyc.overrides[inp.dataset.k]=Number(inp.value);});
  save();closeModal();toast('تم حفظ التعديلات اليدوية ✓');renderReports();
}

/* صف إحصائي ملوّن مع أيقونة — للكروت key/value */
const ST_COLORS=['st-blue','st-teal','st-green','st-purple','st-amber','st-cyan','st-rose','st-indigo','st-orange','st-slate'];
function statRow(cls,icon,lab,val){return `<div class="statrow ${cls}"><span class="lab">${icon?icon+' ':''}${lab}</span><span class="num">${val}</span></div>`;}
/* شبكة من الصفوف الملوّنة: rows=[[icon,label,value,colorClass?],...] */
function statGrid(rows,cols){
  const body=rows.map((r,i)=>statRow(r[3]||ST_COLORS[i%ST_COLORS.length],r[0],r[1],r[2])).join('');
  return `<div class="grid ${cols||'g2'}" style="gap:9px">${body}</div>`;
}
/* بنود تكلفة الدورة: كتاكيت + علف + أدوية(تلقائي) + بنود يدوية */
function cycleExpenses(cyc){
  const items=[];
  // الأدوية والتحصينات تلقائياً من سجلاتها (لو لها سعر/إجمالي)
  const medTotal=DB.medMoves.filter(m=>m.cycleId===cyc.id).reduce((s,m)=>s+(Number(m.total)||0),0);
  if(medTotal>0)items.push({label:'أدوية ومطهرات وتحصينات (تلقائي)',amount:medTotal,auto:true});
  // بنود يدوية
  (cyc.expenses||[]).forEach(e=>items.push({label:e.label,amount:Number(e.amount)||0}));
  const total=items.reduce((s,i)=>s+i.amount,0);
  return {items,total};
}
/* تجميع عدة دورات (لتقرير المزرعة التراكمي والشركة) */
function aggregateCycles(cycList){
  const A={placed:0,dead:0,culls:0,feed:0,salesCount:0,salesWeight:0,salesAmount:0,
    remain:0,totalMeat:0,revenue:0,totalCost:0,profit:0,n:cycList.length};
  cycList.forEach(c=>{
    const f=cycleFinal(c);
    A.placed+=f.placed;A.dead+=f.dead;A.culls+=f.culls;A.feed+=f.feed;
    A.salesCount+=f.sales.count;A.salesWeight+=f.sales.weight;A.salesAmount+=f.sales.amount;
    A.remain+=f.remain;A.totalMeat+=f.totalMeat;A.revenue+=f.revenue;A.totalCost+=f.totalCost;A.profit+=f.profit;
  });
  A.deadPct=A.placed?(A.dead/A.placed*100):0;
  A.livability=100-A.deadPct;
  A.fcr=A.totalMeat>0?(A.feed/A.totalMeat):0;
  A.avgWeight=A.salesCount?(A.salesWeight/A.salesCount):0;
  A.avgPrice=A.salesWeight?(A.salesAmount/A.salesWeight):0;
  A.costPerKg=A.totalMeat>0?(A.totalCost/A.totalMeat):0;
  A.profitPerKg=A.totalMeat>0?(A.profit/A.totalMeat):0;
  A.rofFeed=A.feed>0?(A.profit/A.feed):0;
  A.cfcr=A.fcr>0?(A.fcr+((2-A.avgWeight)/4)):0;
  return A;
}
/* بيانات يوم واحد مجمّعة لدورة (للمقارنة بالكتالوج) */
function cycleDayData(cyc,dateISO){
  const recs=DB.daily.filter(d=>d.cycleId===cyc.id&&d.date===dateISO);
  return {
    dead:recs.reduce((s,r)=>s+(Number(r.dead)||0),0),
    feed:recs.reduce((s,r)=>s+(Number(r.feed)||0),0),
    water:recs.reduce((s,r)=>s+(Number(r.water)||0),0),
    weight:(recs.find(r=>r.closed)||{}).weight||0,
    age:ageOnDate(cyc,dateISO)
  };
}

  html+=`<div class="card"><div class="card-title">🔒 تقفيل اليوم — إجمالي المزرعة + البيانات الختامية</div>

function saveShift(){
  const cyc=cycleById(dailyState.cycleId);
  const farm=farmById(cyc.farm);
  // احفظ صف كل عنبر
  farm.houses.forEach(h=>{
    const dInp=$(`#shiftTbl input[data-h="${h.id}"][data-k="dead"]`);
    const fInp=$(`#shiftTbl input[data-h="${h.id}"][data-k="feed"]`);
    if(!dInp&&!fInp)return;
    const dead=dInp&&dInp.value!==''?Number(dInp.value):0;
    const feed=fInp&&fInp.value!==''?Number(fInp.value):0;
    let rec=DB.daily.find(d=>d.cycleId===cyc.id&&d.date===dailyState.date&&d.shift===dailyState.shift&&d.houseId===h.id);
    if(rec){rec.dead=dead;rec.feed=feed;}
    else{DB.daily.push({id:uid('d'),cycleId:cyc.id,farmId:cyc.farm,houseId:h.id,
      date:dailyState.date,shift:dailyState.shift,closed:false,dead,feed,water:0});}
  });
  // مياه المزرعة (سجل منفصل _farm_)
  const water=$('#sfWater').value!==''?Number($('#sfWater').value):0;
  let wRec=DB.daily.find(d=>d.cycleId===cyc.id&&d.date===dailyState.date&&d.shift===dailyState.shift&&d.houseId==='_farm_');
  if(wRec){wRec.water=water;}
  else{DB.daily.push({id:uid('d'),cycleId:cyc.id,farmId:cyc.farm,houseId:'_farm_',
    date:dailyState.date,shift:dailyState.shift,closed:false,dead:0,feed:0,water});}
  save();toast('تم حفظ '+SHIFTS.find(s=>s.id===dailyState.shift).name+' (كل العنابر) ✓');renderDaily();
}
function closeDay(){
  const cyc=cycleById(dailyState.cycleId);
  const v=id=>{const e=$(id);return e.value===''?null:Number(e.value);};
  let dayRecs=DB.daily.filter(d=>d.cycleId===cyc.id&&d.date===dailyState.date);
  if(!dayRecs.length){
    dayRecs=[{id:uid('d'),cycleId:cyc.id,farmId:cyc.farm,houseId:'_farm_',date:dailyState.date,shift:'s1',dead:0,feed:0,water:0,closed:false}];
    DB.daily.push(dayRecs[0]);
  }
  // ابحث عن سجل المزرعة العام لوضع البيانات الختامية عليه (أو أنشئه)
  let close=dayRecs.find(d=>d.houseId==='_farm_');
  if(!close){close={id:uid('d'),cycleId:cyc.id,farmId:cyc.farm,houseId:'_farm_',date:dailyState.date,shift:'s1',dead:0,feed:0,water:0};DB.daily.push(close);}
  // ألغِ التقفيل عن الباقي ثم ثبّته على سجل المزرعة
  DB.daily.filter(d=>d.cycleId===cyc.id&&d.date===dailyState.date).forEach(r=>r.closed=false);
  Object.assign(close,{closed:true,
    temp:v('#clTemp')||0,tempHi:v('#clHi')||0,tempLo:v('#clLo')||0,humidity:v('#clHum')||0,
    weight:v('#clWeight')||0,culls:v('#clCulls')||0,workers:v('#clWork')||0,vacation:v('#clVac')||0,
    gasCum:v('#clGasCum')||0,gasRem:v('#clGasRem')||0,water1:$('#clW1').value,water2:$('#clW2').value,
    notes:$('#clNotes').value});
  save();toast('تم تقفيل اليوم وترحيله لشيت الدورة ✓');renderDaily();
}

let dashState={cycleId:null,metric:'weight'};
function drawDashChart(){
  const cv=$('#dashChart');if(!cv)return;
  const cyc=cycleById(dashState.cycleId);if(!cyc)return;
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const pad={l:55,r:18,t:18,b:34};
  const metric=dashState.metric;
  // بيانات فعلية حسب العمر
  const dates=[...new Set(DB.daily.filter(d=>d.cycleId===cyc.id).map(d=>d.date))].sort();
  let actual=[],cumDead=0;
  dates.forEach(dt=>{const d=cycleDayData(cyc,dt);cumDead+=d.dead;
    let v=metric==='weight'?d.weight:metric==='feed'?d.feed:cumDead;
    actual.push({age:d.age,v});});
  actual=actual.filter(p=>p.age>0);
  // مرجع Ross
  const maxAge=Math.max(actual.length?Math.max(...actual.map(p=>p.age)):1, 1);
  let ref=[];
  if(metric!=='dead'){ROSS308.filter(r=>r.d<=maxAge+1).forEach(r=>{ref.push({age:r.d,v:metric==='weight'?r.w:r.fd});});}
  // النطاق
  const allV=[...actual.map(p=>p.v),...ref.map(p=>p.v)].filter(v=>v>0);
  const maxV=allV.length?Math.max(...allV)*1.1:1;const maxX=maxAge;
  const X=a=>pad.l+(a-1)/(Math.max(maxX-1,1))*(W-pad.l-pad.r);
  const Y=v=>H-pad.b-(v/maxV)*(H-pad.t-pad.b);
  // شبكة
  ctx.strokeStyle='#e7e9f2';ctx.fillStyle='#9095af';ctx.font='11px Tahoma';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign='right';ctx.fillText(fmt(maxV*(1-i/4),0),pad.l-6,y+4);}
  ctx.textAlign='center';
  for(let a=1;a<=maxX;a+=Math.ceil(maxX/10)){ctx.fillText(a,X(a),H-pad.b+16);}
  // خط المرجع (Ross) — أصفر متقطّع
  function line(pts,color,dash){if(pts.length<1)return;ctx.strokeStyle=color;ctx.lineWidth=2.4;ctx.setLineDash(dash||[]);
    ctx.beginPath();pts.forEach((p,i)=>{const x=X(p.age),y=Y(p.v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();ctx.setLineDash([]);}
  if(ref.length)line(ref,'#f5a623',[6,4]);
  if(actual.length)line(actual,'#635bff');
  // نقاط فعلية
  ctx.fillStyle='#635bff';actual.forEach(p=>{ctx.beginPath();ctx.arc(X(p.age),Y(p.v),2.6,0,7);ctx.fill();});
  // legend
  const ml={weight:'الوزن (جم)',feed:'العلف اليومي (جم)',dead:'النافق التراكمي'}[metric];
  $('#dashLegend').innerHTML=`<div class="it"><span class="sw" style="background:#635bff"></span>الفعلي — ${ml}</div>`+
    (ref.length?`<div class="it"><span class="sw" style="background:#f5a623"></span>مرجع Ross 308</div>`:'');
}

      <div class="field"><label>سعر الكتكوت الواحد</label><input type="number" min="0" step="0.01" id="cyChickCost" value="${c.costs?.chick??''}" placeholder="0"></div>
      <div class="field"><label>سعر كيلو العلف</label><input type="number" min="0" step="0.01" id="cyFeedCost" value="${c.costs?.feedKg??''}" placeholder="0"></div>
      <div class="field"><label>مصاريف أخرى (إجمالي)</label><input type="number" min="0" step="0.01" id="cyOtherCost" value="${c.costs?.other??''}" placeholder="0"></div>
    </div>`,
    `<button class="btn" onclick="saveCycle('${id||''}')">حفظ</button>
     <button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
  window._cyPlaced=JSON.parse(JSON.stringify(c.placedByHouse||{}));
  renderHousePlacement();
}
function renderHousePlacement(){
  const farm=farmById($('#cyFarm').value);
  const ph=window._cyPlaced||{};
  if(!farm||!farm.houses.length){$('#cyHousePlace').innerHTML='<div class="hint" style="color:var(--amber)">هذه المزرعة بلا عنابر — أضف عنابر من صفحة المزارع.</div>';$('#cyTotal').textContent='0';return;}
  $('#cyHousePlace').innerHTML=farm.houses.map(h=>
    `<div class="pill-row" style="margin-bottom:7px;align-items:center">
      <span style="flex:1;color:var(--primary-l)">${esc(h.name)}</span>
      <input type="number" min="0" style="width:140px" value="${ph[h.id]||''}" placeholder="0"
        oninput="window._cyPlaced['${h.id}']=Number(this.value)||0;cyUpdateTotal()"></div>`).join('');
  cyUpdateTotal();
}
function cyUpdateTotal(){
  const farm=farmById($('#cyFarm').value);if(!farm)return;
  const t=farm.houses.reduce((s,h)=>s+(Number((window._cyPlaced||{})[h.id])||0),0);
  $('#cyTotal').textContent=fmt(t);
}
function saveCycle(id){
  const code=$('#cyCode').value.trim();if(!code){toast('أدخل كود الدورة',1);return;}
  const farm=farmById($('#cyFarm').value);
  // احتفظ فقط بعنابر المزرعة المختارة
  const placedByHouse={};
  (farm?.houses||[]).forEach(h=>{if(window._cyPlaced[h.id])placedByHouse[h.id]=Number(window._cyPlaced[h.id])||0;});
  const data={code,farm:$('#cyFarm').value,breed:$('#cyBreed').value.trim(),
    startDate:$('#cyStart').value,placedByHouse,status:$('#cyStatus').value,
    costs:{chick:Number($('#cyChickCost').value)||0,feedKg:Number($('#cyFeedCost').value)||0,other:Number($('#cyOtherCost').value)||0}};
  if(id){const old=cycleById(id);delete old.placed;Object.assign(old,data);}else{DB.cycles.push({id:uid('c'),...data});}
  save();closeModal();toast('تم الحفظ ✓');renderFarms();
}
function delCycle(id){if(!confirm('حذف الدورة وكل سجلاتها اليومية؟'))return;
  DB.cycles=DB.cycles.filter(c=>c.id!==id);DB.daily=DB.daily.filter(d=>d.cycleId!==id);save();renderFarms();toast('تم الحذف');}

/* ===== شاشة مصاريف الدورة التفصيلية ===== */
const EXPENSE_PRESETS=['أدوية ومطهرات','ديزل','نثريات','كهرباء','مياه','نشارة','رواتب','مكافآت','إيجار'];
function expensesModal(id){
  const c=cycleById(id);if(!c)return;
  if(!c.expenses)c.expenses=EXPENSE_PRESETS.map(l=>({id:uid('e'),label:l,amount:0}));
  window._expCycle=id;
  renderExpensesBody();
}
function renderExpensesBody(){
  const c=cycleById(window._expCycle);
  const rows=c.expenses.map((e,i)=>`<div class="pill-row" style="margin-bottom:7px;align-items:center">
    <input value="${esc(e.label)}" style="flex:1" onchange="c_expEdit(${i},'label',this.value)" placeholder="بند التكلفة">
    <input type="number" min="0" step="0.01" value="${e.amount||''}" style="width:130px" onchange="c_expEdit(${i},'amount',this.value)" placeholder="0">
    <button class="btn-red btn-xs" onclick="c_expDel(${i})">✕</button></div>`).join('');
  const med=DB.medMoves.filter(m=>m.cycleId===c.id).reduce((s,m)=>s+(Number(m.total)||0),0);
  openModal('💵 مصاريف الدورة — '+esc(c.code),
    `<div class="hint" style="margin-bottom:10px">الكتاكيت والعلف تُحسب تلقائياً من التسكين والمخزون (عدّل أسعارها من «تعديل الدورة»). الأدوية تُجمع تلقائياً من صفحة الأدوية.</div>
     <div class="kpi a" style="margin-bottom:12px"><div class="lbl">💉 أدوية وتحصينات (تلقائي من سجلاتها)</div><div class="val" style="font-size:18px">${fmt(med)} ${DB.settings.currency}</div></div>
     <label style="font-size:12px;color:var(--txt2);font-weight:500">بنود التكلفة اليدوية</label>
     <div id="expList" style="margin-top:8px">${rows}</div>
     <button class="btn-sec btn-xs" style="margin-top:6px" onclick="c_expAdd()">+ إضافة بند</button>
     <div class="divider"></div>
     <div class="field"><label>💸 خصم التجار (لهذه الدورة — اتركه فارغاً إن لم يوجد)</label>
       <input type="number" min="0" step="0.01" id="expDiscount" value="${c.traderDiscount||''}" placeholder="0"></div>`,
    `<button class="btn btn-green" onclick="saveExpenses()">حفظ</button>
     <button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
}
function c_expEdit(i,k,v){const c=cycleById(window._expCycle);c.expenses[i][k]=(k==='amount')?(Number(v)||0):v;}
function c_expAdd(){const c=cycleById(window._expCycle);c.expenses.push({id:uid('e'),label:'',amount:0});renderExpensesBody();}
function c_expDel(i){const c=cycleById(window._expCycle);c.expenses.splice(i,1);renderExpensesBody();}
function saveExpenses(){
  const c=cycleById(window._expCycle);
  c.traderDiscount=Number($('#expDiscount').value)||0;
  c.expenses=c.expenses.filter(e=>e.label.trim()||e.amount);
  save();closeModal();toast('تم حفظ المصاريف ✓');renderFarms();
}

/* ===================== 🌾 إدارة العلف ===================== */
function renderFeed(){
  const mgr=isManager();
  if(mgr&&!myFarm()){ $('#main').innerHTML=`<div class="card">${emptyState('🚫','لم يتم ربط حسابك بمزرعة بعد. تواصل مع المدير العام.')}</div>`; return; }
  let html=pageHead('🌾','إدارة العلف', mgr?('مزرعتك: '+esc(myFarm().name)+' — أضف العلف الوارد فقط. المستهلك يُخصم تلقائياً من التقرير اليومي'):'الوارد يُضاف للمخزون والمستهلك اليومي يُخصم — والمتبقي يُحسب تلقائياً');
  const myCycles = mgr ? DB.cycles.filter(c=>c.farm===ME.farm) : DB.cycles;
  // ملخص لكل دورة
  html+=`<div class="card"><div class="card-title">📊 أرصدة العلف حسب الدورة</div>`;
  if(!myCycles.length){html+=emptyState('🌾','لا توجد دورات بعد.');}
  else{
    html+=`<div class="tbl-wrap"><table><thead><tr><th>الدورة</th><th>المزرعة</th>
      <th class="num">إجمالي الوارد</th><th class="num">المستهلك</th><th class="num">محوّل/مرتجع</th>
      <th class="num">المتبقي</th></tr></thead><tbody>`;
    myCycles.forEach(c=>{
      const moves=DB.feedMoves.filter(m=>m.cycleId===c.id);
      const inn=moves.filter(m=>m.type==='in'||m.type==='transfer_in').reduce((s,m)=>s+(Number(m.qty)||0),0);
      const out=moves.filter(m=>m.type==='transfer_out'||m.type==='return').reduce((s,m)=>s+(Number(m.qty)||0),0);
      const used=DB.daily.filter(d=>d.cycleId===c.id).reduce((s,d)=>s+(Number(d.feed)||0),0);
      html+=`<tr><td><b>${esc(c.code)}</b></td><td>${esc(farmById(c.farm)?.name||'')}</td>
        <td class="num">${fmt(inn)}</td><td class="num">${fmt(used)}</td><td class="num">${fmt(out)}</td>
        <td class="num"><b class="${(inn-out-used)<0?'ref-bad':'ref-good'}">${fmt(inn-out-used)} كجم</b></td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;
  // حركات العلف
  const addBtn = mgr
    ? `<button class="btn btn-sm" onclick="feedInModal()">+ علف وارد</button>`
    : `<button class="btn btn-sm" onclick="feedMoveModal()">+ حركة علف</button>`;
  html+=`<div class="card"><div class="card-title">🔁 حركات العلف <div class="spacer" style="flex:1"></div>${addBtn}</div>`;
  let moves = mgr ? DB.feedMoves.filter(m=>m.farmId===ME.farm || myCycles.some(c=>c.id===m.cycleId)) : DB.feedMoves;
  if(!moves.length){html+=emptyState('📦','لا توجد حركات علف.');}
  else{
    const T={'in':'وارد','transfer_in':'محوّل وارد','transfer_out':'محوّل صادر','return':'مرتجع'};
    html+=`<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>النوع</th><th>الدورة</th>
      <th class="num">الكمية</th><th>التفاصيل</th><th></th></tr></thead><tbody>`;
    moves.slice().reverse().forEach(m=>{
      let actions;
      if(mgr){
        actions = within24h(m)
          ? `<button class="btn-sec btn-xs" onclick="feedInModal('${m.id}')">✏️ تعديل</button> <button class="btn-red btn-xs" onclick="delFeedMove('${m.id}')">حذف</button>`
          : `<span class="badge b-mut">مُقفل</span>`;
      } else {
        actions = `<button class="btn-red btn-xs" onclick="delFeedMove('${m.id}')">حذف</button>`;
      }
      html+=`<tr><td>${esc(m.date)}</td><td><span class="badge b-info">${T[m.type]||m.type}</span></td>
        <td>${esc(cycleById(m.cycleId)?.code||'')}</td><td class="num">${fmt(m.qty)} كجم</td>
        <td>${esc(m.note||'')}</td>
        <td class="num">${actions}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;
  $('#main').innerHTML=html;
}
/* مودال مدير المزرعة: علف وارد فقط، المزرعة والدورة تلقائياً */
function feedInModal(id){
  const cyc=myActiveCycle();
  if(!cyc){toast('لا توجد دورة نشطة في مزرعتك',1);return;}
  const m=id?DB.feedMoves.find(x=>x.id===id):null;
  if(id&&!within24h(m)){toast('انتهت مهلة التعديل (24 ساعة)',1);return;}
  openModal(id?'تعديل علف وارد':'تسجيل علف وارد',
    `<div class="hint" style="margin-bottom:10px">المزرعة: <b>${esc(myFarm().name)}</b> — الدورة: <b>${esc(cyc.code)}</b></div>
     <div class="row-fields g2">
       <div class="field"><label>الكمية الواردة (كجم)</label><input type="number" min="0" id="fdQty" value="${m?m.qty:''}" placeholder="0"></div>
       <div class="field"><label>التاريخ</label><input type="date" id="fdDate" value="${m?m.date:todayISO()}"></div>
     </div>
     <div class="field"><label>ملاحظات</label><input id="fdNote" value="${m?esc(m.note||''):''}" placeholder="..."></div>`,
    `<button class="btn btn-green" onclick="saveFeedIn('${id||''}')">حفظ</button>
     <button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
}
function saveFeedIn(id){
  const cyc=myActiveCycle();if(!cyc){toast('لا توجد دورة نشطة',1);return;}
  const qty=Number($('#fdQty').value)||0;if(qty<=0){toast('أدخل كمية صحيحة',1);return;}
  const data={date:$('#fdDate').value,type:'in',cycleId:cyc.id,farmId:cyc.farm,qty,other:null,note:$('#fdNote').value};
  if(id){const m=DB.feedMoves.find(x=>x.id===id);if(!within24h(m)){toast('انتهت مهلة التعديل',1);return;}Object.assign(m,data);}
  else{DB.feedMoves.push({id:uid('fm'),_ts:Date.now(),...data});}
  save();closeModal();toast('تم تسجيل العلف الوارد ✓');renderFeed();
}
function feedMoveModal(){
  if(!DB.cycles.length){toast('أضف دورة أولاً',1);return;}
  const cycOpts=DB.cycles.map(c=>`<option value="${c.id}">${esc(c.code)}</option>`).join('');
  const farmOpts=DB.farms.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('');
  openModal('حركة علف',
    `<div class="field"><label>النوع</label><select id="fdType" onchange="$('#fdTransfer').style.display=(this.value==='transfer_in'||this.value==='transfer_out')?'block':'none'">
      <option value="in">وارد (إضافة للمخزون)</option>
      <option value="transfer_in">محوّل وارد من مزرعة أخرى</option>
      <option value="transfer_out">محوّل صادر إلى مزرعة أخرى</option>
      <option value="return">مرتجع</option></select></div>
     <div class="field"><label>الدورة</label><select id="fdCycle">${cycOpts}</select></div>
     <div class="row-fields g2">
       <div class="field"><label>الكمية (كجم)</label><input type="number" min="0" id="fdQty" placeholder="0"></div>
       <div class="field"><label>التاريخ</label><input type="date" id="fdDate" value="${todayISO()}"></div>
     </div>
     <div class="field" id="fdTransfer" style="display:none"><label>المزرعة الطرف الآخر</label><select id="fdOther">${farmOpts}</select></div>
     <div class="field"><label>ملاحظات</label><input id="fdNote" placeholder="..."></div>`,
    `<button class="btn" onclick="saveFeedMove()">حفظ</button>
     <button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
}
function saveFeedMove(){
  const qty=Number($('#fdQty').value)||0;if(qty<=0){toast('أدخل كمية صحيحة',1);return;}
  const type=$('#fdType').value;
  DB.feedMoves.push({id:uid('fm'),date:$('#fdDate').value,type,cycleId:$('#fdCycle').value,
    farmId:cycleById($('#fdCycle').value)?.farm,qty,_ts:Date.now(),
    other:(type.startsWith('transfer'))?$('#fdOther').value:null,note:$('#fdNote').value});
  save();closeModal();toast('تم تسجيل حركة العلف ✓');renderFeed();
}
function delFeedMove(id){const m=DB.feedMoves.find(x=>x.id===id);if(isManager()&&!within24h(m)){toast('انتهت مهلة الحذف (24 ساعة)',1);return;}if(!confirm('حذف الحركة؟'))return;DB.feedMoves=DB.feedMoves.filter(m=>m.id!==id);save();renderFeed();}

/* ===================== 💉 الأدوية والتحصينات ===================== */
let medFilter={type:'',item:'',disease:''};
function medKind(m){return m.kind||'vaccine';} // السجلات القديمة = تحصين
function renderMeds(){
  const mgr=isManager();
  const isSuper=ME.role==='super'||ME.role==='admin';
  if(mgr&&!myFarm()){ $('#main').innerHTML=`<div class="card">${emptyState('🚫','لم يتم ربط حسابك بمزرعة بعد. تواصل مع المدير العام.')}</div>`; return; }
  let html=pageHead('💉','الأدوية والتحصينات', mgr?('مزرعتك: '+esc(myFarm().name)+' — سجّل الدواء/التحصين المستخدم اليوم (يمكن التعديل خلال 24 ساعة)'):'برنامج التحصين بالعمر + سجل الأدوية والاستهلاك اليومي');
  const myCycleIds = mgr ? DB.cycles.filter(c=>c.farm===ME.farm).map(c=>c.id) : null;
  let recs = mgr ? DB.medMoves.filter(m=>myCycleIds.includes(m.cycleId)) : DB.medMoves;
  const vaccines = recs.filter(m=>medKind(m)==='vaccine');
  let drugs = recs.filter(m=>medKind(m)==='drug');

  /* أزرار الإضافة */
  html+=`<div class="card"><div class="toolbar">
    <button class="btn btn-sm" onclick="vacModal()">+ تسجيل تحصين</button>
    <button class="btn-green btn-sm" onclick="drugModal()">+ تسجيل دواء</button>
  </div></div>`;

  /* ====== جدول التحصينات ====== */
  html+=`<div class="card"><div class="card-title">💉 سجل التحصينات</div>`;
  if(!vaccines.length){html+=emptyState('💉','لا توجد تحصينات مسجّلة.');}
  else{
    html+=`<div class="tbl-wrap"><table><thead><tr><th class="num">العمر</th><th>اللقاح</th><th>الدورة</th>
      <th class="num">عدد الأمبولات</th><th class="num">سعر الأمبولة</th><th class="num">إجمالي السعر</th>
      <th class="num">تكلفة الطائر</th><th>التاريخ</th><th></th></tr></thead><tbody>`;
    let tAmp=0,tTotal=0;
    vaccines.slice().sort((a,b)=>(a.age||0)-(b.age||0)).forEach(m=>{
      const cyc=cycleById(m.cycleId);const placed=cyc?cyclePlaced(cyc):0;
      const total=Number(m.total)||((Number(m.qty)||0)*(Number(m.price)||0));
      const perBird=placed?(total/placed):0;
      tAmp+=Number(m.qty)||0;tTotal+=total;
      html+=`<tr><td class="num">${m.age!=null?m.age:'-'}</td><td><b>${esc(m.item)}</b></td><td>${esc(cyc?.code||'')}</td>
        <td class="num">${fmt(m.qty)}</td><td class="num">${fmt(m.price,2)}</td><td class="num">${fmt(total)}</td>
        <td class="num">${fmt(perBird,2)}</td><td>${esc(m.date)}</td>
        <td class="num">${medActions(m,mgr,'vacModal')}</td></tr>`;
    });
    html+=`<tr class="tbl-total"><td colspan="3">الإجمالي</td><td class="num">${fmt(tAmp)}</td><td></td>
      <td class="num">${fmt(tTotal)}</td><td colspan="3"></td></tr>`;
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  /* ====== فلاتر الأدوية (للسوبر/أدمن فقط) ====== */
  if(isSuper){
    const types=DB.settings.medTypes||[];
    const drugItems=[...new Set(DB.medMoves.filter(m=>medKind(m)==='drug').map(m=>m.item))].filter(Boolean);
    const diseases=[...new Set(DB.medMoves.filter(m=>medKind(m)==='drug').map(m=>m.disease))].filter(Boolean);
    html+=`<div class="card"><div class="card-title">🔎 فلترة تقارير الأدوية</div><div class="toolbar">
      <select onchange="medFilter.type=this.value;renderMeds()"><option value="">كل الأنواع</option>
        ${types.map(t=>`<option ${medFilter.type===t?'selected':''}>${esc(t)}</option>`).join('')}</select>
      <select onchange="medFilter.item=this.value;renderMeds()"><option value="">كل الأدوية</option>
        ${drugItems.map(t=>`<option ${medFilter.item===t?'selected':''}>${esc(t)}</option>`).join('')}</select>
      <select onchange="medFilter.disease=this.value;renderMeds()"><option value="">كل الحالات المرضية</option>
        ${diseases.map(t=>`<option ${medFilter.disease===t?'selected':''}>${esc(t)}</option>`).join('')}</select>
      ${(medFilter.type||medFilter.item||medFilter.disease)?`<button class="btn-sec btn-sm" onclick="medFilter={type:'',item:'',disease:''};renderMeds()">مسح الفلتر</button>`:''}
    </div></div>`;
    if(medFilter.type)drugs=drugs.filter(m=>m.medType===medFilter.type);
    if(medFilter.item)drugs=drugs.filter(m=>m.item===medFilter.item);
    if(medFilter.disease)drugs=drugs.filter(m=>m.disease===medFilter.disease);
  }

  /* ====== جدول الأدوية ====== */
  const dTotalCost=drugs.reduce((s,m)=>s+(Number(m.total)||0),0);
  html+=`<div class="card"><div class="card-title">💊 سجل الأدوية
    ${isSuper?`<div class="spacer" style="flex:1"></div><span class="badge b-info">إجمالي التكلفة: ${fmt(dTotalCost)} ${esc(DB.settings.currency)}</span>`:''}</div>`;
  if(!drugs.length){html+=emptyState('💊','لا توجد أدوية مسجّلة.');}
  else{
    html+=`<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th class="num">العمر</th><th>الدواء</th><th>النوع</th>
      <th>الحالة المرضية</th><th>الدورة</th><th class="num">السقوة</th><th class="num">عدد السقوات</th>
      <th class="num">إجمالي مستهلك/يوم</th><th class="num">السعر</th><th class="num">إجمالي السعر</th><th></th></tr></thead><tbody>`;
    drugs.slice().reverse().forEach(m=>{
      const cyc=cycleById(m.cycleId);
      const dayQty=(Number(m.dose)||0)*(Number(m.doses)||0);
      html+=`<tr><td>${esc(m.date)}</td><td class="num">${m.age!=null?m.age:'-'}</td>
        <td><b>${esc(m.item)}</b></td><td><span class="badge b-info">${esc(m.medType||'-')}</span></td>
        <td>${esc(m.disease||'-')}</td><td>${esc(cyc?.code||'')}</td>
        <td class="num">${fmt(m.dose,3)} ${esc(m.unit||'')}</td><td class="num">${fmt(m.doses)}</td>
        <td class="num"><b>${fmt(dayQty,3)} ${esc(m.unit||'')}</b></td>
        <td class="num">${fmt(m.price,2)}</td><td class="num">${fmt(m.total)}</td>
        <td class="num">${medActions(m,mgr,'drugModal')}</td></tr>`;
    });
    html+=`<tr class="tbl-total"><td colspan="10">إجمالي تكلفة الأدوية</td><td class="num">${fmt(dTotalCost)}</td><td></td></tr>`;
    html+=`</tbody></table></div>`;
  }

    salesScope.slice().reverse().forEach(s=>{
      const farm=farmById(s.farmId);const hn=farm?.houses.find(h=>h.id===s.houseId)?.name||'-';

      html+=`<tr><td>${esc(s.date)}</td><td>${esc(cycleById(s.cycleId)?.code||'')}</td><td>${esc(hn)}</td>
        <td class="num">${fmt(s.count)}</td><td class="num">${fmt(s.weight,1)}</td>

  }

  $('#main').innerHTML=html;

function saveTransfer(kind){

    fromFarm:$('#trFrom').value,toFarm:$('#trTo').value,qty,note:$('#trNote').value};

/* 1) السجل اليومي المتتابع */
function repDailyLog(){
  const cyc=cycleById(repState.cycleId)||DB.cycles[0];repState.cycleId=cyc.id;
  let dates=[...new Set(DB.daily.filter(d=>d.cycleId===cyc.id).map(d=>d.date))].sort();
  if(repState.from)dates=dates.filter(d=>d>=repState.from);
  if(repState.to)dates=dates.filter(d=>d<=repState.to);
  let h=`<div class="card"><div class="toolbar">${cycSelect()}
    <input type="date" value="${repState.from}" onchange="repState.from=this.value;renderReports()">
    <span style="color:var(--txt3)">إلى</span>
    <input type="date" value="${repState.to}" onchange="repState.to=this.value;renderReports()">
    <button class="btn-sec btn-sm" onclick="repState.from='';repState.to='';renderReports()">مسح الفلتر</button></div></div>
    <div class="card"><div class="card-title">📋 السجل اليومي المتتابع — ${esc(cyc.code)}</div>`;
  if(!dates.length){return h+emptyState('📋','لا توجد سجلات.')+`</div>`;}
  h+=`<div class="tbl-wrap"><table><thead><tr>
    <th class="num">العمر</th><th>التاريخ</th><th class="num">نافق</th><th class="num">تراكمي</th>
    <th class="num">العلف</th><th class="num">المياه</th><th class="num">الوزن</th>
    <th class="num">المرجعي</th><th class="num">الحرارة</th><th class="num">رطوبة</th><th>الحالة</th></tr></thead><tbody>`;
  let cumDead=0;
  dates.forEach(dt=>{
    const d=cycleDayData(cyc,dt);cumDead+=d.dead;
    const ref=rossRow(d.age);const close=DB.daily.find(r=>r.cycleId===cyc.id&&r.date===dt&&r.closed)||{};
    const wOk=d.weight&&ref?(d.weight>=ref.w):null;
    h+=`<tr><td class="num">${d.age}</td><td>${esc(dt)}</td><td class="num">${fmt(d.dead)}</td>
      <td class="num">${fmt(cumDead)}</td><td class="num">${fmt(d.feed)}</td><td class="num">${fmt(d.water)}</td>
      <td class="num">${d.weight?fmt(d.weight):'-'}</td><td class="num">${ref?fmt(ref.w):'-'}</td>
      <td class="num">${close.temp||'-'}</td><td class="num">${close.humidity||'-'}</td>
      <td>${close.closed?'<span class="badge b-ok">مقفل</span>':'<span class="badge b-warn">مفتوح</span>'}
      ${wOk===true?'<span class="badge b-ok">✓</span>':wOk===false?'<span class="badge b-warn">↓</span>':''}</td></tr>`;
  });
  return h+`</tbody></table></div></div>`;
}

/* 2) مقارنة يومية بالكتالوج */
function repDailyCat(){
  const cyc=cycleById(repState.cycleId)||DB.cycles[0];repState.cycleId=cyc.id;
  let dates=[...new Set(DB.daily.filter(d=>d.cycleId===cyc.id).map(d=>d.date))].sort();
  let h=`<div class="card"><div class="toolbar">${cycSelect()}</div></div>
    <div class="card"><div class="card-title">📐 الأداء الفعلي مقابل Ross 308 — ${esc(cyc.code)}</div>`;
  if(!dates.length)return h+emptyState('📐','لا توجد سجلات.')+`</div>`;
  h+=`<div class="tbl-wrap"><table><thead><tr><th class="num">العمر</th>
    <th class="num">الوزن الفعلي</th><th class="num">وزن المرجع</th><th class="num">% للمرجع</th>
    <th class="num">علف فعلي/طائر تراكمي</th><th class="num">علف المرجع</th></tr></thead><tbody>`;

      <td class="num">${fmt(feedBird)}</td><td class="num">${fmt(ref.fc)}</td></tr>`;
  });
  return h+`</tbody></table></div></div>`;
}

/* 3) مقارنة أسبوعية بالكتالوج */
function repWeekCat(){
  const cyc=cycleById(repState.cycleId)||DB.cycles[0];repState.cycleId=cyc.id;
  let dates=[...new Set(DB.daily.filter(d=>d.cycleId===cyc.id).map(d=>d.date))].sort();
  let h=`<div class="card"><div class="toolbar">${cycSelect()}</div></div>
    <div class="card"><div class="card-title">📅 مقارنة أسبوعية مقابل Ross 308 — ${esc(cyc.code)}</div>`;
  if(!dates.length)return h+emptyState('📅','لا توجد سجلات.')+`</div>`;
  // جمّع حسب الأسبوع
  const weeks={};
  dates.forEach(dt=>{const d=cycleDayData(cyc,dt);const w=Math.ceil(d.age/7);
    if(!weeks[w])weeks[w]={dead:0,feed:0,wSum:0,wCnt:0,lastAge:0};
    weeks[w].dead+=d.dead;weeks[w].feed+=d.feed;
    if(d.weight){weeks[w].wSum+=d.weight;weeks[w].wCnt++;}weeks[w].lastAge=Math.max(weeks[w].lastAge,d.age);});
  h+=`<div class="tbl-wrap"><table><thead><tr><th class="num">الأسبوع</th><th class="num">نافق الأسبوع</th>
    <th class="num">علف الأسبوع</th><th class="num">متوسط الوزن</th><th class="num">وزن المرجع (آخر يوم)</th>
    <th class="num">% للمرجع</th></tr></thead><tbody>`;
  Object.keys(weeks).map(Number).sort((a,b)=>a-b).forEach(w=>{
    const x=weeks[w];const avgW=x.wCnt?(x.wSum/x.wCnt):0;const ref=rossRow(x.lastAge);
    const pct=ref&&avgW?(avgW/ref.w*100):0;
    h+=`<tr><td class="num"><b>أسبوع ${w}</b></td><td class="num">${fmt(x.dead)}</td>
      <td class="num">${fmt(x.feed)} كجم</td><td class="num">${avgW?fmt(avgW):'-'}</td>
      <td class="num">${ref?fmt(ref.w):'-'}</td>
      <td class="num">${pct?`<span class="badge ${pct>=98?'b-ok':pct>=92?'b-warn':'b-bad'}">${pct.toFixed(0)}%</span>`:'-'}</td></tr>`;
  });
  return h+`</tbody></table></div></div>`;
}

/* تقرير المبيعات اليومي (منفصل) — لوحان: مبيعات اليوم + إجمالي تراكمي */
let salesDay='';
function repSalesDaily(){
  const cyc=cycleById(repState.cycleId)||DB.cycles[0];repState.cycleId=cyc.id;
  // أيام البيع لهذه الدورة
  const saleDays=[...new Set(DB.sales.filter(s=>s.cycleId===cyc.id).map(s=>s.date))].sort();
  if(!salesDay||!saleDays.includes(salesDay))salesDay=saleDays[saleDays.length-1]||todayISO();
  const dayOpts=saleDays.length?saleDays.map(d=>`<option value="${d}" ${d===salesDay?'selected':''}>${esc(d)}</option>`).join(''):`<option value="${salesDay}">${esc(salesDay)}</option>`;
  let h=`<div class="card"><div class="toolbar">${cycSelect()}
    <label style="color:var(--txt2)">يوم البيع:</label>
    <select onchange="salesDay=this.value;renderReports()">${dayOpts}</select></div></div>`;

  // ===== مبيعات اليوم =====
  const today=DB.sales.filter(s=>s.cycleId===cyc.id&&s.date===salesDay);
  const tCount=today.reduce((s,x)=>s+(Number(x.count)||0),0);
  const tWeight=today.reduce((s,x)=>s+(Number(x.weight)||0),0);
  const tAmount=today.reduce((s,x)=>s+(Number(x.amount)||0),0);
  const tAvgBird=tCount?(tWeight/tCount):0;          // متوسط وزن الطائر (كجم)
  const tPrice=tWeight?(tAmount/tWeight):0;          // سعر الكيلو

  // ===== الإجمالي التراكمي للدورة =====
  const F=cycleFinal(cyc);
  const age=ageOnDate(cyc,salesDay);
  const feedTot=cycleFeedUsed(cyc.id);

  h+=`<div class="grid g2">`;
  const sr=(cls,lab,val)=>`<div class="statrow ${cls}"><span class="lab">${lab}</span><span class="num">${val}</span></div>`;
  // لوح: المبيعات يوميا
  h+=`<div class="card"><div class="card-title" style="color:var(--cyan)">📅 المبيعات يوميا — ${esc(farmById(cyc.farm)?.name||'')} — ${esc(salesDay)}</div>
    ${sr('st-blue','العدد',fmt(tCount))}
    ${sr('st-teal','الوزن',fmt(tWeight,1))}
    ${sr('st-green','المبلغ',fmt(tAmount))}
    ${sr('st-purple','متوسط اليوم (وزن/طائر)',fmt(tAvgBird,2))}
    ${sr('st-amber','السعر (للكيلو)',fmt(tPrice,2))}
  </div>`;
  // لوح: إجمالي المبيعات
  h+=`<div class="card"><div class="card-title" style="color:var(--green)">📊 إجمالي المبيعات (تراكمي)</div>
    ${sr('st-slate','العمر',age>0?age+' يوم':'-')}
    ${sr('st-indigo','العدد (التسكين)',fmt(F.placed))}
    ${sr('st-rose','النافق',fmt(F.dead))}
    ${sr('st-rose','نسبة النافق',F.deadPct.toFixed(2)+'%')}
    ${sr('st-blue','المبيعات (عدد)',fmt(F.sales.count))}
    ${sr(F.remain<0?'st-rose':'st-green','العدد المتبقي',fmt(F.remain))}
    ${sr('st-orange','العلف الكلي',fmt(feedTot))}
    ${sr('st-purple','متوسط الوزن',fmt(F.avgWeightBird,2))}
    ${sr('st-teal','إجمالي الوزن',fmt(F.sales.weight,1))}
    ${sr('st-green','إجمالي المبلغ',fmt(F.sales.amount))}
    ${sr('st-amber','متوسط السعر',fmt(F.avgPrice,2))}
  </div>`;
  h+=`</div>`;

  // تفصيل عمليات اليوم (لأن البيع يتم على مراحل وأعداد وأوزان مختلفة)
  h+=`<div class="card"><div class="card-title">🧾 عمليات البيع في ${esc(salesDay)}</div>`;
  if(!today.length){h+=emptyState('🧾','لا توجد مبيعات في هذا اليوم.');}
  else{
    const farm=farmById(cyc.farm);
    h+=`<div class="tbl-wrap"><table><thead><tr><th>العنبر</th><th class="num">العدد</th>
      <th class="num">الوزن</th><th class="num">السعر</th><th class="num">المبلغ</th>

/* ===== مقارنة المزارع المتقدمة (EPEF/FCR/تكاليف) مع تلوين ===== */
function repCompare(){
  let h=`<div class="card"><div class="card-title">📊 مقارنة المزارع المتقدمة — كل الدورات لكل مزرعة</div>`;
  if(!DB.farms.length)return h+emptyState('📊','لا توجد مزارع.')+`</div>`;
  const clr=(v,g,y)=>v>=g?'b-ok':v>=y?'b-warn':'b-bad';
  h+=`<div class="tbl-wrap"><table><thead><tr><th>المزرعة</th><th class="num">الوارد</th><th class="num">المباع</th>
    <th class="num">نسبة النافق</th><th class="num">سعر البيع</th><th class="num">تكلفة الكيلو</th>
    <th class="num">العلف</th><th class="num">إجمالي اللحم</th><th class="num">متوسط الوزن</th>
    <th class="num">متوسط العمر</th><th class="num">FCR</th><th class="num">cfcr</th><th class="num">EPEF</th>
    <th class="num">RO/kg لحم</th><th class="num">ROF/kg علف</th>
    <th class="num">صافي الدورات</th></tr></thead><tbody>`;
  let T={placed:0,sold:0,feed:0,meat:0,profit:0};
  DB.farms.forEach(f=>{
    const cycs=DB.cycles.filter(c=>c.farm===f.id);if(!cycs.length)return;
    const A=aggregateCycles(cycs);
    let ageSum=0,ageN=0,epefSum=0,epefN=0;
    cycs.forEach(c=>{const F=cycleFinal(c);if(F.ages.avg){ageSum+=F.ages.avg;ageN++;}if(F.epef){epefSum+=F.epef;epefN++;}});
    const avgAge=ageN?ageSum/ageN:0;const avgEpef=epefN?epefSum/epefN:0;
    const deadPct=A.deadPct;
    T.placed+=A.placed;T.sold+=A.salesCount;T.feed+=A.feed;T.meat+=A.totalMeat;T.profit+=A.profit;
    h+=`<tr><td><b>${esc(f.name)}</b></td><td class="num">${fmt(A.placed)}</td><td class="num">${fmt(A.salesCount)}</td>
      <td class="num"><span class="badge ${deadPct<5?'b-ok':deadPct<8?'b-warn':'b-bad'}">${deadPct.toFixed(1)}%</span></td>
      <td class="num">${fmt(A.avgPrice,1)}</td><td class="num">${fmt(A.costPerKg,1)}</td>
      <td class="num">${fmt(A.feed)} كجم</td><td class="num">${fmt(A.totalMeat)} كجم</td>
      <td class="num">${fmt(A.avgWeight,2)}</td><td class="num">${avgAge?avgAge.toFixed(1):'-'}</td>
      <td class="num"><span class="badge ${clr(2-A.fcr,0.45,0.35)}">${A.fcr.toFixed(2)}</span></td>
      <td class="num"><span class="badge ${clr(2-A.cfcr,0.45,0.35)}">${A.cfcr.toFixed(2)}</span></td>
      <td class="num"><span class="badge ${clr(avgEpef,380,330)}">${avgEpef?avgEpef.toFixed(0):'-'}</span></td>
      <td class="num"><b class="${A.profitPerKg>=0?'ref-good':'ref-bad'}">${fmt(A.profitPerKg,2)}</b></td>
      <td class="num"><b class="${A.rofFeed>=0?'ref-good':'ref-bad'}">${fmt(A.rofFeed,2)}</b></td>
      <td class="num"><b class="${A.profit>=0?'ref-good':'ref-bad'}">${fmt(A.profit)}</b></td></tr>`;
  });
  const Tall=aggregateCycles(DB.cycles);

let priceCols=['','','','',''];

function applyPriceCmp(){renderReports();}
function repPriceCmp(){

    prices.map(p=>`<th class="num">ربح @ ${fmt(p,1)}</th>`).join('')+`</tr></thead><tbody>`;
  let Tmeat=0,Tcost=0,Tp=prices.map(()=>0);
  DB.farms.forEach(f=>{

    const A=aggregateCycles(cycs);Tmeat+=A.totalMeat;Tcost+=A.totalCost;

  });

    Tp.map(v=>`<td class="num">${fmt(v)}</td>`).join('')+`</tr>`;
  h+=`</tbody></table></div>

}

}

/* عدّاد تصاعدي للأرقام */
function runCountUps(){
  $$('.cup').forEach(el=>{
    const to=Number(el.dataset.to)||0;if(!to){el.textContent='';return;}
    const dur=900,t0=performance.now();const neg=to<0;
    function step(t){const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);
      el.textContent=fmt(to*e,0);if(p<1)requestAnimationFrame(step);else el.textContent=fmt(to,0);}
    requestAnimationFrame(step);
  });
}
/* رسم أعمدة المبيعات والأرباح */
function drawOwnerBar(){
  const cv=$('#ownerBar');if(!cv)return;const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const data=DB.farms.map(f=>{const A=aggregateCycles(DB.cycles.filter(c=>c.farm===f.id));
    return {name:f.name,sales:A.salesAmount,profit:A.profit};}).filter(d=>d.sales||d.profit);
  if(!data.length){ctx.fillStyle='#9095af';ctx.font='13px Tahoma';ctx.textAlign='center';ctx.fillText('لا توجد بيانات',W/2,H/2);return;}
  const pad={l:8,r:8,t:14,b:50};const maxV=Math.max(...data.map(d=>Math.max(d.sales,Math.abs(d.profit))),1)*1.1;
  const gw=(W-pad.l-pad.r)/data.length;
  const Y=v=>H-pad.b-(v/maxV)*(H-pad.t-pad.b);
  ctx.strokeStyle='#e7e9f2';ctx.beginPath();ctx.moveTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  // حركة
  let prog=0;function frame(){prog=Math.min(prog+0.06,1);ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#e7e9f2';ctx.beginPath();ctx.moveTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
    data.forEach((d,i)=>{const cx=pad.l+gw*i+gw/2;const bw=Math.min(gw*0.28,34);
      const hs=(H-pad.t-(H-pad.b))*0; // placeholder
      const sH=(d.sales/maxV)*(H-pad.t-pad.b)*prog;const pH=(Math.abs(d.profit)/maxV)*(H-pad.t-pad.b)*prog;
      ctx.fillStyle='#22c55e';ctx.fillRect(cx-bw-2,H-pad.b-sH,bw,sH);
      ctx.fillStyle=d.profit>=0?'#7c5cff':'#fb5a6f';ctx.fillRect(cx+2,H-pad.b-pH,bw,pH);
      ctx.fillStyle='#b9b0e0';ctx.font='11px Tahoma';ctx.textAlign='center';
      const nm=d.name.length>10?d.name.slice(0,10)+'…':d.name;ctx.fillText(nm,cx,H-pad.b+16);});
    if(prog<1)requestAnimationFrame(frame);}
  frame();
}
/* رسم منحنى الوزن مقابل Ross لكل مزرعة نشطة */
function drawOwnerLine(){
  const cv=$('#ownerLine');if(!cv)return;const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const af=activeFarms();
  const pad={l:46,r:12,t:14,b:30};
  const maxAge=50,maxW=3500;
  const X=a=>pad.l+(a-1)/(maxAge-1)*(W-pad.l-pad.r);
  const Y=v=>H-pad.b-(v/maxW)*(H-pad.t-pad.b);
  // شبكة
  ctx.strokeStyle='#e7e9f2';ctx.fillStyle='#9095af';ctx.font='10px Tahoma';
  for(let i=0;i<=4;i++){const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign='right';ctx.fillText(fmt(maxW*(1-i/4),0),pad.l-5,y+3);}
  // منحنى Ross
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2.2;ctx.setLineDash([6,4]);ctx.beginPath();
  ROSS308.filter(r=>r.d<=maxAge).forEach((r,i)=>{const x=X(r.d),y=Y(r.w);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();ctx.setLineDash([]);
  // منحنيات المزارع
  const colors=['#7c5cff','#22d3ee','#22c55e','#fb5a6f','#c084fc','#fbbf24'];
  let leg=`<div class="it"><span class="sw" style="background:#fbbf24"></span>Ross 308</div>`;
  af.forEach((f,fi)=>{const cyc=activeCycleOfFarm(f.id);if(!cyc)return;
    const dates=[...new Set(DB.daily.filter(d=>d.cycleId===cyc.id).map(d=>d.date))].sort();
    const pts=[];dates.forEach(dt=>{const d=cycleDayData(cyc,dt);if(d.weight>0&&d.age>0)pts.push({age:d.age,v:d.weight});});
    if(!pts.length)return;
    ctx.strokeStyle=colors[fi%colors.length];ctx.lineWidth=2.4;ctx.beginPath();
    pts.forEach((p,i)=>{const x=X(p.age),y=Y(p.v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
    leg+=`<div class="it"><span class="sw" style="background:${colors[fi%colors.length]}"></span>${esc(f.name)}</div>`;});
  const lg=$('#ownerLineLeg');if(lg)lg.innerHTML=leg;
}
