<style>
/* ============ المتغيرات والثيم ============ */
:root{
  /* ===== ثيم فاتح مستوحى من نظام مزارع الدواجن ===== */
  --bg:#f6f7fb; --bg2:#eef0f7; --card:#ffffff; --card2:#f5f6fc;
  --border:#e7e9f2; --border2:#d4d8ea;
  --primary:#635bff; --primary-d:#5147e6; --primary-l:#8b85ff;
  --primary-soft:#eef0ff;
  --text:#1a1c2e; --text2:#566073; --text3:#8a93a8;
  --green:#0f9d58; --green-bg:rgba(15,157,88,.12);
  --red:#e23048; --red-bg:rgba(226,48,72,.12);
  --amber:#d68310; --amber-bg:rgba(214,131,16,.14);
  --cyan:#0e9bbd; --purple:#8b3ff0; --pink:#d6457f;
  --radius:14px; --radius-s:10px;
  --shadow:0 18px 48px rgba(26,28,46,.14),0 6px 16px rgba(26,28,46,.08);
  --grad:linear-gradient(135deg,#635bff,#8b85ff 55%,#a855f7);
  --font:'Segoe UI',Tahoma,'Cairo',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}

/* ============ التخطيط العام ============ */
#app{display:none;height:100vh;width:100vw}
#app.ready{display:flex}
#sidebar{width:248px;background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;transition:.25s}
.brand{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.brand .logo{width:42px;height:42px;border-radius:11px;background:var(--grad);
  display:grid;place-items:center;font-size:22px;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.brand h1{font-size:15px;font-weight:700}
.brand p{font-size:11px;color:var(--text3)}
.nav{flex:1;overflow-y:auto;padding:10px 9px}
.nav-group{font-size:10.5px;color:var(--text3);font-weight:700;padding:13px 12px 5px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--radius-s);cursor:pointer;
  color:var(--text2);font-size:13.5px;font-weight:500;transition:.15s;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--card2);color:var(--text)}
.nav-item.active{background:var(--primary-soft);color:var(--primary-d);font-weight:700}
.nav-item.active::before{content:"";position:absolute;right:0;top:18%;height:64%;width:3px;background:var(--primary);border-radius:3px}
.nav-item .ico{font-size:17px;width:22px;text-align:center}
.nav-item .badge{margin-inline-start:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:0 18px;gap:14px;flex-shrink:0}
.topbar .menu-btn{display:none;background:var(--card2);border:1px solid var(--border);color:var(--text);
  width:38px;height:38px;border-radius:9px;font-size:18px;cursor:pointer}
.topbar h2{font-size:17px;font-weight:700}
.topbar .sub{font-size:11.5px;color:var(--text3)}
.topbar .right{margin-inline-start:auto;display:flex;align-items:center;gap:10px}
.chip{background:var(--card2);border:1px solid var(--border);padding:7px 13px;border-radius:9px;font-size:12px;
  display:flex;align-items:center;gap:7px;color:var(--text2)}
.chip b{color:var(--text)}
.content{flex:1;overflow-y:auto;padding:20px}
.page{display:none;animation:fade .3s}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============ مكونات ============ */
.btn{background:var(--grad);color:#fff;border:none;padding:9px 16px;border-radius:10px;font-size:13px;
  font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:var(--font);transition:.15s}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,91,255,.32)}
.btn.ghost{background:var(--card2);border:1px solid var(--border);color:var(--text2)}
.btn.ghost:hover{border-color:var(--primary);color:var(--text)}
.btn.green{background:var(--green)}.btn.green:hover{background:#16a34a}
.btn.red{background:var(--red)}.btn.red:hover{background:#dc2626}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.xs{padding:4px 9px;font-size:11px;border-radius:7px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:17px;position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;inset-inline-start:0;top:0;width:4px;height:100%;background:var(--accent,var(--primary))}
.stat .ico{font-size:26px;margin-bottom:9px;display:block}
.stat .lbl{font-size:12px;color:var(--text2);margin-bottom:5px}
.stat .val{font-size:23px;font-weight:800;letter-spacing:-.5px}
.stat .meta{font-size:11px;color:var(--text3);margin-top:5px}

.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden}
.panel-h{padding:14px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.panel-h h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel-h .tools{margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.panel-b{padding:16px}
.panel-b.flush{padding:0}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--text2);font-weight:600}
input,select,textarea{background:var(--card);border:1.5px solid var(--border);color:var(--text);
  padding:9px 11px;border-radius:9px;font-size:13px;font-family:var(--font);width:100%;transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,91,255,.18)}
.search{position:relative;min-width:200px}
.search input{padding-inline-start:34px}
.search::before{content:"🔍";position:absolute;inset-inline-start:11px;top:9px;font-size:13px;opacity:.6}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg2);color:var(--text2);font-weight:700;text-align:right;padding:11px 12px;
  border-bottom:2px solid var(--border2);white-space:nowrap;position:sticky;top:0;font-size:12px;z-index:2}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{transition:.1s}
tbody tr:hover{background:var(--card2)}
.tbl-wrap{overflow:auto;max-height:calc(100vh - 280px)}
td.editable{cursor:pointer;position:relative}
td.editable:hover{background:rgba(99,91,255,.10);box-shadow:inset 0 0 0 1px var(--primary)}
td.editable:hover::after{content:"✎";position:absolute;inset-inline-start:4px;top:8px;font-size:10px;opacity:.5}
td input,td select{padding:5px 7px;font-size:12px;border-radius:6px}

.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;white-space:nowrap}
.tag.blue{background:var(--primary-soft);color:var(--primary-d)}
.tag.green{background:var(--green-bg);color:#4ade80}
.tag.red{background:var(--red-bg);color:#f87171}
.tag.amber{background:var(--amber-bg);color:#fbbf24}
.tag.cyan{background:rgba(6,182,212,.16);color:#22d3ee}
.tag.purple{background:rgba(168,85,247,.16);color:#c084fc}
.tag.gray{background:var(--card2);color:var(--text2)}

.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty .ico{font-size:46px;opacity:.4;display:block;margin-bottom:10px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:none;
  place-items:center;z-index:100;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:560px;
  max-height:90vh;overflow:auto;box-shadow:var(--shadow);animation:pop .25s}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:none;opacity:1}}
.modal-h{padding:16px 19px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-h h3{font-size:16px;font-weight:700}
.modal-h .x{margin-inline-start:auto;background:var(--card2);border:none;color:var(--text2);width:30px;height:30px;
  border-radius:8px;cursor:pointer;font-size:16px}
.modal-h .x:hover{background:var(--red);color:#fff}
.modal-b{padding:19px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.modal-f{padding:15px 19px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-start}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card2);border:1px solid var(--border2);border-inline-start:4px solid var(--primary);
  padding:12px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);animation:slideup .3s;min-width:240px}
.toast.green{border-inline-start-color:var(--green)}
.toast.red{border-inline-start-color:var(--red)}
.toast.amber{border-inline-start-color:var(--amber)}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}

.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:15px}
.filters .field{min-width:140px}
.row-actions{display:flex;gap:5px}
.mini{font-size:11px;color:var(--text3)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:15px}
.tab{padding:8px 15px;border-radius:9px;background:var(--card2);border:1px solid var(--border);cursor:pointer;
  font-size:13px;font-weight:600;color:var(--text2)}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

@media(max-width:860px){
  #sidebar{position:fixed;inset-inline-start:-260px;height:100%;z-index:90}
  #sidebar.open{inset-inline-start:0;box-shadow:var(--shadow)}
  .topbar .menu-btn{display:grid;place-items:center}
  .form-grid{grid-template-columns:1fr}
  .topbar .sub{display:none}
/* ===== شاشة الدخول والتزامن ===== */
#loginScreen{position:fixed;inset:0;z-index:500;padding:20px;
  display:none;
  background:radial-gradient(800px 500px at 75% -10%,#e4e1ff,transparent 60%),radial-gradient(700px 500px at 10% 110%,#dff3ff,transparent 55%),var(--bg)}
#loginScreen.show{display:flex!important;align-items:center;justify-content:center}
.login-box{background:linear-gradient(180deg,#ffffff,#fbfbfe);border:1px solid var(--border);border-radius:24px;padding:44px 38px;width:100%;max-width:430px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;inset:0 0 auto 0;height:5px;background:var(--grad)}
.login-box .logo{width:64px;height:64px;border-radius:18px;background:var(--grad);display:grid;place-items:center;font-size:32px;margin:0 auto 14px;box-shadow:0 6px 14px rgba(99,91,255,.3)}
.login-box h2{text-align:center;font-size:22px;margin-bottom:4px;font-weight:800;letter-spacing:-.5px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{text-align:center;color:var(--text2);font-size:12.5px;margin-bottom:26px}
.login-box .field{margin-bottom:14px}
.login-box .btn{width:100%;justify-content:center;padding:12px;font-size:15px}
.login-msg{font-size:12px;text-align:center;margin-top:12px;min-height:16px}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 10px;border-radius:9px;background:var(--card2);border:1px solid var(--border)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3)}
.sync-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.sync-dot.off{background:var(--red)}
.sync-dot.local{background:var(--amber)}
</style>

function fbConfigured(){return firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('ضع');}
function setSync(mode){
  syncMode=mode;
  const dot=$('#syncDot'),txt=$('#syncTxt');if(!dot)return;
  dot.className='sync-dot '+(mode==='online'?'on':mode==='offline'?'off':'local');
  txt.textContent=mode==='online'?'متزامن':mode==='offline'?'غير متصل':'محلي';
}
function initFirebase(){
  if(!fbConfigured())return false;
  try{
    fbApp=firebase.initializeApp(firebaseConfig);
    fbAuth=firebase.auth();
    fbDB=firebase.database();
    fbReady=true;
    return true;
  }catch(e){console.error('Firebase init error',e);return false;}
}
let lastCloudJSON='';
function attachRealtime(){
  if(!fbReady)return;
  dbRef=fbDB.ref('erp_data');
  dbRef.on('value',snap=>{
    const val=snap.val();
    if(val&&val.products){
      const incoming=JSON.stringify(val);
      setSync('online');
      // تجاهل لو البيانات نفسها (صدى الكتابة بتاعتنا) — يمنع الوميض
      if(incoming===JSON.stringify(DB)||incoming===lastCloudJSON){lastCloudJSON=incoming;return;}
      lastCloudJSON=incoming;
      // لا تقاطع المستخدم أثناء فتح نافذة أو الكتابة في حقل
      const modalOpen=document.querySelector('.modal-bg[style*="flex"],.modal-bg.open');
      const typing=document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName);
      suppressPush=true;
      DB=val;
      localStorage.setItem(DB_KEY,JSON.stringify(DB));
      ensureTables();
      if(fbUser&&!modalOpen&&!typing){buildNav&&buildNav();if(currentPage)renderPage(currentPage);}
      suppressPush=false;
    }
  },err=>{console.error(err);setSync('offline');});
}
function pushToCloud(){
  if(!fbReady||suppressPush||!fbUser)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    fbDB.ref('erp_data').set(DB).then(()=>setSync('online')).catch(e=>{console.error(e);setSync('offline');});
  },600);
}

function loadDB(){
  const raw=localStorage.getItem(DB_KEY);
  if(raw){try{DB=JSON.parse(raw);}catch(e){DB={};}}
  if(!DB.products||!DB.products.length) seedAll();
  ensureTables();
  saveDB();
}
function ensureTables(){
  ['products','suppliers','customers','purchases','sales','vaccines','treasury',
   'storeDocs','returns','stockAdjust','users','farmInvoices','farmTransfers'].forEach(k=>{if(!DB[k])DB[k]=[];});
  if(!DB.settings)DB.settings={company:'الشركة المصرية لتوزيع الأدوية البيطرية',currency:'ج.م',reorderDefault:5};
  DB.products.forEach(p=>{
    if(p.cost===undefined)p.cost=0;
    if(p.doseMeat===undefined)p.doseMeat=p.dose||0;
    if(p.doseWater===undefined)p.doseWater=0;
    if(p.maker===undefined)p.maker='';
  });
  (DB.vaccines||[]).forEach(v=>{if(v.maker===undefined)v.maker='';});
  if(!DB.payments)DB.payments=[];
  migrateCycleCodes();
}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(DB));pushToCloud();}

function buildNav(){
  const nav=$('#nav');nav.innerHTML='';
  let pendingGroup=null,groupHasItems=false;
  MODULES.forEach(m=>{
    if(m.grp){
      // علّق المجموعة حتى نتأكد أن تحتها عناصر مرئية
      pendingGroup=m.grp;groupHasItems=false;return;
    }
    if(m.adminOnly&&currentUserRole!=='مدير عام')return;
    if(!canAccess(m.id))return;
    if(pendingGroup&&!groupHasItems){
      const g=document.createElement('div');g.className='nav-group';g.textContent=pendingGroup;nav.appendChild(g);
      groupHasItems=true;
    }
    const it=document.createElement('div');it.className='nav-item'+(m.id===currentPage?' active':'');
    it.dataset.id=m.id;
    let badge='';
    if(m.id==='alerts'){const c=countAlerts();if(c)badge=`<span class="badge">${c}</span>`;}
    it.innerHTML=`<span class="ico">${m.ico}</span><span>${m.name}</span>${badge}`;

    nav.appendChild(it);
  });

function catTag(c){const m={'أدوية بيطرية وسوائل':'blue','خامات وإضافات أعلاف':'amber','تحصينات ولقاحات':'green','مطهرات وأمن حيوي':'cyan'};

function stockTag(p){const s=p.stock||0;const cls=s<=0?'red':s<=(p.reorder||0)?'amber':'green';return `<span class="tag ${cls}">${fmt(s)}</span>`;}

/* تعديل مباشر بالضغط على الخانة */
function bindEdit(sel,table){
  $$(sel+' td.editable').forEach(td=>{
    td.onclick=()=>{
      if(td.querySelector('input,select'))return;
      const id=td.closest('tr').dataset.id;const f=td.dataset.f;
      const rec=DB[table].find(r=>String(r.id)===String(id));if(!rec)return;
      const numeric=['pkg','dose','doseMeat','doseWater','price','cost','stock','reorder','qty'].includes(f);
      const old=td.innerHTML;
      let inp;
      if(f==='cat'){inp=document.createElement('select');
        ['أدوية بيطرية وسوائل','خامات وإضافات أعلاف','تحصينات ولقاحات','مطهرات وأمن حيوي']
          .forEach(o=>{const op=new Option(o,o,false,o===rec[f]);inp.add(op);});}
      else{inp=document.createElement('input');inp.type=numeric?'number':'text';inp.value=rec[f]??'';}
      td.innerHTML='';td.appendChild(inp);inp.focus();
      const save=()=>{let v=inp.value;if(numeric)v=Number(v)||0;rec[f]=v;saveDB();renderPage(currentPage);
        toast('تم الحفظ ✓','green');};
      inp.onblur=save;
      inp.onkeydown=e=>{if(e.key==='Enter')save();if(e.key==='Escape'){td.innerHTML=old;}};
    };
  });
}

const ALL_ROLES=['مدير عام','محاسب','أمين مخزن','مندوب مبيعات','مشاهد'];

let currentUserRole='مدير عام';
let authWatch=null;
function startAuthWatchdog(){
  if(authWatch)return;
  authWatch=setInterval(()=>{
    if(fbUser){
      // طالما هناك جلسة: شاشة الدخول مخفية والتطبيق ظاهر دائماً
      const ls=$('#loginScreen');
      if(ls&&ls.classList.contains('show'))ls.classList.remove('show');
      const ap=$('#app');
      if(ap&&!ap.classList.contains('ready'))ap.classList.add('ready');
    }
  },500);
}
function boot(){
  loadDB();
  autoDailyBackup();
  $('#curDate').textContent=new Date().toLocaleDateString('ar-EG');
  if($('#verChip'))$('#verChip').textContent=APP_VERSION;
  // وضع Firebase أو وضع محلي
  if(fbConfigured()&&initFirebase()){
    setSync('offline');
    let authSettled=false;
    fbAuth.onAuthStateChanged(user=>{
      authSettled=true;
      if(user){
        fbUser=user;
        $('#loginScreen').classList.remove('show'); // ضمان الإخفاء فوراً
        onLoggedIn();
      }else{
        fbUser=null;
        $('#app').classList.remove('ready');
        // أظهر الدخول فقط بعد تأكّد عدم وجود جلسة (تفادي وميض أثناء استرجاع الجلسة)
        setTimeout(()=>{ if(!fbUser){$('#loginScreen').classList.add('show');} },400);
      }
    });
    $('#lg_btn').onclick=doLogin;
    $('#lg_pass').onkeydown=e=>{if(e.key==='Enter')doLogin();};
  }else{
    // وضع محلي بالكامل (بدون Firebase) — للتجربة من ملف file://
    setSync('local');
    $('#loginScreen').classList.remove('show');
    $('#app').classList.add('ready');
    $('#logoutBtn').style.display='none';
    buildNav();go('dashboard');
  }
}
function doLogin(){
  const email=$('#lg_email').value.trim(),pass=$('#lg_pass').value;
  if(!email||!pass){$('#lg_msg').textContent='أدخل البريد وكلمة المرور';return;}
  $('#lg_msg').style.color='var(--text3)';$('#lg_msg').textContent='جارٍ الدخول...';
  fbAuth.signInWithEmailAndPassword(email,pass)
    .catch(err=>{
      $('#lg_msg').style.color='var(--red)';
      $('#lg_msg').textContent=
        err.code==='auth/invalid-credential'||err.code==='auth/wrong-password'||err.code==='auth/user-not-found'
        ?'بيانات الدخول غير صحيحة':'تعذّر الدخول: '+err.code;
    });
}
function doLogout(){if(fbAuth)fbAuth.signOut();}
async function onLoggedIn(){
  $('#loginScreen').classList.remove('show');
  $('#app').classList.add('ready');
  startAuthWatchdog();
  $('#lg_msg').textContent='';if($('#lg_pass'))$('#lg_pass').value='';
  $('#logoutBtn').style.display='inline-flex';
  // حدد دور المستخدم من جدول المستخدمين في السحابة
  try{
    const snap=await fbDB.ref('users/'+fbUser.uid).once('value');
    const u=snap.val();
    if(u&&u.role){currentUserRole=u.role;}
    else{
      // أول مستخدم = مدير عام تلقائياً
      currentUserRole='مدير عام';
      await fbDB.ref('users/'+fbUser.uid).set({email:fbUser.email,role:'مدير عام',name:fbUser.email});
    }
  }catch(e){currentUserRole='مشاهد';}
  $('#curRole').textContent=currentUserRole;

  // حمّل بيانات السحابة، ولو فاضية ارفع البيانات المحلية تلقائياً
  const snap=await fbDB.ref('erp_data').once('value');
  const cloud=snap.val();
  if(cloud&&cloud.products&&cloud.products.length){
    suppressPush=true;DB=cloud;localStorage.setItem(DB_KEY,JSON.stringify(DB));ensureTables();suppressPush=false;
    setSync('online');
  }else{
    // السحابة فاضية: ارفع بياناتك المحلية الحالية تلقائياً
    ensureTables();
    await fbDB.ref('erp_data').set(DB);
    setSync('online');
    toast&&toast('تم رفع بياناتك المحلية إلى Firebase ✓','green');
  }
  attachRealtime();
  applyRolePermissions();
  buildNav();go('dashboard');
}

/* حاسبة الجرعات (جاهزة) */
function renderDoseCalc(page){
  const prods=DB.products.slice().sort((a,b)=>a.name.localeCompare(b.name,'ar'));
  page.innerHTML=`<div class="panel" style="max-width:680px">
    <div class="panel-h"><h3>🧮 حاسبة جرعات وتكاليف القطيع</h3></div>
    <div class="panel-b"><div class="form-grid">
      <div class="field"><label>عدد الفراخ بالمزرعة (طائر)</label><input id="d_birds" type="number" value="5000"></div>
      <div class="field"><label>متوسط وزن الطائر (كجم)</label><input id="d_wt" type="number" step="0.1" value="1.5"></div>
      <div class="field full"><label>اختر المنتج العلاجي</label><select id="d_prod">
        ${prods.map(p=>`<option value="${p.id}">${p.name} — ${p.ther||''}</option>`).join('')}</select></div>
      <div class="field"><label>الجرعة الفعلية المستخدمة (لكل طن)</label><input id="d_dose" type="number"></div>
    </div></div>
    <div class="panel-b" style="border-top:1px solid var(--border)"><div id="d_out" class="cards" style="margin:0"></div></div>
  </div>`;
  const calc=()=>{
    const p=DB.products.find(x=>String(x.id)===$('#d_prod').value);if(!p)return;
    const birds=+$('#d_birds').value||0,wt=+$('#d_wt').value||0;
    const tons=birds*wt/1000;
    const dose=$('#d_dose').value!==''?+$('#d_dose').value:(p.dose||0);
    const totalDose=tons*dose;
    const pkgs=p.pkg?Math.ceil(totalDose/p.pkg):0;
    const cost=pkgs*(p.price||0);
    const out=[
      {ico:'⚖️',lbl:'إجمالي الوزن الحي',val:fmt(birds*wt)+' كجم',c:'var(--cyan)'},
      {ico:'🏋️',lbl:'إجمالي الأطنان',val:fmt(tons)+' طن',c:'var(--primary)'},
      {ico:'💧',lbl:'إجمالي الجرعة المطلوبة',val:fmt(totalDose)+' '+(p.unit==='كيلو'||p.unit==='جرام'?'جم':'مل'),c:'var(--purple)'},
      {ico:'📦',lbl:'عدد العبوات المطلوبة',val:fmt(pkgs)+' عبوة',c:'var(--amber)'},
      {ico:'💵',lbl:'التكلفة الإجمالية',val:money(cost),c:'var(--green)'},
      {ico:'🏷️',lbl:'التصنيف العلاجي',val:p.ther||'-',c:'var(--pink)'},
    ];
    $('#d_out').innerHTML=out.map(c=>`<div class="stat" style="--accent:${c.c}"><span class="ico">${c.ico}</span>
      <div class="lbl">${c.lbl}</div><div class="val" style="font-size:18px">${c.val}</div></div>`).join('');
  };
  $('#d_prod').onchange=()=>{const p=DB.products.find(x=>String(x.id)===$('#d_prod').value);$('#d_dose').value=p?p.dose:'';calc();};
  ['d_birds','d_wt','d_dose'].forEach(id=>$('#'+id).oninput=calc);
  $('#d_prod').dispatchEvent(new Event('change'));
}

/* ====================================================================
   الدفعة 2: المشتريات + المبيعات + المرتجعات + المخزون
   كل فاتورة تحرّك رصيد المخزون تلقائياً
==================================================================== */

/* ---------- محرّك حركة المخزون ---------- */
function adjustStock(productId,delta){
  const p=DB.products.find(x=>String(x.id)===String(productId));
  if(p){p.stock=(p.stock||0)+delta;}
}
function applyInvoiceStock(inv,sign){
  // sign=+1 شراء(يزيد) / -1 بيع(ينقص) ... المرتجعات بالعكس
  inv.items.forEach(it=>adjustStock(it.productId,sign*it.qty));
}
function productOptions(selId){
  return DB.products.slice().sort((a,b)=>a.name.localeCompare(b.name,'ar'))
    .map(p=>`<option value="${p.id}">${p.name} — ${p.cat}</option>`).join('');
}

/* ---------- باني الفاتورة (مشترك للمشتريات/المبيعات/المرتجعات) ---------- */
let invDraft=[]; // الأصناف الجاري إضافتها
function invoiceBuilder(cfg){
  // cfg:{title,partyLabel,partyList,priceField,onSave,kind}
  invDraft=[];
  const partyOpts=cfg.partyList.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
  openModal(cfg.title,`
    <div class="form-grid">
      <div class="field"><label>التاريخ</label><input id="iv_date" type="date" value="${today()}"></div>
      <div class="field"><label>${cfg.partyLabel}</label><select id="iv_party">${partyOpts}</select></div>
    </div>
    <div style="border:1px solid var(--border);border-radius:9px;padding:11px;margin-top:14px">
      <div style="display:grid;grid-template-columns:2fr .8fr 1fr auto;gap:8px;align-items:end">
        <div class="field"><label>الصنف</label><select id="iv_prod">${productOptions()}</select></div>
        <div class="field"><label>الكمية</label><input id="iv_qty" type="number" value="1" min="0"></div>
        <div class="field"><label>السعر</label><input id="iv_price" type="number" value="0"></div>
        <button class="btn sm" id="iv_add">➕ أضف</button>
      </div>
      <div class="tbl-wrap" style="max-height:230px;margin-top:11px">
        <table><thead><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th>إجمالي</th><th></th></tr></thead>
        <tbody id="iv_body"></tbody>
        <tfoot><tr style="font-weight:800"><td colspan="3" style="text-align:left">الإجمالي</td>
          <td id="iv_total" style="color:var(--primary-l)">0</td><td></td></tr></tfoot></table>
      </div>
    </div>
    <div class="form-grid" style="margin-top:12px">
      <div class="field"><label>المدفوع (${DB.settings.currency})</label><input id="iv_paid" type="number" value="0"></div>
      <div class="field"><label>ملاحظات</label><input id="iv_note"></div>
    </div>`,
    ()=>{
      if(!invDraft.length){toast('أضف صنف واحد على الأقل','red');return false;}
      const total=invDraft.reduce((s,i)=>s+i.qty*i.price,0);
      const partyId=$('#iv_party').value;
      const party=cfg.partyList.find(x=>String(x.id)===String(partyId));
      const inv={id:uid(),date:$('#iv_date').value,partyId,partyName:party?party.name:'',
        items:invDraft.map(i=>({...i})),total,paid:+$('#iv_paid').value||0,note:$('#iv_note').value,
        kind:cfg.kind};
      cfg.onSave(inv);
    },'حفظ الفاتورة');
  // ملء سعر افتراضي عند اختيار صنف
  const setPrice=()=>{const p=DB.products.find(x=>String(x.id)===$('#iv_prod').value);if(p)$('#iv_price').value=p.price||0;};
  $('#iv_prod').onchange=setPrice;setPrice();
  $('#iv_add').onclick=()=>{
    const p=DB.products.find(x=>String(x.id)===$('#iv_prod').value);if(!p)return;
    const qty=+$('#iv_qty').value||0,price=+$('#iv_price').value||0;
    if(qty<=0){toast('الكمية لازم أكبر من صفر','red');return;}
    const ex=invDraft.find(i=>i.productId===p.id);
    if(ex){ex.qty+=qty;ex.price=price;}else invDraft.push({productId:p.id,name:p.name,qty,price});
    drawDraft();
  };
  function drawDraft(){
    $('#iv_body').innerHTML=invDraft.map((i,ix)=>`<tr><td>${i.name}</td><td>${fmt(i.qty)}</td>
      <td>${fmt(i.price)}</td><td><b>${money(i.qty*i.price)}</b></td>
      <td><button class="btn xs red" onclick="rmDraft(${ix})">✕</button></td></tr>`).join('')
      ||`<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:14px">لم تضف أصناف بعد</td></tr>`;
    $('#iv_total').textContent=money(invDraft.reduce((s,i)=>s+i.qty*i.price,0));
  }
  window.rmDraft=ix=>{invDraft.splice(ix,1);drawDraft();};
  drawDraft();
}

/* ---------- جدول الفواتير العام ---------- */
function invoiceTable(arr,cfg){
  // cfg:{partyHead, kind, onView}
  return `<div class="tbl-wrap"><table><thead><tr>
    <th>رقم</th><th>التاريخ</th><th>${cfg.partyHead}</th><th>عدد الأصناف</th>
    <th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th></th>
  </tr></thead><tbody>${arr.slice().reverse().map(inv=>{
    const rem=(inv.total||0)-(inv.paid||0);
    const st=rem<=0?'<span class="tag green">مسدد</span>':inv.paid>0?'<span class="tag amber">جزئي</span>':'<span class="tag red">آجل</span>';
    return `<tr><td>#${String(inv.id).slice(-5)}</td><td>${inv.date}</td><td>${inv.partyName||'-'}</td>
      <td>${inv.items.length}</td><td><b>${money(inv.total)}</b></td><td>${money(inv.paid)}</td>
      <td>${money(rem)}</td><td>${st}</td>
      <td class="row-actions">
        <button class="btn xs ghost" onclick="viewInvoice('${cfg.kind}','${inv.id}')">👁</button>
        <button class="btn xs red" onclick="delInvoice('${cfg.kind}','${inv.id}')">🗑</button></td></tr>`;
  }).join('')||`<tr><td colspan="9"><div class="empty"><span class="ico">🧾</span>لا توجد فواتير</div></td></tr>`}
  </tbody></table></div>`;
}
function viewInvoice(kind,id){
  const arr=invArr(kind);const inv=arr.find(x=>x.id===id);if(!inv)return;
  openModal('🧾 تفاصيل الفاتورة #'+String(id).slice(-5),`
    <p style="color:var(--text2);margin-bottom:10px">التاريخ: <b>${inv.date}</b> &nbsp;|&nbsp; الطرف: <b>${inv.partyName}</b></p>
    <div class="tbl-wrap"><table><thead><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th>إجمالي</th></tr></thead>
    <tbody>${inv.items.map(i=>`<tr><td>${i.name}</td><td>${fmt(i.qty)}</td><td>${fmt(i.price)}</td>
      <td>${money(i.qty*i.price)}</td></tr>`).join('')}</tbody>
    <tfoot><tr style="font-weight:800"><td colspan="3" style="text-align:left">الإجمالي</td><td>${money(inv.total)}</td></tr></tfoot>
    </table></div>
    <p style="margin-top:10px;color:var(--text2)">المدفوع: <b>${money(inv.paid)}</b> | المتبقي: <b>${money(inv.total-inv.paid)}</b></p>
    ${inv.note?`<p class="mini" style="margin-top:6px">📝 ${inv.note}</p>`:''}`,
    ()=>{},'إغلاق');
  $('#mSave').classList.remove('green');
}
function invArr(kind){return {purchase:DB.purchases,sale:DB.sales,returnSale:DB.returns,returnPurchase:DB.returns}[kind];}
function delInvoice(kind,id){
  confirmBox('حذف الفاتورة؟','سيتم عكس تأثيرها على المخزون.',()=>{
    let arr,sign;
    if(kind==='purchase'){arr=DB.purchases;sign=-1;}
    else if(kind==='sale'){arr=DB.sales;sign=+1;}
    else{arr=DB.returns;}
    const inv=arr.find(x=>x.id===id);if(!inv)return;
    if(kind==='purchase')applyInvoiceStock(inv,-1);
    else if(kind==='sale')applyInvoiceStock(inv,+1);
    else applyInvoiceStock(inv, inv.kind==='returnSale'?-1:+1);
    const idx=arr.indexOf(inv);arr.splice(idx,1);
    saveDB();renderPage(currentPage);toast('تم الحذف وعكس المخزون','red');
  });
}

  invoiceBuilder({title:'🛒 فاتورة شراء جديدة',partyLabel:'المورد',partyList:DB.suppliers,kind:'purchase',
    onSave:inv=>{applyInvoiceStock(inv,+1);DB.purchases.push(inv);
      // تحديث سعر الشراء (التكلفة) للأصناف تلقائياً من الفاتورة
      inv.items.forEach(it=>{const p=DB.products.find(x=>x.id===it.productId);if(p)p.cost=it.price;});
      const sup=DB.suppliers.find(s=>String(s.id)===String(inv.partyId));
      if(sup)sup.balance=(sup.balance||0)+(inv.total-inv.paid);
      cashMove('out',inv.paid,'دفعة شراء — '+inv.partyName,inv.date);
      saveDB();renderPage('purchases');buildNav();toast('تمت إضافة فاتورة الشراء وتحديث أسعار الشراء ✓','green');}});
}

/* ---------- المبيعات ---------- */
function renderSales(page){
  const profit=DB.sales.reduce((s,inv)=>s+inv.items.reduce((a,it)=>{
    const p=DB.products.find(x=>x.id===it.productId);return a+(it.price-(p?(p.cost||0):0))*it.qty;},0),0);
  page.innerHTML=`<div class="panel"><div class="panel-h"><h3>💰 المبيعات</h3>
    <div class="tools">
      <span class="chip">المبيعات: <b>${money(DB.sales.reduce((s,i)=>s+i.total,0))}</b></span>
      <span class="chip">الربح التقديري: <b style="color:var(--green)">${money(profit)}</b></span>
      <button class="btn" onclick="newSale()">➕ فاتورة بيع</button></div></div>
    <div class="panel-b flush">${invoiceTable(DB.sales,{partyHead:'العميل',kind:'sale'})}</div></div>`;
}
function newSale(){
  if(!DB.customers.length){toast('أضف عميل أولاً','red');return;}
  invoiceBuilder({title:'💰 فاتورة بيع جديدة',partyLabel:'العميل',partyList:DB.customers,kind:'sale',
    onSave:inv=>{
      // تحقق من توفر المخزون
      const short=inv.items.find(it=>{const p=DB.products.find(x=>x.id===it.productId);return p&&(p.stock||0)<it.qty;});
      if(short){const p=DB.products.find(x=>x.id===short.productId);
        toast(`المخزون غير كافٍ: ${p.name} (المتاح ${fmt(p.stock||0)})`,'amber');}
      applyInvoiceStock(inv,-1);DB.sales.push(inv);
      const c=DB.customers.find(x=>String(x.id)===String(inv.partyId));
      if(c)c.balance=(c.balance||0)+(inv.total-inv.paid);
      cashMove('in',inv.paid,'تحصيل بيع — '+inv.partyName,inv.date);
      saveDB();renderPage('sales');buildNav();toast('تمت إضافة فاتورة البيع ✓','green');}});
}

    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>رقم</th><th>التاريخ</th><th>النوع</th><th>الطرف</th><th>الأصناف</th><th>القيمة</th><th>إجراءات</th>
    </tr></thead><tbody>${DB.returns.slice().reverse().map(r=>`<tr>

function newReturn(kind){
  const isSale=kind==='returnSale';
  invoiceBuilder({title:isSale?'↩️ مرتجع مبيعات':'↪️ مرتجع مشتريات',
    partyLabel:isSale?'العميل':'المورد',partyList:isSale?DB.customers:DB.suppliers,kind,
    onSave:inv=>{
      applyInvoiceStock(inv,isSale?+1:-1);
      DB.returns.push(inv);
      cashMove(isSale?'out':'in',inv.total,(isSale?'رد قيمة مرتجع بيع — ':'استرداد مرتجع شراء — ')+inv.partyName,inv.date);
      saveDB();renderPage('returns');toast('تم تسجيل المرتجع ✓','green');}});
}
/* تعديل مرتجع: نعكس أثره القديم ثم نعيد بناءه */
function editReturn(id){
  const r=DB.returns.find(x=>x.id===id);if(!r)return;
  const isSale=r.kind==='returnSale';
  // اعرض نافذة تعديل مبسطة: عدّل الكميات والأسعار والتاريخ
  const rowsHtml=()=>r.items.map((it,ix)=>`<tr>
    <td>${it.name}</td>
    <td><input type="number" class="er-qty" data-ix="${ix}" value="${it.qty}" style="width:80px"></td>
    <td><input type="number" class="er-price" data-ix="${ix}" value="${it.price}" style="width:90px"></td>
    <td><button class="btn xs red" onclick="erDelItem('${id}',${ix})">✕</button></td></tr>`).join('');
  openModal('✏️ تعديل مرتجع #'+String(id).slice(-5),`
    <div class="form-grid"><div class="field"><label>التاريخ</label><input id="er_date" type="date" value="${r.date}"></div>
    <div class="field"><label>الطرف</label><input value="${r.partyName}" disabled></div></div>
    <div class="tbl-wrap" style="margin-top:12px;max-height:240px"><table><thead><tr>
      <th>الصنف</th><th>الكمية</th><th>السعر</th><th></th></tr></thead><tbody>${rowsHtml()}</tbody></table></div>
    <p class="mini" style="margin-top:8px">سيُعاد حساب أثر المخزون والخزينة تلقائياً بعد الحفظ.</p>`,
    ()=>{
      // 1) اعكس الأثر القديم بالقيم القديمة أولاً (قبل أي تعديل)
      reverseReturnEffect(r);
      // 2) اقرأ القيم الجديدة وطبّقها على r
      document.querySelectorAll('.er-qty').forEach(inp=>{r.items[+inp.dataset.ix].qty=+inp.value||0;});
      document.querySelectorAll('.er-price').forEach(inp=>{r.items[+inp.dataset.ix].price=+inp.value||0;});
      r.items=r.items.filter(it=>it.qty>0);
      r.date=$('#er_date').value;
      r.total=r.items.reduce((s,i)=>s+i.qty*i.price,0);
      // 3) طبّق الأثر الجديد
      applyReturnEffect(r);
      saveDB();renderPage('returns');toast('تم تعديل المرتجع ✓','green');});
}
window.erDelItem=(id,ix)=>{const r=DB.returns.find(x=>x.id===id);if(r){r.items.splice(ix,1);editReturn(id);}};
/* أثر المرتجع على المخزون والخزينة (للتعديل النظيف) */
function applyReturnEffect(r){
  const isSale=r.kind==='returnSale';
  applyInvoiceStock(r,isSale?+1:-1);
  cashMove(isSale?'out':'in',r.total,(isSale?'تعديل مرتجع بيع — ':'تعديل مرتجع شراء — ')+r.partyName,r.date);
}
function reverseReturnEffect(r){
  const isSale=r.kind==='returnSale';
  applyInvoiceStock(r,isSale?-1:+1);
  // نعكس الخزينة بقيمة المرتجع القديمة
  cashMove(isSale?'in':'out',r.total||0,'عكس مرتجع (تعديل) — '+r.partyName,today());
}
function printReturn(id){
  const r=DB.returns.find(x=>x.id===id);if(!r)return;
  const isSale=r.kind==='returnSale';
  const rows=r.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.name}</td><td>${fmt(it.qty)}</td>
    <td>${fmt(it.price)}</td><td>${fmt(it.qty*it.price)}</td></tr>`).join('');
  printDoc(isSale?'إشعار مرتجع مبيعات':'إشعار مرتجع مشتريات',
    [['التاريخ',r.date],[isSale?'العميل':'المورد',r.partyName],['رقم','#'+String(r.id).slice(-5)]],
    ['#','الصنف','الكمية','السعر','الإجمالي'],rows,r.total);
}

let transferDraft=[];
function newTransfer(){transferDraft=[];transferModal(null);}
function editTransfer(id){const t=DB.farmTransfers.find(x=>x.id===id);if(!t)return;
  transferDraft=t.items.map(i=>({...i}));transferModal(t);}
function transferModal(existing){
  const farmNames=[...new Set((DB.farmInvoices||[]).map(f=>f.customerName))];
  const farmOpts=n=>farmNames.map(x=>`<option ${x===n?'selected':''}>${x}</option>`).join('');
  // مصدر الأصناف: كل الأدوية واللقاحات
  const prodOpts=DB.products.map(p=>`<option value="p-${p.id}" data-name="${p.name}">${p.name}</option>`).join('')
    +DB.vaccines.map(v=>`<option value="v-${v.id}" data-name="${v.name}">${v.name} (لقاح)</option>`).join('');
  openModal(existing?'✏️ تعديل تحويل':'➕ تحويل بين مزرعتين',`
    <div class="form-grid">
      <div class="field"><label>التاريخ</label><input id="tr_date" type="date" value="${existing?existing.date:today()}"></div>
      <div class="field"><label>السبب/ملاحظة</label><input id="tr_note" value="${existing?existing.note||'':''}"></div>
      <div class="field"><label>من مزرعة</label><select id="tr_from">${farmOpts(existing?existing.fromFarm:'')}</select></div>
      <div class="field"><label>إلى مزرعة</label><select id="tr_to">${farmOpts(existing?existing.toFarm:'')}</select></div>
    </div>
    <div style="border:1px solid var(--border);border-radius:9px;padding:11px;margin-top:13px">
      <div style="display:grid;grid-template-columns:2fr .8fr auto;gap:8px;align-items:end">
        <div class="field"><label>الصنف المحوّل</label><select id="tr_prod">${prodOpts}</select></div>
        <div class="field"><label>الكمية</label><input id="tr_qty" type="number" value="1"></div>
        <button class="btn sm" id="tr_add">➕</button>
      </div>
      <div class="tbl-wrap" style="max-height:200px;margin-top:11px"><table><thead><tr><th>الصنف</th><th>الكمية</th><th></th></tr></thead>
        <tbody id="tr_body"></tbody></table></div>
    </div>`,
    ()=>{
      const from=$('#tr_from').value,to=$('#tr_to').value;
      if(!from||!to){toast('اختر المزرعتين','red');return false;}
      if(from===to){toast('لا يمكن التحويل لنفس المزرعة','red');return false;}
      if(!transferDraft.length){toast('أضف صنفاً واحداً على الأقل','red');return false;}
      if(existing){existing.date=$('#tr_date').value;existing.note=$('#tr_note').value;
        existing.fromFarm=from;existing.toFarm=to;existing.items=transferDraft.map(i=>({...i}));}
      else DB.farmTransfers.push({id:uid(),date:$('#tr_date').value,note:$('#tr_note').value,
        fromFarm:from,toFarm:to,items:transferDraft.map(i=>({...i}))});
      saveDB();renderPage('returns');toast('تم حفظ التحويل ✓','green');});
  const draw=()=>{$('#tr_body').innerHTML=transferDraft.map((i,ix)=>`<tr><td>${i.name}</td><td>${fmt(i.qty)}</td>
    <td><button class="btn xs red" onclick="trRm(${ix})">✕</button></td></tr>`).join('')
    ||`<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:12px">لم تضف أصناف</td></tr>`;};
  $('#tr_add').onclick=()=>{const sel=$('#tr_prod'),o=sel.options[sel.selectedIndex];
    const qty=+$('#tr_qty').value||0;if(qty<=0){toast('أدخل كمية','red');return;}
    transferDraft.push({name:o.dataset.name,qty});draw();};
  window.trRm=ix=>{transferDraft.splice(ix,1);draw();};
  draw();
}
function delTransfer(id){confirmBox('حذف التحويل؟','سيُحذف سجل التحويل نهائياً.',()=>{
  DB.farmTransfers=DB.farmTransfers.filter(t=>t.id!==id);saveDB();renderPage('returns');toast('تم الحذف','red');});}
function printTransfer(id){
  const t=DB.farmTransfers.find(x=>x.id===id);if(!t)return;
  const rows=t.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.name}</td><td>${fmt(it.qty)}</td></tr>`).join('');
  printDoc('إذن تحويل بين المزارع',

    ['#','الصنف','الكمية'],rows,null);

/* ---------- حركة الخزينة المساعدة ---------- */
function cashMove(dir,amount,desc,date){
  if(!amount)return;
  DB.treasury.push({id:uid(),date:date||today(),dir,amount:Math.abs(amount),desc});
}

/* ---------- المخزون والأرصدة ---------- */
let invFilter={cat:'',status:'',q:''};
function renderInventory(page){
  const cats=[...new Set(DB.products.map(p=>p.cat))];
  page.innerHTML=`<div class="panel"><div class="panel-h"><h3>🏬 المخزون والأرصدة</h3>
    <div class="tools">
      <div class="search"><input id="iq" placeholder="بحث..." value="${invFilter.q}"></div>
      <select id="icat"><option value="">كل التصنيفات</option>${cats.map(c=>`<option ${invFilter.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      <select id="istat"><option value="">كل الحالات</option>
        <option value="out" ${invFilter.status==='out'?'selected':''}>نفد</option>
        <option value="low" ${invFilter.status==='low'?'selected':''}>تحت حد الطلب</option>
        <option value="ok" ${invFilter.status==='ok'?'selected':''}>متوفر</option></select>
    </div></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>الصنف</th><th>التصنيف</th><th>الرصيد</th><th>حد الطلب</th><th>سعر الشراء</th><th>سعر البيع</th><th>هامش الربح</th>
      <th>قيمة المخزون</th><th>الحالة</th>
    </tr></thead><tbody id="ibody"></tbody>
    <tfoot><tr style="font-weight:800"><td colspan="7" style="text-align:left">إجمالي قيمة المخزون</td>
      <td id="ivaltot" style="color:var(--primary-l)"></td><td></td></tr></tfoot></table></div></div></div>
    <div class="mini" id="icount" style="padding:4px 6px"></div>`;
  const draw=()=>{
    const f=DB.products.filter(p=>{
      const s=p.stock||0,st=s<=0?'out':s<=(p.reorder||0)?'low':'ok';
      return (!invFilter.cat||p.cat===invFilter.cat)&&(!invFilter.status||invFilter.status===st)&&
        (!invFilter.q||(p.name||'').includes(invFilter.q));});
    $('#ibody').innerHTML=f.map(p=>{
      const s=p.stock||0,st=s<=0?['نفد','red']:s<=(p.reorder||0)?['تحت الحد','amber']:['متوفر','green'];
      const margin=(p.price||0)-(p.cost||0);
      const marginPct=p.cost>0?Math.round(margin/p.cost*100):null;
      return `<tr data-id="${p.id}"><td><b>${p.name}</b></td><td>${catTag(p.cat)}</td>
        <td class="editable" data-f="stock">${fmt(s)}</td>
        <td class="editable" data-f="reorder">${fmt(p.reorder||0)}</td>
        <td class="editable" data-f="cost">${(p.cost||0)>0?money(p.cost):'<span class="mini">—</span>'}</td>
        <td class="editable" data-f="price">${money(p.price)}</td>
        <td>${p.cost>0?`<span class="tag ${margin>=0?'green':'red'}">${money(margin)}${marginPct!==null?` (${marginPct}%)`:''}</span>`:'<span class="mini">—</span>'}</td>
        <td><b>${money(s*(p.cost||p.price||0))}</b></td>
        <td><span class="tag ${st[1]}">${st[0]}</span></td></tr>`;}).join('')
      ||`<tr><td colspan="7"><div class="empty"><span class="ico">🔍</span>لا توجد نتائج</div></td></tr>`;
    $('#ivaltot').textContent=money(f.reduce((s,p)=>s+(p.stock||0)*(p.cost||p.price||0),0));
    $('#icount').textContent=`عرض ${f.length} صنف`;
    bindEdit('#ibody','products');
  };
  $('#iq').oninput=e=>{invFilter.q=e.target.value;draw();};
  $('#icat').onchange=e=>{invFilter.cat=e.target.value;draw();};
  $('#istat').onchange=e=>{invFilter.status=e.target.value;draw();};
  draw();
}

/* ---------- الخزينة والنقدية ---------- */
function renderTreasury(page){
  const income=DB.treasury.filter(t=>t.dir==='in').reduce((s,t)=>s+t.amount,0);

function storeDocModal(type){
  const titles={in:'📥 إذن استلام',out:'📤 إذن صرف',adjust:'⚖️ تسوية مخزنية'};
  openModal(titles[type],`<div class="form-grid">
    <div class="field"><label>التاريخ</label><input id="sd_date" type="date" value="${today()}"></div>
    <div class="field"><label>الكمية</label><input id="sd_qty" type="number" value="1"></div>
    <div class="field full"><label>الصنف</label><select id="sd_prod">${productOptions()}</select></div>
    <div class="field full"><label>السبب / البيان</label><input id="sd_reason"
      placeholder="${type==='out'?'صرف للاستخدام / تالف / هالك':type==='in'?'استلام بضاعة':'تصحيح رصيد بعد الجرد'}"></div>
    ${type==='adjust'?'<p class="mini full">التسوية: موجب يزيد الرصيد، سالب ينقصه.</p>':''}
  </div>`,()=>{
    const pid=$('#sd_prod').value;let qty=+$('#sd_qty').value||0;
    if(type==='out'&&qty<=0||type==='in'&&qty<=0){toast('أدخل كمية صحيحة','red');return false;}
    const delta=type==='in'?qty:type==='out'?-qty:qty; // adjust يقبل سالب
    adjustStock(pid,delta);
    DB.storeDocs.push({id:uid(),date:$('#sd_date').value,type,productId:+pid,qty:Math.abs(qty),reason:$('#sd_reason').value});
    saveDB();renderPage('storeDocs');buildNav();toast('تم تسجيل الإذن وتحديث المخزون ✓','green');});
}
function delStoreDoc(id){
  confirmBox('حذف الإذن؟','سيتم عكس تأثيره على المخزون.',()=>{
    const d=DB.storeDocs.find(x=>x.id===id);if(!d)return;
    const delta=d.type==='in'?-d.qty:d.type==='out'?+d.qty:-d.qty;
    adjustStock(d.productId,delta);
    DB.storeDocs=DB.storeDocs.filter(x=>x.id!==id);saveDB();renderPage('storeDocs');buildNav();toast('تم الحذف','red');});
}

/* ---------- الجرد والصلاحيات ---------- */
let auditTab='expiry';
function renderStockAdjust(page){
  page.innerHTML=`<div class="tabs">
    <div class="tab ${auditTab==='expiry'?'active':''}" onclick="auditTab='expiry';renderPage('stockAdjust')">📅 تواريخ الصلاحية</div>
    <div class="tab ${auditTab==='audit'?'active':''}" onclick="auditTab='audit';renderPage('stockAdjust')">📋 الجرد الدوري</div>
    <div class="tab ${auditTab==='stale'?'active':''}" onclick="auditTab='stale';renderPage('stockAdjust')">🐌 الأصناف الراكدة</div>
  </div><div id="auditArea"></div>`;
  if(auditTab==='expiry')drawExpiry();
  else if(auditTab==='audit')drawAudit();
  else drawStale();
}
function drawExpiry(){
  const list=DB.products.filter(p=>p.expiry).sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));
  $('#auditArea').innerHTML=`<div class="panel"><div class="panel-h"><h3>📅 تواريخ الصلاحية</h3>
    <span class="mini" style="margin-int-start:auto">اضغط على خانة التاريخ لتعديلها</span></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>الصنف</th><th>الرصيد</th><th>تاريخ الصلاحية</th><th>المتبقي</th><th>الحالة</th></tr></thead>
    <tbody id="exbody">${(list.length?list:DB.products.slice(0,15)).map(p=>{
      const d=p.expiry?daysTo(p.expiry):null;
      const st=d===null?['—','gray']:d<0?['منتهي','red']:d<=60?['قرب الانتهاء','amber']:['سليم','green'];
      return `<tr data-id="${p.id}"><td><b>${p.name}</b></td><td>${fmt(p.stock||0)}</td>
        <td class="editable" data-f="expiry">${p.expiry||'—'}</td>
        <td>${d===null?'—':d+' يوم'}</td><td><span class="tag ${st[1]}">${st[0]}</span></td></tr>`;}).join('')}
    </tbody></table></div></div></div>`;
  bindEditDate('#exbody');
}
function bindEditDate(sel){
  $$(sel+' td.editable').forEach(td=>{td.onclick=()=>{
    if(td.querySelector('input'))return;
    const id=td.closest('tr').dataset.id,rec=DB.products.find(r=>String(r.id)===String(id));
    const inp=document.createElement('input');inp.type='date';inp.value=rec.expiry||'';
    td.innerHTML='';td.appendChild(inp);inp.focus();
    const save=()=>{rec.expiry=inp.value;saveDB();renderPage('stockAdjust');toast('تم الحفظ ✓','green');};
    inp.onblur=save;inp.onkeydown=e=>{if(e.key==='Enter')save();};
  };});
}
function drawAudit(){
  $('#auditArea').innerHTML=`<div class="panel"><div class="panel-h"><h3>📋 الجرد الدوري</h3>
    <div class="tools"><span class="mini">سجّل الرصيد الفعلي، والفرق يظهر تلقائياً ويمكن ترحيله</span></div></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>الصنف</th><th>رصيد دفتري</th><th>رصيد فعلي</th><th>الفرق</th><th></th></tr></thead>
    <tbody id="aubody">${DB.products.slice(0,40).map(p=>`<tr data-id="${p.id}">
      <td>${p.name}</td><td>${fmt(p.stock||0)}</td>
      <td><input type="number" class="au-actual" data-id="${p.id}" value="${p.stock||0}" style="width:90px"></td>
      <td class="au-diff" data-id="${p.id}">0</td>
      <td><button class="btn xs green" onclick="postAudit(${p.id})">ترحيل</button></td></tr>`).join('')}
    </tbody></table></div></div></div>`;
  $$('.au-actual').forEach(inp=>inp.oninput=()=>{
    const p=DB.products.find(x=>String(x.id)===inp.dataset.id);
    const diff=(+inp.value||0)-(p.stock||0);
    const cell=$(`.au-diff[data-id="${inp.dataset.id}"]`);
    cell.innerHTML=`<span class="tag ${diff===0?'gray':diff>0?'green':'red'}">${diff>0?'+':''}${fmt(diff)}</span>`;
  });
}
function postAudit(id){
  const inp=$(`.au-actual[data-id="${id}"]`);const p=DB.products.find(x=>x.id===id);
  const actual=+inp.value||0;const diff=actual-(p.stock||0);
  if(diff===0){toast('لا يوجد فرق','amber');return;}
  p.stock=actual;
  DB.storeDocs.push({id:uid(),date:today(),type:'adjust',productId:id,qty:Math.abs(diff),reason:'تسوية جرد'});
  saveDB();renderPage('stockAdjust');buildNav();toast('تم ترحيل فرق الجرد ✓','green');
}
function drawStale(){
  // صنف راكد = له رصيد ولم يُبع في آخر 90 يوم
  const soldIds=new Set();const cut=new Date(Date.now()-90*86400000);
  DB.sales.forEach(s=>{if(new Date(s.date)>=cut)s.items.forEach(i=>soldIds.add(i.productId));});
  const stale=DB.products.filter(p=>(p.stock||0)>0&&!soldIds.has(p.id));
  $('#auditArea').innerHTML=`<div class="panel"><div class="panel-h"><h3>🐌 الأصناف الراكدة (رصيد بدون بيع خلال 90 يوم)</h3></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>الصنف</th><th>التصنيف</th><th>الرصيد</th><th>قيمة الركود</th></tr></thead>
    <tbody>${stale.map(p=>`<tr><td>${p.name}</td><td>${catTag(p.cat)}</td>
      <td><span class="tag amber">${fmt(p.stock)}</span></td><td><b>${money((p.stock||0)*(p.price||0))}</b></td></tr>`).join('')
      ||`<tr><td colspan="4"><div class="empty"><span class="ico">✅</span>لا توجد أصناف راكدة</div></td></tr>`}
    </tbody></table></div></div></div>`;
}

let repRange='month',repFrom='',repTo='',repType='summary';
function renderReports(page){
  page.innerHTML=`
  <div class="panel"><div class="panel-h"><h3>📈 مركز التقارير</h3>
    <div class="tools">
      <select id="rep_type">
        <option value="summary">📊 ملخص عام للفترة</option>

        <option value="cycle">🏠 تقرير بكود الدورة</option>

        <option value="profit">💰 تقرير الأرباح بالصنف</option>
        <option value="itemmove">📦 حركة صنف في المخزون</option>
        <option value="suppliers">🏭 الموردين والمستحقات</option>
        <option value="cashflow">🏦 التدفق النقدي للخزينة</option>
        <option value="sales_detail">🧾 تفصيل فواتير البيع</option>
        <option value="compare">⚖️ مقارنة أصناف نفس التصنيف العلاجي</option>
      </select>
      <select id="rep_range">
        <option value="day">اليوم</option><option value="week">الأسبوع</option>
        <option value="month" selected>الشهر</option><option value="quarter">الربع</option>
        <option value="year">السنة</option><option value="all">كل الفترات</option>
        <option value="custom">مخصص</option></select>
      <input type="date" id="rep_from" style="display:none">
      <input type="date" id="rep_to" style="display:none">
      <select id="rep_entity" style="display:none;min-width:170px"></select>
      <button class="btn sm green" onclick="printReport()">🖨️ طباعة</button>
    </div></div>
    <div class="panel-b" id="rep_body"></div></div>`;
  $('#rep_type').value=repType;$('#rep_range').value=repRange;
  const toggleEntity=()=>{
    const t=$('#rep_type').value;
    const needCust=t==='customer';const needCycle=t==='cycle';const needItem=t==='itemmove'||t==='compare';
    const sel=$('#rep_entity');
    if(needCust||needCycle||needItem){
      sel.style.display='block';
      if(needCust)sel.innerHTML=DB.customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
      else if(needCycle)sel.innerHTML=(DB.farmInvoices||[]).map(f=>`<option value="${f.id}">${f.cycleCode} — ${f.customerName}</option>`).join('');
      else sel.innerHTML=DB.products.slice().sort((a,b)=>a.name.localeCompare(b.name,'ar')).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    }else sel.style.display='none';
  };
  $('#rep_type').onchange=()=>{repType=$('#rep_type').value;toggleEntity();drawReport();};
  $('#rep_range').onchange=e=>{repRange=e.target.value;
    const cu=repRange==='custom';$('#rep_from').style.display=cu?'block':'none';$('#rep_to').style.display=cu?'block':'none';drawReport();};
  $('#rep_from').onchange=e=>{repFrom=e.target.value;drawReport();};
  $('#rep_to').onchange=e=>{repTo=e.target.value;drawReport();};
  $('#rep_entity').onchange=drawReport;
  toggleEntity();drawReport();
}
function inRange(d){
  if(!d)return false;if(repRange==='all')return true;
  if(repRange==='custom'){return (!repFrom||d>=repFrom)&&(!repTo||d<=repTo);}
  const date=new Date(d),now=new Date();const diff=(now-date)/86400000;
  return {day:1,week:7,month:31,quarter:92,year:366}[repRange]>=diff && diff>=0;
}
function rangeLabel(){
  return {day:'اليوم',week:'آخر أسبوع',month:'الشهر',quarter:'الربع',year:'السنة',all:'كل الفترات',
    custom:`من ${repFrom||'...'} إلى ${repTo||'...'}`}[repRange];
}
/* إجمالي فاتورة مزرعة */
function farmTotalOf(f){return f.items.reduce((a,i)=>a+i.qty*i.price,0);}

function drawReport(){
  ensureFarmInvoices&&ensureFarmInvoices();
  const t=repType;
  const fn={summary:repSummary,customer:repCustomer,cycle:repCycle,receivables:repReceivables,
    compare:repCompare,
    profit:repProfit,itemmove:repItemMove,suppliers:repSuppliers,cashflow:repCashflow,
    sales_detail:repSalesDetail}[t]||repSummary;
  $('#rep_body').innerHTML=fn();
}

/* ============ 1) ملخص عام ============ */
function repSummary(){
  const farmInvs=(DB.farmInvoices||[]).filter(f=>inRange(f.entryDate||f.createdAt));
  const farmTotal=farmInvs.reduce((s,f)=>s+farmTotalOf(f),0);
  const vaxTotal=farmInvs.filter(f=>f.type==='vaccine').reduce((s,f)=>s+farmTotalOf(f),0);
  const drugTotal=farmTotal-vaxTotal;
  const directSales=DB.sales.filter(s=>inRange(s.date)&&!s.fromFarm);
  const purch=DB.purchases.filter(p=>inRange(p.date));
  const directSalesTot=directSales.reduce((s,i)=>s+i.total,0);
  const salesTot=directSalesTot+farmTotal;
  const purchTot=purch.reduce((s,i)=>s+i.total,0);
  const profit=directSales.reduce((s,inv)=>s+inv.items.reduce((a,it)=>{
    const p=DB.products.find(x=>x.id===it.productId);return a+(it.price-(p?(p.cost||0):0))*it.qty;},0),0);
  const payIn=(DB.payments||[]).filter(p=>inRange(p.date)).reduce((s,p)=>s+p.amount,0);
  const prodSold={};
  directSales.forEach(s=>s.items.forEach(i=>{prodSold[i.name]=(prodSold[i.name]||0)+i.qty;}));
  farmInvs.forEach(f=>f.items.forEach(i=>{prodSold[i.name]=(prodSold[i.name]||0)+i.qty;}));
  const top=Object.entries(prodSold).sort((a,b)=>b[1]-a[1]).slice(0,10);
  return repHead('ملخص عام للفترة')+`
    <div class="cards" style="margin-bottom:16px">
      ${statCard('💰','إجمالي المبيعات',money(salesTot),(directSales.length+farmInvs.length)+' فاتورة','var(--green)')}

function repCustomer(){

  if(!c)return repHead('كشف حساب عميل')+emptyBox('اختر عميلاً');
  // كل الحركات: فواتير المزارع (مع تمييز غير المرحّلة) + فواتير بيع مباشرة + دفعات
  let rows=[];
  (DB.farmInvoices||[]).filter(f=>String(f.customerId)===String(c.id)&&inRange(f.entryDate)).forEach(f=>{
    const tot=farmTotalOf(f);
    rows.push({date:f.entryDate,type:'فاتورة '+(f.type==='vaccine'?'تحصينات':'أدوية'),ref:f.cycleCode,
      debit:tot,credit:f.paid||0,posted:f.posted});
  });
  DB.sales.filter(s=>String(s.partyId)===String(c.id)&&!s.fromFarm&&inRange(s.date)).forEach(s=>{
    rows.push({date:s.date,type:'فاتورة بيع',ref:'#'+String(s.id).slice(-5),debit:s.total,credit:s.paid||0,posted:true});
  });
  (DB.payments||[]).filter(p=>String(p.customerId)===String(c.id)&&inRange(p.date)).forEach(p=>{
    rows.push({date:p.date,type:'تحصيل دفعة',ref:p.note||'',debit:0,credit:p.amount,posted:true});
  });
  rows.sort((a,b)=>new Date(a.date)-new Date(b.date));
  let bal=0;
  const body=rows.map(r=>{
    const counts=r.posted!==false;            // غير المرحّلة لا تدخل الرصيد

    const dim=r.posted===false?'opacity:.6':'';

  const totDebit=postedRows.reduce((s,r)=>s+r.debit,0),totCredit=postedRows.reduce((s,r)=>s+r.credit,0);
  const unpostedCount=rows.filter(r=>r.posted===false).length;
  return repHead('كشف حساب: '+c.name)+`
    <div class="cards" style="margin-bottom:16px">
      ${statCard('🧾','إجمالي الفواتير',money(totDebit),'مدين','var(--primary)')}

/* ============ 4) الذمم وأعمار الديون ============ */
function repReceivables(){
  const debtors=DB.customers.filter(c=>(c.balance||0)>0).sort((a,b)=>b.balance-a.balance);
  // أعمار الدين: نحسب أقدم فاتورة غير مسددة بالكامل لكل عميل
  const aged=debtors.map(c=>{
    const invs=(DB.farmInvoices||[]).filter(f=>String(f.customerId)===String(c.id)&&f.posted);
    let oldest=null;invs.forEach(f=>{if(!oldest||new Date(f.entryDate)<new Date(oldest))oldest=f.entryDate;});
    const age=oldest?Math.max(0,Math.ceil((new Date()-new Date(oldest))/86400000)):0;
    let bucket=age<=30?'0-30':age<=60?'31-60':age<=90?'61-90':'+90';
    return {c,age,bucket};
  });
  const total=debtors.reduce((s,c)=>s+c.balance,0);
  const buckets={'0-30':0,'31-60':0,'61-90':0,'+90':0};
  aged.forEach(a=>buckets[a.bucket]+=a.c.balance);
  const body=aged.map(a=>`<tr><td><b>${a.c.name}</b></td><td>${a.c.type||'-'}</td><td>${a.c.phone||'-'}</td>
    <td><span class="tag red">${money(a.c.balance)}</span></td>
    <td>${a.age} يوم</td>
    <td><span class="tag ${a.bucket==='0-30'?'green':a.bucket==='31-60'?'amber':'red'}">${a.bucket} يوم</span></td></tr>`).join('');
  return repHead('الذمم والمديونيات')+`
    <div class="cards" style="margin-bottom:16px">
      ${statCard('💳','إجمالي الذمم',money(total),debtors.length+' عميل','var(--red)')}
      ${statCard('🟢','حديثة (0-30)',money(buckets['0-30']),'','var(--green)')}
      ${statCard('🟡','متوسطة (31-60)',money(buckets['31-60']),'','var(--amber)')}
      ${statCard('🔴','متأخرة (+60)',money(buckets['61-90']+buckets['+90']),'تحتاج متابعة','var(--red)')}
    </div>
    <div class="panel" style="margin:0"><div class="panel-h"><h3>📋 تفصيل ذمم العملاء</h3></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>العميل</th><th>النوع</th><th>الهاتف</th><th>المديونية</th><th>عمر أقدم دين</th><th>الفئة</th>
    </tr></thead><tbody>${body||emptyRow(6)}</tbody></table></div></div></div>`;
}

/* ============ 5) تقرير الأرباح بالصنف ============ */
function repProfit(){
  const directSales=DB.sales.filter(s=>inRange(s.date)&&!s.fromFarm);
  const farmInvs=(DB.farmInvoices||[]).filter(f=>f.posted&&inRange(f.entryDate));
  const map={}; // name -> {qty,revenue,cost}
  const add=(name,qty,price,prodId)=>{
    const p=DB.products.find(x=>x.id===prodId)||DB.products.find(x=>x.name===name);
    const cost=p?(p.cost||0):0;
    if(!map[name])map[name]={qty:0,revenue:0,cost:0};
    map[name].qty+=qty;map[name].revenue+=qty*price;map[name].cost+=qty*cost;
  };
  directSales.forEach(s=>s.items.forEach(i=>add(i.name,i.qty,i.price,i.productId)));
  farmInvs.forEach(f=>f.items.forEach(i=>add(i.name,i.qty,i.price,null)));
  const rows=Object.entries(map).map(([n,v])=>({n,...v,profit:v.revenue-v.cost}))
    .sort((a,b)=>b.profit-a.profit);
  const totRev=rows.reduce((s,r)=>s+r.revenue,0),totCost=rows.reduce((s,r)=>s+r.cost,0),totProf=totRev-totCost;
  const body=rows.map(r=>`<tr><td>${r.n}</td><td>${fmt(r.qty)}</td><td>${money(r.revenue)}</td>
    <td>${money(r.cost)}</td><td><b style="color:${r.profit>=0?'var(--green)':'var(--red)'}">${money(r.profit)}</b></td>
    <td>${r.revenue>0?Math.round(r.profit/r.revenue*100):0}%</td></tr>`).join('');
  return repHead('تقرير الأرباح بالصنف')+`
    <div class="cards" style="margin-bottom:16px">
      ${statCard('💰','إجمالي الإيراد',money(totRev),'','var(--green)')}
      ${statCard('🛒','إجمالي التكلفة',money(totCost),'','var(--purple)')}
      ${statCard('📊','صافي الربح',money(totProf),totRev>0?Math.round(totProf/totRev*100)+'% هامش':'','var(--primary)')}
    </div>
    <div class="panel" style="margin:0"><div class="panel-h"><h3>📋 الربحية لكل صنف</h3>
      <span class="mini" style="margin-inline-start:auto">التكلفة من سعر الشراء المسجّل</span></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>الصنف</th><th>الكمية</th><th>الإيراد</th><th>التكلفة</th><th>الربح</th><th>الهامش</th>
    </tr></thead><tbody>${body||emptyRow(6)}</tbody></table></div></div></div>`;
}

function repCompare(){
  const pid=$('#rep_entity')?$('#rep_entity').value:null;
  const p=DB.products.find(x=>String(x.id)===String(pid));
  if(!p)return repHead('مقارنة الأصناف')+emptyBox('اختر صنفاً للمقارنة');
  const ther=(p.ther||'').trim();
  if(!ther)return repHead('مقارنة الأصناف')+emptyBox('هذا الصنف ليس له تصنيف علاجي محدّد. أضف "التصنيف العلاجي" له أولاً من قائمة المنتجات.');
  // كل الأصناف في نفس التصنيف العلاجي
  const peers=DB.products.filter(x=>(x.ther||'').trim()===ther);
  const rows=peers.map(x=>{
    const isSel=x.id===p.id;
    return `<tr style="${isSel?'background:rgba(59,130,246,.12)':''}">
      <td>${isSel?'⭐ ':''}<b>${x.name}</b></td>
      <td>${x.maker||'—'}</td>
      <td>${x.supplier||'—'}</td>
      <td>${(x.doseMeat||0)>0?fmt(x.doseMeat):'—'}</td>
      <td>${(x.doseWater||0)>0?fmt(x.doseWater):'—'}</td>
      <td>${x.unit||'—'} / ${fmt(x.pkg)}</td>
      <td><b>${money(x.price)}</b></td>
      <td>${fmt(x.stock||0)}</td></tr>`;}).join('');
  // متوسط السعر للمقارنة
  const avg=peers.reduce((s,x)=>s+(x.price||0),0)/peers.length;
  const cheapest=peers.slice().sort((a,b)=>a.price-b.price)[0];
  return repHead('مقارنة أصناف: '+ther)+`
    <div class="cards" style="margin-bottom:16px">
      ${statCard('🏷️','التصنيف العلاجي',ther,peers.length+' صنف','var(--primary)')}
      ${statCard('⭐','الصنف المختار',p.name,money(p.price),'var(--cyan)')}
      ${statCard('💰','متوسط السعر',money(Math.round(avg)),'لكل الأصناف','var(--amber)')}
      ${statCard('✅','الأرخص',cheapest?cheapest.name:'—',cheapest?money(cheapest.price):'','var(--green)')}
    </div>
    <div class="panel" style="margin:0"><div class="panel-h"><h3>⚖️ المقارنة التفصيلية</h3>
      <span class="mini" style="margin-inline-start:auto">⭐ = الصنف المختار</span></div>

      <th>المنتج</th><th>الشركة المنتجة</th><th>المورد</th><th>جرعة/طن لحم</th><th>جرعة/لتر ماء</th>
      <th>الوحدة/العبوة</th><th>السعر</th><th>الرصيد</th>
    </tr></thead><tbody>${rows||emptyRow(8)}</tbody></table></div></div></div>`;
}
function statCard(ico,lbl,val,meta,color){return `<div class="stat" style="--accent:${color}">
  <span class="ico">${ico}</span><div class="lbl">${lbl}</div>
  <div class="val" style="font-size:18px">${val}</div>${meta?`<div class="meta">${meta}</div>`:''}</div>`;}
function repHead(title){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px" id="repTitle">
  <h3 style="font-size:16px">${title}</h3><span class="tag gray">${rangeLabel()}</span></div>`;}
function emptyRow(cols){return `<tr><td colspan="${cols}"><div class="empty"><span class="ico">📄</span>لا توجد بيانات في هذه الفترة</div></td></tr>`;}
function emptyBox(msg){return `<div class="empty"><span class="ico">👆</span>${msg}</div>`;}

/* توليد كود دورة تلقائي للعميل */
function migrateCycleCodes(){
  if(!DB.farmInvoices||DB.migratedCycles)return;
  // أعِد ترقيم الأكواد لكل عميل+نوع بالترتيب الزمني لإزالة التكرارات القديمة
  const groups={};
  DB.farmInvoices.slice().sort((a,b)=>new Date(a.entryDate||a.createdAt||0)-new Date(b.entryDate||b.createdAt||0))
    .forEach(f=>{
      const key=(f.customerName||'')+'|'+(f.type||'');
      groups[key]=(groups[key]||0)+1;
      const base=(f.customerName||'مزرعة').trim().split(/\s+/).slice(0,2).join(' ');
      const prefix=f.type==='vaccine'?'V':'M';
      f.cycleCode=`${base}-${prefix}D${groups[key]}`;
    });
  DB.migratedCycles=true;
}
function nextCycleCode(customerName,type){
  const base=(customerName||'مزرعة').trim().split(/\s+/).slice(0,2).join(' ');
  // الترقيم لكل عميل ولكل نوع (تحصينات/أدوية) على حدة، بالاعتماد على أكبر رقم موجود
  const prefix=type==='vaccine'?'V':'M';
  let maxN=0;
  (DB.farmInvoices||[]).forEach(f=>{
    if(f.customerName===customerName&&f.type===type){
      const m=(f.cycleCode||'').match(/D(\d+)$/);
      if(m)maxN=Math.max(maxN,+m[1]);
    }
  });
  return `${base}-${prefix}D${maxN+1}`;
}

function invProductOptions(isVax){
  if(isVax){
    if(!DB.vaccines.length)return '<option value="">لا توجد لقاحات في السجل</option>';
    return DB.vaccines.map(v=>`<option value="V-${v.id}" data-name="${v.name}" data-price="${v.price}" data-maker="${v.maker||''}">${v.name}${v.maker?' — '+v.maker:''} — ${money(v.price)}</option>`).join('');
  }else{
    const prods=DB.products.filter(p=>p.cat!=='تحصينات ولقاحات')
      .sort((a,b)=>a.name.localeCompare(b.name,'ar'));
    if(!prods.length)return '<option value="">لا توجد أدوية في المخزون</option>';
    return prods.map(p=>`<option value="${p.id}" data-name="${p.name}" data-price="${p.price}" data-maker="${p.maker||''}" data-stock="${p.stock||0}">${p.name}${p.maker?' — '+p.maker:''} — ${money(p.price)} (رصيد: ${fmt(p.stock||0)})</option>`).join('');
  }
}

/* ---------- ترحيل الفاتورة: بيع + خصم مخزون/لقاحات + خزينة + دين عميل ---------- */
function postFarmInvoice(id){
  const f=DB.farmInvoices.find(x=>x.id===id);if(!f||f.posted)return;
  if(!f.items.length){toast('أضف أصنافاً أولاً','red');return;}
  const isVax=f.type==='vaccine';
  f.paid=+($('#fi_paid')?$('#fi_paid').value:f.paid)||0;
  const total=f.items.reduce((s,i)=>s+i.qty*i.price,0);

  // 1) خصم المخزون / سجل اللقاحات
  f.items.forEach(it=>{
    if(isVax){
      // التحصينات من سجل اللقاحات: ابحث بالكود المصدر V-id أو بالاسم
      const vid=(it.src||'').startsWith('V-')?it.src.slice(2):null;
      const v=vid?DB.vaccines.find(x=>x.id===vid):DB.vaccines.find(x=>x.name===it.name);
      if(v)v.qty=(v.qty||0)-it.qty;
    }else{
      const p=DB.products.find(x=>String(x.id)===String(it.src))||DB.products.find(x=>x.name===it.name);
      if(p)p.stock=(p.stock||0)-it.qty;
    }
  });

  // 2) تسجيل كفاتورة بيع مرتبطة
  const saleItems=f.items.map(it=>{
    const p=DB.products.find(x=>String(x.id)===String(it.src))||DB.products.find(x=>x.name===it.name);
    return {productId:p?p.id:('FARM-'+(it.src||it.name)),name:it.name,qty:it.qty,price:it.price};
  });
  DB.sales.push({id:'FS-'+f.id,date:f.entryDate||today(),partyId:f.customerId,partyName:f.customerName,
    items:saleItems,total,paid:f.paid,note:'فاتورة مزرعة '+(f.cycleCode||'')+(isVax?' (تحصينات)':' (أدوية)'),
    kind:'sale',fromFarm:f.id});

  // 3) الخزينة (المدفوع)
  cashMove('in',f.paid,'تحصيل فاتورة مزرعة — '+f.customerName+' '+(f.cycleCode||''),f.entryDate);

  // 4) دين العميل (المتبقي)
  const cust=DB.customers.find(c=>String(c.id)===String(f.customerId));
  if(cust)cust.balance=(cust.balance||0)+(total-f.paid);

  f.posted=true;f.total=total;
  saveDB();buildNav();renderPage('farmInvoices');
  toast('تم ترحيل الفاتورة بالكامل ✓','green');
}
function reverseFarmPosting(f){
  const isVax=f.type==='vaccine';
  // عكس المخزون
  f.items.forEach(it=>{
    if(isVax){
      const vid=(it.src||'').startsWith('V-')?it.src.slice(2):null;
      const v=vid?DB.vaccines.find(x=>x.id===vid):DB.vaccines.find(x=>x.name===it.name);
      if(v)v.qty=(v.qty||0)+it.qty;
    }else{
      const p=DB.products.find(x=>String(x.id)===String(it.src))||DB.products.find(x=>x.name===it.name);
      if(p)p.stock=(p.stock||0)+it.qty;
    }
  });
  // حذف فاتورة البيع المرتبطة
  DB.sales=DB.sales.filter(s=>s.id!=='FS-'+f.id);
  // عكس الخزينة
  cashMove('out',f.paid||0,'عكس تحصيل فاتورة مزرعة — '+f.customerName,today());
  // عكس دين العميل
  const cust=DB.customers.find(c=>String(c.id)===String(f.customerId));
  if(cust)cust.balance=(cust.balance||0)-((f.total||0)-(f.paid||0));
  f.posted=false;
}

/* ====================================================================
   الدفعة 5: النسخ الاحتياطي اليومي التلقائي
   - نسخة تلقائية عند فتح البرنامج (مرة واحدة يومياً)
   - الاحتفاظ بآخر 30 يوم
   - نسخ يدوية + استرجاع + تصدير/استيراد ملف
==================================================================== */
const BK_KEY='vetpharm_backups_v1';
const BK_MAX_DAYS=30;

function loadBackups(){
  try{return JSON.parse(localStorage.getItem(BK_KEY))||[];}catch(e){return [];}
}
function saveBackups(list){localStorage.setItem(BK_KEY,JSON.stringify(list));}

/* نسخة احتياطية تلقائية يومية: تتأكد إن في نسخة لتاريخ اليوم، وإلا تنشئها */
function autoDailyBackup(){
  const list=loadBackups();
  const todayStr=today();
  const hasToday=list.some(b=>b.date===todayStr&&b.type==='auto');
  if(!hasToday){
    list.push({id:uid(),date:todayStr,time:new Date().toLocaleTimeString('ar-EG'),
      type:'auto',data:JSON.stringify(DB)});
  }
  // الاحتفاظ بآخر 30 يوم فقط (النسخ التلقائية)، مع إبقاء النسخ اليدوية كما هي
  const cutoff=new Date(Date.now()-BK_MAX_DAYS*86400000);
  const pruned=list.filter(b=>b.type==='manual'||new Date(b.date)>=cutoff);
  saveBackups(pruned);
}
function manualBackup(){
  const list=loadBackups();
  list.push({id:uid(),date:today(),time:new Date().toLocaleTimeString('ar-EG'),
    type:'manual',data:JSON.stringify(DB)});
  saveBackups(list);toast('تم إنشاء نسخة احتياطية يدوية ✓','green');
  if(currentPage==='backups')renderPage('backups');
}
function restoreBackup(id){
  const list=loadBackups();const b=list.find(x=>x.id===id);if(!b)return;
  confirmBox('استرجاع هذه النسخة؟','سيتم أخذ نسخة أمان من البيانات الحالية أولاً، ثم استبدالها ببيانات النسخة المختارة.',()=>{
    // نسخة ما قبل الاسترجاع
    list.push({id:uid(),date:today(),time:new Date().toLocaleTimeString('ar-EG'),
      type:'manual',label:'ما قبل الاسترجاع',data:JSON.stringify(DB)});
    saveBackups(list);
    DB=JSON.parse(b.data);saveDB();
    buildNav();go('dashboard');toast('تم استرجاع النسخة ✓','green');
  });
}
function delBackup(id){
  let list=loadBackups();list=list.filter(b=>b.id!==id);saveBackups(list);
  renderPage('backups');toast('تم حذف النسخة','red');
}
function exportBackupFile(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`backup_${today()}.json`;a.click();URL.revokeObjectURL(url);
  toast('تم تنزيل ملف النسخة ✓','green');
}
function importBackupFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;
    const r=new FileReader();r.onload=()=>{
      try{const data=JSON.parse(r.result);
        confirmBox('استيراد هذا الملف؟','سيتم استبدال كل البيانات الحالية ببيانات الملف.',()=>{
          DB=data;saveDB();buildNav();go('dashboard');toast('تم الاستيراد ✓','green');});
      }catch(err){toast('الملف غير صالح','red');}};
    r.readAsText(file);};
  inp.click();
}

/* ---------- موديول النسخ الاحتياطية ---------- */
function renderBackups(page){
  const list=loadBackups().slice().reverse();
  const sizeKB=Math.round((localStorage.getItem(BK_KEY)||'').length/1024);
  page.innerHTML=`
  <div class="cards">
    <div class="stat" style="--accent:var(--primary)"><span class="ico">💾</span><div class="lbl">عدد النسخ المحفوظة</div><div class="val">${fmt(list.length)}</div><div class="meta">آخر ${BK_MAX_DAYS} يوم تلقائياً</div></div>
    <div class="stat" style="--accent:var(--cyan)"><span class="ico">📅</span><div class="lbl">آخر نسخة</div><div class="val" style="font-size:18px">${list[0]?list[0].date:'—'}</div><div class="meta">${list[0]?list[0].time:''}</div></div>
    <div class="stat" style="--accent:var(--amber)"><span class="ico">🗄️</span><div class="lbl">حجم النسخ</div><div class="val" style="font-size:18px">${fmt(sizeKB)} KB</div></div>
  </div>
  <div class="panel"><div class="panel-h"><h3>💾 النسخ الاحتياطية</h3>
    <div class="tools">
      <button class="btn" onclick="manualBackup()">➕ نسخة الآن</button>
      <button class="btn ghost" onclick="exportBackupFile()">⬇️ تصدير ملف</button>
      <button class="btn ghost" onclick="importBackupFile()">⬆️ استيراد ملف</button>
    </div></div>
    <div class="panel-b flush"><div class="tbl-wrap"><table><thead><tr>
      <th>التاريخ</th><th>الوقت</th><th>النوع</th><th>ملاحظة</th><th>الحجم</th><th>إجراءات</th>
    </tr></thead><tbody>${list.map(b=>`<tr>
      <td>${b.date}</td><td>${b.time}</td>
      <td>${b.type==='auto'?'<span class="tag cyan">تلقائية</span>':'<span class="tag purple">يدوية</span>'}</td>
      <td>${b.label||'—'}</td><td>${Math.round((b.data||'').length/1024)} KB</td>
      <td class="row-actions">
        <button class="btn xs green" onclick="restoreBackup('${b.id}')">♻️ استرجاع</button>
        <button class="btn xs red" onclick="delBackup('${b.id}')">🗑</button></td></tr>`).join('')
      ||`<tr><td colspan="6"><div class="empty"><span class="ico">💾</span>لا توجد نسخ بعد</div></td></tr>`}
    </tbody></table></div></div></div>
  <p class="mini" style="padding:4px 6px">يتم إنشاء نسخة تلقائية واحدة عند أول فتح للبرنامج كل يوم، والاحتفاظ بآخر ${BK_MAX_DAYS} يوم. النسخ اليدوية لا تُحذف تلقائياً.</p>`;
}

boot();
</script>
</body>
</html>
