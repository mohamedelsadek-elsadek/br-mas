    html+=`<div class="card">${emptyState('📅','لا توجد بيانات سنوية بعد.'+(canEdit?' أضف أول سجل.':''))}</div>`;
    $('#main').innerHTML=html;return;
  }

  // جدول لكل سنة
  const clr=(v,g,y)=>v>=g?'b-ok':v>=y?'b-warn':'b-bad';
  years.forEach(yr=>{
    const rows=DB.yearlyRef.filter(r=>r.year===yr);
    const T=rows.reduce((a,r)=>{['placed','sold','feed','meat'].forEach(k=>a[k]=(a[k]||0)+(Number(r[k])||0));return a;},{});
    const Tdead=T.placed?((T.placed-T.sold)/T.placed*100):0;
    html+=`<div class="card"><div class="card-title">📆 سنة ${esc(yr)} — إجمالي وارد: ${fmt(T.placed)} كتكوت</div>
      <div class="tbl-wrap"><table><thead><tr><th>المزرعة</th><th class="num">الوارد</th><th class="num">المباع</th>
      <th class="num">نافق%</th><th class="num">سعر البيع</th><th class="num">تكلفة الكيلو</th>
      <th class="num">العلف</th><th class="num">اللحم</th><th class="num">م.الوزن</th><th class="num">م.العمر</th>
      <th class="num">FCR</th><th class="num">cfcr</th><th class="num">EPEF</th>
      <th class="num">ROF</th><th class="num">RO/علف</th><th class="num">RO CP</th>
      ${canEdit?'<th></th>':''}</tr></thead><tbody>`;
    rows.forEach(r=>{
      html+=`<tr><td><b>${esc(r.farm)}</b></td><td class="num">${fmt(r.placed)}</td><td class="num">${fmt(r.sold)}</td>
        <td class="num"><span class="badge ${r.deadPct<5?'b-ok':r.deadPct<8?'b-warn':'b-bad'}">${fmt(r.deadPct,1)}%</span></td>
        <td class="num">${fmt(r.salePrice,1)}</td><td class="num">${fmt(r.costKg,1)}</td>
        <td class="num">${fmt(r.feed)}</td><td class="num">${fmt(r.meat,1)}</td>
        <td class="num">${fmt(r.avgWeight,2)}</td><td class="num">${fmt(r.avgAge,1)}</td>
        <td class="num"><span class="badge ${clr(2-(r.fcr||2),0.45,0.35)}">${fmt(r.fcr,2)}</span></td>
        <td class="num"><span class="badge ${clr(2-(r.cfcr||2),0.45,0.35)}">${fmt(r.cfcr,2)}</span></td>
        <td class="num"><span class="badge ${clr(r.epef||0,380,330)}">${fmt(r.epef,0)}</span></td>
        <td class="num">${fmt(r.rof,1)}</td><td class="num">${fmt(r.roKgFeed,1)}</td><td class="num">${fmt(r.roCp,1)}</td>
        ${canEdit?`<td class="num"><button class="btn-sec btn-xs" onclick="yrModal('${r.id}')">تعديل</button>
          <button class="btn-red btn-xs" onclick="yrDel('${r.id}')">حذف</button></td>`:''}</tr>`;
    });
    html+=`<tr class="tbl-total"><td>إجمالي ${esc(yr)}</td><td class="num">${fmt(T.placed)}</td><td class="num">${fmt(T.sold)}</td>
      <td class="num">${Tdead.toFixed(1)}%</td><td colspan="2"></td>
      <td class="num">${fmt(T.feed)}</td><td class="num">${fmt(T.meat,1)}</td><td colspan="${canEdit?8:7}"></td></tr>`;
    html+=`</tbody></table></div></div>`;
  });

  // مقارنة بين سنتين (لو فيه سنتين أو أكثر)
  if(years.length>=2){
    html+=`<div class="card"><div class="card-title">🔀 مقارنة بين السنوات (إجماليات الشركة)</div>
      <div class="tbl-wrap"><table><thead><tr><th>المؤشر</th>${years.map(y=>`<th class="num">${esc(y)}</th>`).join('')}<th class="num">التغير (الأحدث vs الأقدم)</th></tr></thead><tbody>`;
    const agg=y=>{const rs=DB.yearlyRef.filter(r=>r.year===y);
      const placed=rs.reduce((s,r)=>s+(Number(r.placed)||0),0);
      const sold=rs.reduce((s,r)=>s+(Number(r.sold)||0),0);
      const feed=rs.reduce((s,r)=>s+(Number(r.feed)||0),0);
      const meat=rs.reduce((s,r)=>s+(Number(r.meat)||0),0);
      const wMean=k=>{let sw=0,sv=0;rs.forEach(r=>{const w=Number(r.placed)||0;sw+=w;sv+=w*(Number(r[k])||0);});return sw?sv/sw:0;};
      return {placed,sold,feed,meat,deadPct:placed?((placed-sold)/placed*100):0,
        fcr:wMean('fcr'),cfcr:wMean('cfcr'),epef:wMean('epef'),avgWeight:wMean('avgWeight'),costKg:wMean('costKg')};};
    const A=years.map(agg);
    const metrics=[['placed','العدد الوارد',0],['sold','العدد المباع',0],['deadPct','نسبة النافق %',1],
      ['feed','العلف المستهلك',0],['meat','إجمالي اللحم',1],['avgWeight','متوسط الوزن',2],
      ['costKg','تكلفة الكيلو',2],['fcr','معامل التحويل',3],['cfcr','cfcr',3],['epef','EPEF',0]];
    metrics.forEach(([k,lbl,dec])=>{
      const first=A[0][k],last=A[A.length-1][k];
      const diff=last-first;const pctDiff=first?(diff/first*100):0;
      const better=(['deadPct','feed','costKg','fcr','cfcr'].includes(k))?(diff<0):(diff>0);
      html+=`<tr><td><b>${lbl}</b></td>${A.map(a=>`<td class="num">${fmt(a[k],dec)}</td>`).join('')}
        <td class="num"><span class="badge ${diff===0?'b-mut':better?'b-ok':'b-bad'}">${diff>0?'▲':diff<0?'▼':''} ${fmt(Math.abs(pctDiff),1)}%</span></td></tr>`;
    });
    html+=`</tbody></table></div>
      <div class="hint" style="margin-top:8px">الأخضر = تحسّن في الأداء، الأحمر = تراجع. (للنافق/العلف/التكلفة/التحويل الانخفاض أفضل.)</div></div>`;
  }
  $('#main').innerHTML=html;
}
function yrModal(id){
  const r=id?DB.yearlyRef.find(x=>x.id===id):{year:'',farm:''};
  const fields=YR_FIELDS.map(([k,lbl])=>
    `<div class="field"><label>${lbl}</label><input type="number" step="0.001" id="yr_${k}" value="${r[k]!=null?r[k]:''}" placeholder="0"></div>`).join('');
  openModal(id?'تعديل سجل سنوي':'إضافة سجل سنوي',
    `<div class="row-fields g2">
      <div class="field"><label>السنة</label><input id="yr_year" value="${esc(r.year||'')}" placeholder="2024"></div>
      <div class="field"><label>المزرعة</label><input id="yr_farm" value="${esc(r.farm||'')}" placeholder="اسم المزرعة"></div>
     </div>
     <div class="divider"></div>
     <div class="row-fields g2">${fields}</div>`,
    `<button class="btn btn-green" onclick="yrSave('${id||''}')">حفظ</button>
     <button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
}
function yrSave(id){
  const year=$('#yr_year').value.trim(),farm=$('#yr_farm').value.trim();
  if(!year||!farm){toast('أدخل السنة واسم المزرعة',1);return;}
  const data={year,farm};
  YR_FIELDS.forEach(([k])=>{const v=$('#yr_'+k).value;data[k]=v===''?0:Number(v);});
  if(id){Object.assign(DB.yearlyRef.find(x=>x.id===id),data);}
  else{DB.yearlyRef.push({id:uid('yr'),...data});}
  save();closeModal();toast('تم الحفظ ✓');renderYearly();
}
function yrDel(id){if(!confirm('حذف السجل؟'))return;DB.yearlyRef=DB.yearlyRef.filter(r=>r.id!==id);save();renderYearly();}
function yrExport(){const blob=new Blob([JSON.stringify(DB.yearlyRef,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='yearly_reference.json';a.click();toast('تم التصدير ✓');}
function yrImport(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const arr=JSON.parse(e.target.result);if(!Array.isArray(arr))throw 0;
    arr.forEach(x=>{if(!x.id)x.id=uid('yr');});
    // دمج: استبدال السجلات بنفس (سنة+مزرعة) أو إضافة
    arr.forEach(x=>{const i=DB.yearlyRef.findIndex(o=>o.year===x.year&&o.farm===x.farm);
      if(i>=0)DB.yearlyRef[i]=x;else DB.yearlyRef.push(x);});
    save();toast('تم استيراد '+arr.length+' سجل ✓');renderYearly();
  }catch(err){toast('ملف غير صالح',1);}};r.readAsText(f);}

function saveUser(id){
  const name=$('#usName').value.trim(),username=$('#usUser').value.trim();

  const data={name,username,pass:$('#usPass').value,role:$('#usRole').value,farm:$('#usFarm').value||null};
  if(id){Object.assign(DB.users.find(x=>x.id===id),data);}else{DB.users.push({id:uid('u'),...data});}
  save();closeModal();toast('تم الحفظ ✓');renderUsers();
}
function delUser(id){if(!confirm('حذف المستخدم؟'))return;DB.users=DB.users.filter(u=>u.id!==id);save();renderUsers();}

        <div class="field"><label>apiKey</label><input id="fbApiKey" value="${esc(localStorage.getItem('fb_apiKey')||FIREBASE_CONFIG.apiKey)}"></div>
        <div class="field"><label>databaseURL</label><input id="fbDbUrl" value="${esc(localStorage.getItem('fb_databaseURL')||FIREBASE_CONFIG.databaseURL)}" placeholder="https://xxx.firebaseio.com"></div>
        <div class="field"><label>authDomain</label><input id="fbAuth" value="${esc(localStorage.getItem('fb_authDomain')||FIREBASE_CONFIG.authDomain)}"></div>
        <div class="field"><label>projectId</label><input id="fbProj" value="${esc(localStorage.getItem('fb_projectId')||FIREBASE_CONFIG.projectId)}"></div>
        <div class="field"><label>storageBucket</label><input id="fbStore" value="${esc(localStorage.getItem('fb_storageBucket')||FIREBASE_CONFIG.storageBucket)}"></div>
        <div class="field"><label>messagingSenderId</label><input id="fbMsg" value="${esc(localStorage.getItem('fb_messagingSenderId')||FIREBASE_CONFIG.messagingSenderId)}"></div>
        <div class="field"><label>appId</label><input id="fbApp" value="${esc(localStorage.getItem('fb_appId')||FIREBASE_CONFIG.appId)}"></div>
      </div>
      <button class="btn btn-sm" onclick="saveFbConfig()">💾 حفظ إعدادات Firebase والاتصال</button>
    </div>`;
  }
  html+=`<button class="btn" onclick="saveSettings()">حفظ الإعدادات</button>`;
  $('#main').innerHTML=html;
  if(ME.role==='super'&&FB_ON)loadCloudBakUI();
}
function loadCloudBakUI(){
  const el=document.getElementById('cloudBakList');if(!el)return;
  listCloudBackups(all=>{
    const el2=document.getElementById('cloudBakList');if(!el2)return;
    const days=Object.keys(all).sort().reverse();
    if(!days.length){el2.innerHTML='<div class="empty"><div class="ic">☁️</div>لا توجد نسخ سحابية بعد — ستُؤخذ تلقائياً بعد 3 صباحاً.</div>';return;}
    let h=`<div class="tbl-wrap"><table><thead><tr><th>اليوم</th><th>وقت النسخة</th><th>بواسطة</th>
      <th class="num">سجلات يومية</th><th class="num">مبيعات</th><th></th></tr></thead><tbody>`;
    days.forEach(d=>{const b=all[d];const dt=b&&b.ts?new Date(b.ts):null;
      const nd=(b&&b.data&&b.data.daily||[]).length,ns=(b&&b.data&&b.data.sales||[]).length;
      h+=`<tr><td><b>${esc(d)}</b></td><td>${dt?dt.toLocaleString('ar-EG'):'-'}</td><td>${esc(b&&b.by||'auto')}</td>
        <td class="num">${fmt(nd)}</td><td class="num">${fmt(ns)}</td>
        <td class="num"><button class="btn-sec btn-xs" onclick="restoreCloudBackup('${d}')">↩️ استرجاع</button></td></tr>`;
    });
    h+=`</tbody></table></div>`;
    el2.innerHTML=h;
  });
}
function saveFbConfig(){
  const map={apiKey:'#fbApiKey',databaseURL:'#fbDbUrl',authDomain:'#fbAuth',projectId:'#fbProj',
    storageBucket:'#fbStore',messagingSenderId:'#fbMsg',appId:'#fbApp'};
  Object.entries(map).forEach(([k,sel])=>{const v=$(sel).value.trim();FIREBASE_CONFIG[k]=v;localStorage.setItem('fb_'+k,v);});
  if(!FIREBASE_CONFIG.databaseURL||!FIREBASE_CONFIG.apiKey){toast('أدخل apiKey و databaseURL على الأقل',1);return;}
  FB=null; // أعد التهيئة
  if(fbInit()){toast('تم الاتصال بـ Firebase ✓');renderSettings();}
  else{toast('تعذّر الاتصال — تحقق من القيم',1);}
}
function saveSettings(){
  if(ME.role==='super'){DB.labels.company=$('#stCompany').value;DB.settings.currency=$('#stCurr').value;DB.settings.breedDefault=$('#stBreed').value;}
  save();toast('تم حفظ الإعدادات ✓');
}
function saveLabels(){['dead','feed','water','weight','house','farm','cycle'].forEach(k=>{DB.labels[k]=$('#lbl_'+k).value;});save();toast('تم حفظ المسميات ✓');renderSettings();}
function settingsAddItem(key){
  const t=prompt('أضف عنصر جديد للقائمة:');if(!t)return;
  const v=t.trim();if(!v)return;
  if(!Array.isArray(DB.settings[key]))DB.settings[key]=[];
  if(DB.settings[key].includes(v)){toast('موجود بالفعل',1);return;}
  DB.settings[key].push(v);save();toast('تمت الإضافة ✓');renderSettings();
}
function settingsRemoveItem(key,i){
  if(!Array.isArray(DB.settings[key]))return;
  if(!confirm('حذف "'+DB.settings[key][i]+'" من القائمة؟'))return;
  DB.settings[key].splice(i,1);save();toast('تم الحذف ✓');renderSettings();
}
/* ===== إدارة الأدوار المخصّصة ===== */
function roleModal(id){
  const r=id?customRoles().find(x=>x.id===id):{name:'',color:'#0ea5e9',perms:[],shifts:[]};
  if(!r){toast('غير موجود',1);return;}
  const permBoxes=PERM_KEYS.map(p=>`<label class="pill-row" style="gap:6px;font-size:13px;font-weight:600;cursor:pointer">
    <input type="checkbox" class="roleperm" value="${p}" ${(r.perms||[]).includes(p)?'checked':''} style="width:auto"> ${PERM_LABEL[p]}</label>`).join('');
  const shiftBoxes=SHIFTS.map(s=>`<label class="pill-row" style="gap:6px;font-size:13px;font-weight:600;cursor:pointer">
    <input type="checkbox" class="roleshift" value="${s.id}" ${(r.shifts||[]).includes(s.id)?'checked':''} style="width:auto"> ${s.name} <span class="hint">(${s.time})</span></label>`).join('');
  openModal(id?'تعديل وظيفة':'وظيفة جديدة',
    `<div class="row-fields g2">
       <div class="field"><label>اسم الوظيفة</label><input id="roleName" value="${esc(r.name)}" placeholder="مثال: رئيس وردية"></div>
       <div class="field"><label>اللون</label><input type="color" id="roleColor" value="${r.color||'#0ea5e9'}" style="height:42px"></div>
     </div>
     <div class="divider"></div>
     <div class="field"><label>الصلاحيات (الصفحات المسموح بها)</label>
       <div class="grid g2" style="gap:6px">${permBoxes}</div></div>
     <div class="divider"></div>
     <div class="field"><label>الفترات المسموح بها في التقرير اليومي <span class="hint">(لو لم تختر شيئاً = كل الفترات)</span></label>
       <div class="grid g2" style="gap:6px">${shiftBoxes}</div></div>`,
    `<button class="btn btn-green" onclick="roleSave('${id||''}')">حفظ</button><button class="btn-sec" onclick="closeModal()">إلغاء</button>`);
}
function roleSave(id){
  const name=$('#roleName').value.trim();if(!name){toast('أدخل اسم الوظيفة',1);return;}
  const perms=[...document.querySelectorAll('.roleperm:checked')].map(c=>c.value);
  const shifts=[...document.querySelectorAll('.roleshift:checked')].map(c=>c.value);
  const color=$('#roleColor').value||'#0ea5e9';
  if(!DB.settings.customRoles)DB.settings.customRoles=[];
  if(id){const r=customRoles().find(x=>x.id===id);Object.assign(r,{name,color,perms,shifts});}
  else{DB.settings.customRoles.push({id:'role_'+uid(''),name,color,perms,shifts});}
  save();closeModal();toast('تم حفظ الوظيفة ✓');renderSettings();
}
function roleDelete(id){
  // امنع الحذف لو فيه مستخدمين على هذا الدور
  const used=DB.users.filter(u=>u.role===id);
  if(used.length){toast('لا يمكن الحذف — '+used.length+' مستخدم على هذه الوظيفة. غيّر دورهم أولاً.',1);return;}
  if(!confirm('حذف الوظيفة؟'))return;
  DB.settings.customRoles=customRoles().filter(r=>r.id!==id);save();toast('تم الحذف ✓');renderSettings();
}
function exportDB(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='poultry_backup_'+todayISO()+'.json';a.click();toast('تم تصدير النسخة ✓');}
function importDB(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{DB=JSON.parse(e.target.result);save();toast('تم الاستيراد ✓');renderApp();}catch(err){toast('ملف غير صالح',1);}};r.readAsText(f);}
function resetDB(){if(!confirm('تصفير كل البيانات؟ لا يمكن التراجع.'))return;DB=defaultDB();save();toast('تم التصفير');renderApp();}

/* ===================== الإقلاع ===================== */
renderLogin();
/* تهيئة Firebase تلقائياً لو الإعدادات موجودة */
try{ if(fbReady()&&window.firebase) fbInit(); }catch(e){console.warn(e);}

</script>
<script>
/* تسجيل Service Worker لتفعيل PWA (يعمل أوف لاين + تثبيت على الموبايل) */
if('serviceWorker' in navigator && location.protocol==='https:'){
  const swCode = `
    const C='brmas-v9';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil((async()=>{
      const keys=await caches.keys();
      await Promise.all(keys.filter(k=>k!==C).map(k=>caches.delete(k))); // امسح الكاش القديم
      await self.clients.claim();
    })());});
    self.addEventListener('fetch',e=>{
      const r=e.request;
      if(r.url.includes('firebaseio')||r.url.includes('firebasedatabase')||r.url.includes('googleapis')||r.url.includes('gstatic')||r.method!=='GET'){return;}
      const isDoc = r.mode==='navigate' || (r.headers.get('accept')||'').includes('text/html');
      if(isDoc){
        // الصفحة: الشبكة أولاً (أحدث نسخة)، والكاش احتياطي أوف لاين
        e.respondWith(
          fetch(r).then(resp=>{const c=resp.clone();caches.open(C).then(ch=>ch.put(r,c));return resp;})
            .catch(()=>caches.match(r).then(h=>h||caches.match('./')))
        );
        return;
      }
      // باقي الموارد: كاش أولاً ثم تحديث
      e.respondWith(
        caches.open(C).then(cache=>cache.match(r).then(hit=>{
          const net=fetch(r).then(resp=>{try{cache.put(r,resp.clone());}catch(_){}return resp;}).catch(()=>hit);
          return hit||net;
        }))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  // فرض تحديث فوري للـ SW لو فيه نسخة جديدة
  navigator.serviceWorker.addEventListener('controllerchange',()=>{});
}
</script>
